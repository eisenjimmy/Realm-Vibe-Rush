<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Realm Vibe Rush — Idle Lane Battler</title>
<style>
  :root{
    --phone-w: 440px;
    --gold:#ffcf3f; --danger:#ff5a5a; --hp:#54d66a; --ink:#20140b;
    --panel:#3a2a1b; --panel2:#2b1d12; --line:#5a4128;
    --btn:#c98a3a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:
      radial-gradient(1200px 700px at 50% -10%, #2a3a4d, #10161f 60%, #080b10 100%);
    font-family:"Trebuchet MS", ui-sans-serif, system-ui, sans-serif;
    color:#fff; display:flex; align-items:center; justify-content:center;
    overflow:hidden; user-select:none; -webkit-user-select:none; touch-action:manipulation;
  }
  /* Phone frame — caps width on desktop, fills screen on mobile */
  #app{
    position:relative; width:100%; max-width:var(--phone-w); height:100%;
    max-height:960px; background:#0b0f14; overflow:hidden;
    box-shadow:0 30px 90px rgba(0,0,0,.7), 0 0 0 2px rgba(255,255,255,.04) inset;
  }
  @media(min-width:520px){ #app{ height:min(96vh,940px); border-radius:34px; border:10px solid #14181d; } }
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }

  /* ---------- Top HUD ---------- */
  #hud{ position:absolute; top:0; left:0; right:0; padding:30px 12px 4px; z-index:5;
        display:flex; flex-direction:column; gap:6px; pointer-events:none;
        text-shadow:0 2px 0 rgba(0,0,0,.45); }
  /* cumulative career highscore — always visible, above every screen */
  #hiscore{ position:absolute; top:5px; left:50%; transform:translateX(-50%); z-index:26;
            display:flex; align-items:center; gap:5px; padding:2px 14px; border-radius:0 0 14px 14px;
            font-size:12px; font-weight:900; letter-spacing:.3px; color:#3a2400;
            background:linear-gradient(#ffe58a,#ffb837); border:2px solid #b56b12; border-top:none;
            box-shadow:0 3px 8px rgba(0,0,0,.4); text-shadow:0 1px 0 rgba(255,255,255,.4); pointer-events:none; }
  #hiscore .t{ font-size:9px; opacity:.7; font-weight:900; }
  .bars{ display:flex; align-items:center; gap:8px; }
  .barwrap{ flex:1; }
  .barlabel{ font-size:10px; font-weight:bold; letter-spacing:.5px; opacity:.9; margin-bottom:2px;
             display:flex; justify-content:space-between; }
  .bar{ position:relative; height:17px; border-radius:9px; background:rgba(0,0,0,.5);
        border:2px solid rgba(0,0,0,.5); overflow:hidden; box-shadow:0 1px 0 rgba(255,255,255,.12) inset; }
  .bar > i{ position:absolute; left:0; top:0; height:100%; width:100%; border-radius:7px; }
  .bar > i.lag{ background:#fff; transition:width .55s cubic-bezier(.3,0,.2,1) .12s; z-index:0; }
  .bar > i#pHp,.bar > i#eHp{ z-index:1; transition:width .1s linear; }
  #pHp{ background:linear-gradient(#7dff95,#35c250); }
  #eHp{ background:linear-gradient(#ff8b8b,#e23b3b); }
  .midrow{ display:flex; align-items:center; justify-content:center; gap:14px; }
  .chip{ display:flex; align-items:center; gap:6px; background:linear-gradient(#4a3620,#33240f);
         border:2px solid rgba(0,0,0,.4); border-radius:20px; padding:4px 12px; font-weight:bold;
         box-shadow:0 2px 6px rgba(0,0,0,.35), 0 1px 0 rgba(255,255,255,.12) inset; }
  .coin{ width:20px;height:20px;border-radius:50%;
         background:radial-gradient(circle at 35% 30%,#fff2a8,#ffcf3f 45%,#c9871a);
         box-shadow:0 0 0 2px #8a5a12, 0 0 8px #ffcf3f88; position:relative; }
  .coin::after{ content:"$"; position:absolute; inset:0; display:flex;align-items:center;justify-content:center;
                font-size:12px; color:#8a5a12; font-weight:900; }
  #wave{ background:linear-gradient(#5a4bd6,#3a2ea8); }
  .iconbtn{ pointer-events:auto; width:34px;height:34px;border-radius:50%; border:2px solid rgba(0,0,0,.4);
            background:linear-gradient(#4a3620,#33240f); color:#fff; font-size:15px; cursor:pointer;
            box-shadow:0 2px 6px rgba(0,0,0,.35), 0 1px 0 rgba(255,255,255,.12) inset; }
  .iconbtn:active{ transform:translateY(1px); }

  /* ---------- Bottom shop ---------- */
  #shop{ position:absolute; left:0; right:0; bottom:0; z-index:5; padding:8px 8px calc(8px + env(safe-area-inset-bottom));
         background:linear-gradient(180deg, rgba(20,12,6,0) 0%, rgba(20,12,6,.55) 22%, #1b120a 62%);
         display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }
  .card{ position:relative; border-radius:14px; padding:6px 3px 5px; cursor:pointer; overflow:hidden;
         background:linear-gradient(#4c3a24,#2f2113); border:2px solid #6b4e2c;
         box-shadow:0 3px 8px rgba(0,0,0,.4), 0 1px 0 rgba(255,255,255,.1) inset;
         display:flex; flex-direction:column; align-items:center; gap:2px; transition:transform .06s; }
  .card:active{ transform:translateY(2px) scale(.97); }
  .card canvas{ position:static; width:40px; height:40px; }
  .card .nm{ font-size:9px; font-weight:bold; letter-spacing:.2px; opacity:.95; }
  .card .cost{ font-size:10px; font-weight:900; color:var(--gold); display:flex; align-items:center; gap:2px;
               text-shadow:0 1px 0 rgba(0,0,0,.5); }
  .card .key{ position:absolute; top:2px; left:3px; font-size:8px; opacity:.55; font-weight:bold; }
  .card .cd{ position:absolute; inset:0; background:rgba(0,0,0,.62); border-radius:12px;
             transform-origin:bottom; display:none; }
  .card.cooling .cd{ display:block; }
  .card.poor{ filter:grayscale(.5) brightness(.7); }
  .card.poor .cost{ color:var(--danger); }

  /* ---------- Overlays ---------- */
  .screen{ position:absolute; inset:0; z-index:20; display:flex; flex-direction:column;
           align-items:center; justify-content:center; gap:16px; text-align:center; padding:24px;
           background:radial-gradient(600px 400px at 50% 40%, rgba(10,14,20,.55), rgba(6,9,13,.92)); }
  .screen.hide{ display:none; }
  .title{ font-size:40px; font-weight:900; letter-spacing:1px; line-height:1;
          background:linear-gradient(#ffe58a,#ffb02e); -webkit-background-clip:text; background-clip:text; color:transparent;
          filter:drop-shadow(0 3px 0 rgba(0,0,0,.4)); }
  .sub{ font-size:14px; opacity:.85; max-width:300px; line-height:1.5; }
  .big{ font-size:26px; font-weight:900; }
  .play{ pointer-events:auto; margin-top:6px; padding:14px 40px; font-size:20px; font-weight:900; letter-spacing:.5px;
         border:none; border-radius:16px; cursor:pointer; color:#3a2400;
         background:linear-gradient(#ffd766,#ffab2e); border-bottom:4px solid #b56b12;
         box-shadow:0 6px 20px rgba(255,170,46,.35); }
  .play:active{ transform:translateY(2px); border-bottom-width:2px; }
  .hintrow{ font-size:12px; opacity:.7; }
  #toast{ position:absolute; top:78px; left:50%; transform:translateX(-50%); z-index:8;
          background:rgba(0,0,0,.6); border:1px solid rgba(255,255,255,.15); padding:6px 14px; border-radius:20px;
          font-size:12px; font-weight:bold; opacity:0; transition:opacity .25s; pointer-events:none; max-width:90%; text-align:center;}
  #toast.show{ opacity:1; }

  /* ---------- Button juice (exaggerated) ---------- */
  @keyframes popIn{ 0%{transform:scale(.4) rotate(-8deg);opacity:0;} 70%{transform:scale(1.12) rotate(2deg);opacity:1;} 100%{transform:scale(1);} }
  @keyframes wob{ 0%,100%{transform:rotate(-2deg);} 50%{transform:rotate(2deg);} }
  .pressed{ animation:pressPop .32s cubic-bezier(.2,1.6,.4,1); }
  @keyframes pressPop{ 0%{transform:scale(.82);} 45%{transform:scale(1.18);} 70%{transform:scale(.94);} 100%{transform:scale(1);} }
  .play{ animation:pop-breathe 2.2s ease-in-out infinite; }
  @keyframes pop-breathe{ 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(-3px) scale(1.03);} }
  .play:active{ animation:none; transform:scale(.9); }

  /* ---------- Spell button ---------- */
  #spellBtn{ position:absolute; right:10px; bottom:calc(96px + env(safe-area-inset-bottom)); z-index:6;
             width:66px;height:66px;border-radius:50%; border:3px solid #ffe08a; cursor:pointer; display:none;
             background:radial-gradient(circle at 38% 30%, #fff, #b060ff 55%, #6a1fb0);
             box-shadow:0 6px 18px rgba(160,60,255,.55), 0 0 0 4px rgba(255,255,255,.08); color:#fff;
             font-size:30px; align-items:center; justify-content:center; }
  #spellBtn.show{ display:flex; animation:pop-breathe 1.6s ease-in-out infinite; }
  #spellBtn:active{ transform:scale(.86); }
  #spellBtn .sc{ position:absolute; inset:0; border-radius:50%; background:rgba(0,0,0,.6); transform-origin:bottom; }
  #spellBtn.ready .sc{ display:none; }
  #spellBtn .lbl{ position:absolute; bottom:-16px; left:50%; transform:translateX(-50%); font-size:9px; font-weight:900;
                  white-space:nowrap; text-shadow:0 1px 2px #000; }

  /* ---------- Element badges ---------- */
  .elem{ display:inline-flex; align-items:center; gap:2px; font-size:8px; font-weight:900; padding:1px 5px; border-radius:8px;
         color:#141018; text-shadow:none; }
  .card .elembadge{ position:absolute; top:2px; right:3px; font-size:11px; filter:drop-shadow(0 1px 1px #000); }

  /* ---------- Language select ---------- */
  .langrow{ display:flex; gap:10px; }
  .langbtn{ pointer-events:auto; padding:10px 20px; border-radius:16px; font-size:16px; font-weight:900; cursor:pointer;
            border:3px solid #6b4e2c; background:linear-gradient(#4c3a24,#2f2113); color:#fff; transition:transform .1s; }
  .langbtn.sel{ border-color:#ffd766; background:linear-gradient(#ffd766,#ffab2e); color:#3a2400; transform:scale(1.06); }
  .langbtn:active{ transform:scale(.92); }

  /* ---------- Bubble sheets (settings / barracks) ---------- */
  .sheet{ position:absolute; inset:0; z-index:30; display:flex; align-items:center; justify-content:center; padding:18px;
          background:rgba(6,9,13,.72); backdrop-filter:blur(2px); }
  .sheet.hide{ display:none; }
  .bubble{ width:100%; max-width:380px; max-height:88%; overflow-y:auto; border-radius:26px; padding:18px 16px 20px;
           background:linear-gradient(#fbf1d8,#f2dfb0); color:#3a2a12; border:4px solid #fff;
           box-shadow:0 20px 60px rgba(0,0,0,.6), 0 0 0 3px #c98a3a; animation:popIn .35s cubic-bezier(.2,1.6,.4,1); }
  .bubble h2{ margin:2px 0 12px; font-size:22px; font-weight:900; text-align:center; color:#7a4a12; letter-spacing:.5px; }
  .row{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin:10px 0; }
  .row > label{ font-weight:900; font-size:14px; }
  .seg{ display:flex; gap:6px; }
  .seg button{ padding:7px 14px; border-radius:12px; font-weight:900; font-size:13px; cursor:pointer;
               border:2px solid #c98a3a; background:#fff8e8; color:#7a4a12; }
  .seg button.on{ background:linear-gradient(#ffd766,#ffab2e); color:#3a2400; border-color:#b56b12; }
  .seg button:active{ transform:scale(.9); }
  input[type=range]{ flex:1; accent-color:#e08a2a; height:22px; }
  .closeX{ position:absolute; }
  .sheetbtn{ pointer-events:auto; display:block; width:100%; margin-top:12px; padding:13px; border:none; border-radius:16px;
             font-size:17px; font-weight:900; cursor:pointer; color:#3a2400;
             background:linear-gradient(#ffd766,#ffab2e); border-bottom:4px solid #b56b12; }
  .sheetbtn:active{ transform:translateY(2px); border-bottom-width:2px; }
  .sheetbtn.ghost{ background:#efe0c2; color:#7a4a12; border-bottom-color:#c9a15a; }

  /* Barracks unit rows */
  .ucard{ display:flex; gap:10px; align-items:center; background:#fff6e2; border:2px solid #e0c48a; border-radius:16px;
          padding:8px; margin:8px 0; }
  .ucard canvas{ width:52px;height:52px; background:#fbead0; border-radius:12px; flex:none; }
  .ucard .info{ flex:1; min-width:0; }
  .ucard .info b{ font-size:14px; }
  .ucard .lvl{ font-size:11px; opacity:.8; }
  .elempick{ display:flex; flex-wrap:wrap; gap:3px; margin-top:4px; }
  .elempick span{ font-size:13px; padding:1px 3px; border-radius:6px; cursor:pointer; border:2px solid transparent; }
  .elempick span.on{ border-color:#7a4a12; background:#fff; }
  .ucard .upg{ flex:none; padding:8px 10px; border-radius:12px; border:none; font-weight:900; font-size:12px; cursor:pointer;
               color:#3a2400; background:linear-gradient(#ffd766,#ffab2e); border-bottom:3px solid #b56b12; }
  .ucard .upg:active{ transform:translateY(2px); }
  .ucard .upg:disabled{ filter:grayscale(1) opacity(.6); }
  .gemchip{ display:inline-flex; align-items:center; gap:4px; font-weight:900; color:#7a3fb0; }
  .scoreline{ display:flex; justify-content:space-between; font-size:13px; margin:3px 0; }
  .scoreline b{ font-variant-numeric:tabular-nums; }
  .pathrow{ display:flex; gap:5px; margin-top:5px; }
  .pathbtn{ flex:1; text-align:left; padding:5px 7px; border-radius:10px; cursor:pointer; border:2px solid #d9bd82; background:#fff8ea; color:#5a3a12; transition:transform .08s; }
  .pathbtn.on{ border-color:#e0851a; background:linear-gradient(#ffe9b0,#ffd166); }
  .pathbtn:active{ transform:scale(.94); }
  .pathbtn b{ display:block; font-size:12px; }
  .pathbtn i{ display:block; font-size:9px; opacity:.82; font-style:normal; line-height:1.18; margin-top:1px; }

  /* ---------- Fun polish + Shop skill-tree UI ---------- */
  .bigrow{ display:flex; gap:10px; width:100%; max-width:340px; }
  .play.half{ flex:1; margin-top:0; padding:14px 8px; font-size:17px; }
  .play.half.up{ background:linear-gradient(#8fe0ff,#4aa8e8); border-bottom-color:#2a6f9f; color:#08243a; }
  /* summon-bar cards: chunkier, bouncier */
  #shop{ gap:7px; padding:9px 9px calc(9px + env(safe-area-inset-bottom)); }
  .card{ border-radius:16px; border-width:2px; }
  .card.locked{ filter:grayscale(.7) brightness(.6); }
  .card .lockicon{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:22px; filter:drop-shadow(0 2px 2px #000); }
  .chip{ padding:5px 14px; border-radius:22px; }
  /* shop tabs */
  .shoptabs{ display:flex; gap:8px; margin-bottom:12px; }
  .shoptab{ flex:1; padding:10px; border-radius:14px; font-weight:900; font-size:14px; cursor:pointer;
            border:2px solid #c98a3a; background:#fff8e8; color:#7a4a12; transition:transform .08s; }
  .shoptab.on{ background:linear-gradient(#ffd766,#ffab2e); color:#3a2400; border-color:#b56b12; box-shadow:0 3px 0 #c9871a; }
  .shoptab:active{ transform:scale(.94); }
  /* unit selector strip */
  .unitstrip{ display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin-bottom:10px; }
  .ustripbtn{ position:relative; width:52px; height:52px; border-radius:14px; cursor:pointer; padding:0; overflow:hidden;
              border:2px solid #d9bd82; background:#fbead0; transition:transform .08s; }
  .ustripbtn canvas{ width:52px; height:52px; }
  .ustripbtn.on{ border-color:#e0851a; background:#ffe9b0; transform:translateY(-3px) scale(1.06); box-shadow:0 4px 0 #c9871a; }
  .ustripbtn .ulock{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:20px; background:rgba(20,12,6,.45); }
  .treehd{ display:flex; align-items:baseline; justify-content:space-between; gap:8px; margin:2px 2px 8px; }
  .treehd b{ font-size:18px; color:#7a4a12; } .treehd span{ font-size:11px; opacity:.7; text-transform:capitalize; }
  .treehint{ font-size:12px; opacity:.75; text-align:center; margin:6px 4px; line-height:1.4; }
  /* the tree canvas */
  .tree{ position:relative; width:300px; height:352px; margin:4px auto 0; }
  .treelines{ position:absolute; inset:0; width:300px; height:352px; }
  .treelines .lon{ stroke:#e0851a; stroke-width:5; }
  .treelines .loff{ stroke:#d9c39a; stroke-width:4; stroke-dasharray:5 5; }
  .tnode{ position:absolute; width:62px; min-height:40px; border-radius:12px; cursor:pointer; padding:4px 3px;
          border:2px solid #b99; background:#efe0c2; color:#5a3a12; font-family:inherit; line-height:1.05;
          display:flex; flex-direction:column; align-items:center; justify-content:center; transition:transform .1s; }
  .tnode b{ font-size:10px; font-weight:900; }
  .tnode i{ font-size:9px; font-style:normal; color:#a05a12; font-weight:900; }
  .tnode.root{ border-color:#7a4a12; background:linear-gradient(#fff2c0,#ffd766); }
  .tnode.on{ border-color:#35c250; background:linear-gradient(#d6ffd9,#9fe8a8); box-shadow:0 0 0 2px #35c25055, 0 3px 6px rgba(0,0,0,.2); color:#1a5a2a; }
  .tnode.avail{ border-color:#e0851a; background:linear-gradient(#fff2d0,#ffe08a); box-shadow:0 3px 0 #c9871a; animation:pulseGlow 1.4s ease-in-out infinite; }
  .tnode.lock{ opacity:.5; filter:grayscale(.4); cursor:not-allowed; }
  .tnode.avail:active{ transform:scale(.92); }
  @keyframes pulseGlow{ 0%,100%{ box-shadow:0 3px 0 #c9871a, 0 0 0 0 rgba(255,170,46,.5);} 50%{ box-shadow:0 3px 0 #c9871a, 0 0 0 6px rgba(255,170,46,0);} }
  /* commander pips */
  .gdesc{ font-size:10px; opacity:.72; margin-top:2px; }
  .pips{ display:flex; gap:3px; margin-top:5px; }
  .pip{ width:14px; height:8px; border-radius:3px; background:#d9c39a; }
  .pip.on{ background:linear-gradient(#ffd766,#e0851a); }
</style>
</head>
<body>
<div id="app">
  <canvas id="battle"></canvas>
  <div id="hiscore"><span>🏆</span><span class="t">TOTAL</span><span id="hiscoreVal">0</span></div>

  <div id="hud">
    <div class="bars">
      <div class="barwrap">
        <div class="barlabel"><span data-i18n="yourKeep">🏰 YOUR KEEP</span><span id="pHpTxt">1000</span></div>
        <div class="bar"><i class="lag" id="pHpLag"></i><i id="pHp"></i></div>
      </div>
      <div class="barwrap">
        <div class="barlabel"><span id="eHpTxt" style="text-align:left">1000</span><span data-i18n="enemyKeep">ENEMY 🗼</span></div>
        <div class="bar enemy"><i class="lag" id="eHpLag"></i><i id="eHp"></i></div>
      </div>
    </div>
    <div class="midrow">
      <button class="iconbtn" id="gearBtn" title="Settings">⚙️</button>
      <div class="chip"><span class="coin"></span><span id="gold">100</span></div>
      <div class="chip" id="wave">Lv <span id="lvl">1</span></div>
      <button class="iconbtn" id="pauseBtn" title="Pause">⏸</button>
    </div>
  </div>

  <div id="toast"></div>
  <button id="spellBtn"><span class="ico">☄️</span><span class="sc"></span><span class="lbl" id="spellLbl">METEOR</span></button>
  <div id="shop"></div>

  <!-- Language + start splash -->
  <div class="screen" id="startScreen">
    <div class="title">REALM<br>VIBE<br>RUSH</div>
    <div class="langrow">
      <button class="langbtn" id="langEn" data-lang="en">🇬🇧 English</button>
      <button class="langbtn" id="langKo" data-lang="ko">🇰🇷 한국어</button>
    </div>
    <div class="sub" id="storyText"></div>
    <button class="play" id="continueBtn" data-i18n="continue" style="display:none">▶ CONTINUE</button>
    <button class="play" id="startBtn" data-i18n="gameStart" style="font-size:16px;padding:10px 26px">▶ GAME START</button>
    <div class="langrow">
      <button class="langbtn" id="barracksBtn" style="font-size:13px" data-i18n="barracks">⚔️ BARRACKS</button>
    </div>
    <div class="hintrow" data-i18n="hint">Tap cards · or press 1–6</div>
  </div>

  <!-- End of level -->
  <div class="screen hide" id="endScreen">
    <div class="title" id="endTitle">VICTORY</div>
    <div class="big" id="endMsg"></div>
    <div class="sub" id="endSub"></div>
    <div id="scoreBox" style="width:100%;max-width:280px"></div>
    <div class="bigrow">
      <button class="play half up" id="endBarracksBtn" data-i18n="upgrade">⬆️ UPGRADE</button>
      <button class="play half" id="againBtn" data-i18n="nextLevel">▶ NEXT LEVEL</button>
    </div>
    <button class="langbtn" id="shareBtn" style="font-size:13px" data-i18n="share">📸 SHARE CARD</button>
  </div>

  <!-- Settings bubble -->
  <div class="sheet hide" id="settingsScreen">
    <div class="bubble">
      <h2 data-i18n="settings">⚙️ SETTINGS</h2>
      <div class="row"><label data-i18n="language">Language</label>
        <div class="seg" id="langSeg"><button data-lang="en">EN</button><button data-lang="ko">한국어</button></div></div>
      <div class="row"><label data-i18n="music">🎵 Music</label><input type="range" id="musicVol" min="0" max="100" value="16"></div>
      <div class="row"><label data-i18n="sfx">🔊 Sound</label><input type="range" id="sfxVol" min="0" max="100" value="55"></div>
      <button class="sheetbtn" id="settingsClose" data-i18n="close">CLOSE</button>
      <button class="sheetbtn ghost" id="wipeBtn" data-i18n="wipe" style="font-size:12px;margin-top:8px">Erase all progress</button>
    </div>
  </div>

  <!-- Barracks / upgrade bubble -->
  <div class="sheet hide" id="barracksScreen">
    <div class="bubble">
      <h2 data-i18n="barracks">⚔️ BARRACKS</h2>

  const r = cv.getBoundingClientRect();

  W = r.width; H = r.height;
  cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);

const Sound = (()=>{
  let ac=null, master=null, musicGain=null, sfxGain=null, muted=false, musicTimer=null, step=0;
  let musicVol=0.16, sfxVol=0.55;
  function ensure(){
    if(ac) return;
    ac = new (window.AudioContext||window.webkitAudioContext)();
    master = ac.createGain(); master.gain.value = 0.9; master.connect(ac.destination);
    musicGain = ac.createGain(); musicGain.gain.value = muted?0:musicVol; musicGain.connect(master);
    sfxGain = ac.createGain(); sfxGain.gain.value = muted?0:sfxVol; sfxGain.connect(master);
  }
  function tone(freq, dur, type='sine', dst=null, vol=1, slideTo=null){
    if(!ac||muted) return;
    const o=ac.createOsc?ac.createOsc():ac.createOscillator();
    const g=ac.createGain();
    o.type=type; o.frequency.setValueAtTime(freq, ac.currentTime);
    if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, ac.currentTime+dur);
    g.gain.setValueAtTime(0.0001, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(vol, ac.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime+dur);
    o.connect(g); g.connect(dst||sfxGain); o.start(); o.stop(ac.currentTime+dur+0.02);
  }
  function noise(dur, vol=0.4, filterFreq=1200){
    if(!ac||muted) return;
    const n=ac.createBufferSource();
    const buf=ac.createBuffer(1, ac.sampleRate*dur, ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
    n.buffer=buf;
    const f=ac.createBiquadFilter(); f.type='bandpass'; f.frequency.value=filterFreq;
    const g=ac.createGain(); g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime+dur);
    n.connect(f); f.connect(g); g.connect(sfxGain); n.start(); n.stop(ac.currentTime+dur+0.02);
  }
  // Music: gentle 8-step epic-ish loop
  const scale=[196,220,246.9,261.6,293.7,329.6,392]; // G minor-ish
  const bassSeq=[98,98,116.5,130.8, 98,98,87.3,73.4];
  function musicStep(){
    if(!ac||muted) return;
    const b=bassSeq[step%bassSeq.length];
    tone(b,0.42,'triangle',musicGain,0.9);
    if(step%2===0){ const n=scale[(step*3)%scale.length]; tone(n,0.5,'sawtooth',musicGain,0.32); }
    if(step%4===0){ tone(scale[0]*2,0.9,'sine',musicGain,0.25); }
    step++;
  }
  return {
    unlock(){ ensure(); if(ac.state==='suspended') ac.resume(); },
    startMusic(){ ensure(); if(musicTimer) return; musicStep(); musicTimer=setInterval(musicStep,300); },
    stopMusic(){ if(musicTimer){clearInterval(musicTimer);musicTimer=null;} },
    toggle(){ muted=!muted; if(musicGain) musicGain.gain.value = muted?0:musicVol; if(sfxGain) sfxGain.gain.value = muted?0:sfxVol; return muted; },
    setMusic(v){ musicVol=v; if(musicGain) musicGain.gain.value=muted?0:v; },
    setSfx(v){ sfxVol=v; if(sfxGain) sfxGain.gain.value=muted?0:v; },
    click(){ tone(660,0.05,'square',null,0.18,880); },
    boom(){ noise(0.4,0.7,300); tone(70,0.5,'sawtooth',null,0.4,40); tone(200,0.3,'square',null,0.2); },
    // SFX
    coin(){ tone(880,0.08,'square',null,0.25,1320); },
    spawn(){ tone(300,0.12,'sawtooth',null,0.3,520); },
    swordHit(){ noise(0.09,0.5,2600); tone(220,0.06,'square',null,0.15); },
    arrow(){ tone(900,0.12,'triangle',null,0.2,300); },
    magic(){ tone(500,0.25,'sine',null,0.3,1400); tone(760,0.25,'sine',null,0.2,1900); },
    heal(){ tone(660,0.2,'sine',null,0.25,990); tone(990,0.25,'sine',null,0.18,1320); },
    die(){ tone(200,0.3,'sawtooth',null,0.3,60); },
    baseHit(){ noise(0.2,0.6,400); tone(90,0.25,'square',null,0.35,55); },
    win(){ [523,659,784,1046].forEach((f,i)=> setTimeout(()=>tone(f,0.35,'triangle',null,0.4),i*130)); },
    lose(){ [392,330,262,196].forEach((f,i)=> setTimeout(()=>tone(f,0.4,'sawtooth',null,0.35),i*160)); }
  };
})();

    out.push({id:p+'2',tier:2,branch:bk,requires:p+'1',cost:14,name:br.t2.name,mul:br.t2.mul});
    out.push({id:p+'3',tier:3,branch:bk,requires:p+'2',cost:22,name:br.el.name,element:br.el.element,mul:br.el.mul});
    out.push({id:p+'4',tier:4,branch:bk,requires:p+'3',cost:34,name:br.cap.name,mul:br.cap.mul,capstone:true});

}
const TREES={}; Object.keys(TREE_SPEC).forEach(k=>TREES[k]=buildTree(k));
function nodeUnlocked(key,id){ return !!treeSave(key)[id]; }
function activeBranch(key){ const t=treeSave(key); for(const n of TREES[key]||[]) if(!n.root && t[n.id]) return n.branch; return null; }
function canUnlock(key,node){
  if(!node || node.root || nodeUnlocked(key,node.id)) return false;
  if(node.requires && !nodeUnlocked(key,node.requires)) return false;
  const ab=activeBranch(key); if(ab && node.branch && node.branch!==ab) return false;   // branch-exclusive
  return true;
}
function unitBuild(key){
  const t=treeSave(key), R={mul:{},set:{},look:{},element:null,count:0,branch:null,deepName:null};
  (TREES[key]||[]).forEach(n=>{ if(n.root||!t[n.id]) return; R.count++; R.branch=n.branch; R.deepName=n.name;
    if(n.mul) for(const k in n.mul) R.mul[k]=(R.mul[k]||1)*n.mul[k];
    if(n.set) Object.assign(R.set,n.set);
    if(n.look) for(const k in n.look){ if(k==='pal') R.look.pal=Object.assign(R.look.pal||{},n.look.pal); else R.look[k]=n.look[k]; }
    if(n.element) R.element=n.element;
  });
  R.evo = R.count>=4?2 : R.count>=2?1 : 0;
  return R;
}
function evoTierOf(key){ return unitBuild(key).evo; }
function displayName(key){ const b=unitBuild(key), base=(UNITS[key]&&UNITS[key].name)||key;
  return (b.evo===2?'🌟 ':b.evo===1?'⭐ ':'')+(b.deepName||base); }
function effectiveDef(key){
  const base=UNITS[key], b=unitBuild(key), d=Object.assign({},base);
  for(const k in b.set){ if(b.set[k]===null) delete d[k]; else d[k]=b.set[k]; }
  for(const k in b.look){ if(k==='pal') d.pal=Object.assign({},base.pal,b.look.pal); else d[k]=b.look[k]; }
  return d;
}
// effective def with element tint baked into the palette (for Shop/card portraits)
function shopDef(key){ const b=unitBuild(key); let d=effectiveDef(key);
  if(b.element && b.element!=='Normal') d=Object.assign({},d,{pal:elemTintPal(d.pal,b.element)}); return d; }
/* ==================== STAT PIPELINE (base→tree→element) ================= */
function resolveStats(baseDef, opts){
  opts=opts||{}; const mul=opts.mul||{};
  const s=Object.assign({}, baseDef);
  s.hp    = Math.round((baseDef.hp||1)   * (mul.hp||1) * (opts.hpMul||1));
  s.dmg   = Math.round((baseDef.dmg||0)  * (mul.dmg||1));
  if(baseDef.heal!==undefined) s.heal = Math.round((baseDef.heal||0) * (mul.heal||1));
  s.range = Math.round((baseDef.range||0)* (mul.range||1));
  s.speed = (baseDef.speed||0) * (mul.speed||1);
  s.atk   = (baseDef.atk||1)   * (mul.atk||1);
  s.splash= (baseDef.splash||0)* (mul.splash||1);
  s.element = opts.element || baseDef.element || 'Normal';
  s.cls = baseDef.cls || 'melee';
  return s;
}

/* ===================== LEVEL GENERATOR (mirror of scripts/gen-stages.js) = */
function buildLevels(){
  const TYPESN=['Normal','Metal','Monster','Fire','Water','Earth','Lightning','Poison','Ghost','Arcane'];
  const THEME={
    Normal:{theme:'day',sky:['#bfe7ff','#cfeecb','#e9f5c9'],ground:['#5ba14a','#3f7d33','#2f5f27'],hillFar:'#a7d98f',hillNear:'#7cc267',tree:'#3f8f4a'},

    Fire:{theme:'lava',sky:['#3a0f0a','#7a2410','#c9401a'],ground:['#5a1f10','#3a140a','#200a05'],hillFar:'#7a2f18',hillNear:'#5a2010',tree:'#3a1a0f'},

    Earth:{theme:'day',sky:['#f0d9a8','#e0bd7a','#caa15a'],ground:['#b07a3a','#8a5c28','#5f3f18'],hillFar:'#c9a15a',hillNear:'#a07c3a',tree:'#8a7a3a'},
    Lightning:{theme:'night',sky:['#2a2c3f','#3a3d55','#4a4d6a'],ground:['#3a3d20','#2a2c18','#1a1c10'],hillFar:'#4a4d3a',hillNear:'#38402c',tree:'#5a5d2a'},
    Poison:{theme:'day',sky:['#c9e0a0','#a0c060','#7fa040'],ground:['#4a6a2a','#3a5220','#243615'],hillFar:'#7fa04a',hillNear:'#5f8030',tree:'#3f6a2a'},
    Ghost:{theme:'night',sky:['#3a2b5c','#4a3170','#5a3d7a'],ground:['#3a3450','#2a2540','#1a1730'],hillFar:'#4a3f66',hillNear:'#38304f',tree:'#2f3a5a'},
    Arcane:{theme:'night',sky:['#1c2a5c','#2f3d8a','#4a5db0'],ground:['#2a2f5a','#1f2444','#12172a'],hillFar:'#3a4f8f',hillNear:'#2f3d6a',tree:'#3a4a8f'},
  };
  function shapesFor(L){
    if(L<=3)  return ['mouse','mouse'];
    if(L<=6)  return ['mouse','mouse','slinger','bat'];
    if(L<=10) return ['mouse','slinger','slinger','brute','bat'];
    if(L<=30) return ['mouse','slinger','brute','brute','bat','warlock'];
    return ['slinger','brute','brute','warlock','yeti','bat'];
  }
  const NAMES={Normal:['Green Meadow','Sunny Field','Rolling Downs','Quiet Pasture'],Metal:['Iron Gate','Steelworks','Rustpile Ridge','The Foundry'],Monster:['Beast Hollow','Fang Thicket','Howling Woods','Den of Maws'],Fire:['Ember Ridge','Molten Pass','Cinder Wastes','Ashfall Rim'],Water:['Tidal Shore','Coral Reach','Sunken Causeway','Mistport'],Earth:['Dust Canyon','Boulder Pass','Clay Flats','Quarry Road'],Lightning:['Storm Mesa','Thunder Peak','Static Fields','Voltcrag'],Poison:['Toxic Marsh','Bog of Fumes','Blight Fen','Miasma Reach'],Ghost:['Haunted Graveyard','Wraith Hollow','Moonlit Crypt','Pale Cairn'],Arcane:['Rune Nexus','Astral Verge','The Weave','Starfall Sanctum']};
  function rng(seed){ let a=seed>>>0; return function(){ a|=0;a=a+0x6D2B79F5|0; let x=Math.imul(a^a>>>15,1|a); x=x+Math.imul(x^x>>>7,61|x)^x; return ((x^x>>>14)>>>0)/4294967296; }; }
  const pick=(r,arr)=>arr[Math.floor(r()*arr.length)];
  const levels=[];
  for(let L=1; L<=100; L++){
    const r=rng(L*2654435761); const boss=(L%10===0);
    let element, element2=null;
    if(L<=3){ element='Normal'; }
    else if(L<=10){ element = L===10 ? 'Fire' : ['Metal','Poison','Water','Fire','Metal','Poison','Water'][(L-4)%7]; }
    else { element=TYPESN[1+((L-11)%9)]; if(L>=25) element2=TYPESN[1+((L-11+3)%9)]; if(element2===element) element2=null; }
    const th=THEME[element]||THEME.Normal;

    const startGold = L<=3 ? 200 : 150 + Math.floor(L/6)*10;
    const income = L<=3 ? 12 : Math.round((9.5 + L*0.28)*10)/10;
    const budgetRate = L<=3 ? Math.round((2.0 + L*0.2)*10)/10 : Math.round((4.8 + (L-4)*0.4)*10)/10;
    const roster = shapesFor(L).map((tt,idx)=>({ t:tt, el:(element2 && idx%2===1)?element2:element }));
    if(L>3){ const feat=roster[Math.floor(r()*roster.length)].t; roster.push({t:feat,el:element},{t:feat,el:element}); }
    let bossDef=null; if(boss){ const bt=L>=50?'yeti':(L>=20?'brute':'yeti'); bossDef={t:bt,el:element,hpMul:5+Math.floor(L/20),name:'Warlord '+pick(r,['Grimtail','Cinderfang','Vorlok','Mossback','Ironhide'])}; }
    const reward=(L<=3?3:5+Math.floor(L/10)*2)+(boss?15:0);
    const parTime=Math.round(18+baseHp/55);
    const nm=(NAMES[element]?pick(r,NAMES[element]):'Stage').trim()+' · Lv'+L;
    levels.push({level:L,name:nm,theme:th.theme,element,element2,baseHp,startGold,income,budgetRate,roster,boss:bossDef,reward,parTime,sky:th.sky,ground:th.ground,hillFar:th.hillFar,hillNear:th.hillNear,tree:th.tree,tutorial:L<=3});
  }
  return levels;
}

async function loadJSON(path, fallback){
  try{
    const r = await fetch(path, {cache:'no-store'});
    if(!r.ok) throw new Error(r.status);
    return await r.json();
  }catch(e){
    console.warn('Using inline fallback for '+path+' ('+e+')');
    return fallback;
  }
}
async function loadData(){
  const [u,e,s,ty] = await Promise.all([
    loadJSON('data/units.json', FALLBACK.units),
    loadJSON('data/enemies.json', FALLBACK.enemies),
    loadJSON('data/stages.json', FALLBACK.stages),
    loadJSON('data/types.json', TYPES),
  ]);
  SHOP_ORDER = u._order || Object.keys(u).filter(k=>k[0]!=='_');
  UNITS = {}; SHOP_ORDER.forEach(k=> UNITS[k]=u[k]);
  ENEMIES = e;
  STAGES = (Array.isArray(s) && s.length) ? s : FALLBACK.stages;
  if(ty && ty.types) TYPES = ty;
}
// stage for a level (scales past the authored 100 for the truly obsessed)
function stageFor(level){
  if(level>=1 && level <= STAGES.length) return STAGES[level-1];
  const base = STAGES[STAGES.length-1], over = level - STAGES.length;
  return Object.assign({}, base, {
    level, name: base.name+' +'+over,
    baseHp: Math.round(base.baseHp*Math.pow(1.05,over)),
    income: base.income+over*1.5, budgetRate: base.budgetRate+over*1.2,
  });
}

let uid=0;
function spawnUnit(key, side, opts){
  opts=opts||{};
  const build = side==='player' ? unitBuild(key) : null;
  const def = side==='player' ? effectiveDef(key) : ENEMIES[key];
  if(!def) return null;
  const stats = resolveStats(def, {
    element: opts.element || (side==='player' ? (build.element||'Normal') : (def.element||'Normal')),
    hpMul: opts.hpMul||1,
    mul: opts.mul || (build ? build.mul : null),
  });
  const facing = side==='player' ? 1 : -1;
  const boss = !!opts.boss;
  const evo = build ? build.evo : 0;
  const x = side==='player' ? state.pTowerX+18 : state.eTowerX-18;
  const flying = !!def.flying;
  const u = {
    id:++uid, key, side, def, stats, element:stats.element, cls:stats.cls, boss, elite:!!opts.elite, bossName:opts.bossName, evo, flying, aoe:opts.aoe||0,
    pal: (stats.element && stats.element!=='Normal') ? elemTintPal(def.pal, stats.element) : def.pal,
    facing, x, y: groundY, lane: rand(-16,10), flyBob: rand(0,6.28),
    sizeMul: (boss?(opts.bossSize||1.7):1)*(evo===2?1.28:evo===1?1.12:1),
    hp: stats.hp, hpMax: stats.hp, hpShown: stats.hp,
    atkCd:0, walkPhase: rand(0,6.28), state:'walk',
    swing:0, hitFlash:0, dead:false, deathT:0, spawnT:0,
    target:null,
  };
  (side==='player'? state.units : state.enemies).push(u);
  Sound.spawn();
  return u;
}

function tryBuy(key){
  if(!state || !state.running || state.over || state.paused) return;
  if(!owned(key)){ toast('🔒 '+t('unlockInShop')); return; }
  const def = UNITS[key];
  if(state.gold < def.cost){ toast(t('notEnoughGold')); return; }
  if((state.cds[key]||0) > 0){ return; }
  state.gold -= def.cost;
  state.cds[key] = def.cd;
  spawnUnit(key,'player');
  flashCard(key);
}

/* ------------------------------- Combat -------------------------------- */
function canHitFlyers(u){ return u.def.role==='ranged' && !u.def.noAir; }   // catapult noAir → ground only
function nearestEnemyOf(u, list, ignoreFlying){
  let best=null, bd=1e9;
  for(const e of list){
    if(e.dead) continue;
    if(ignoreFlying && e.flying) continue;
    const d = Math.abs(e.x - u.x);
    if(d<bd){ bd=d; best=e; }
  }
  return best ? {t:best, d:bd} : null;
}
function nearestInRange(list, x, range){
  let best=null, bd=range;
  for(const e of list){ if(e.dead) continue; const d=Math.abs(e.x-x); if(d<bd){ bd=d; best=e; } }
  return best;
}
function entYTop(e){ return e.y-30+e.lane+(e.flying?-46:0); } // fx anchor (flyers hover higher)
function fireProjectile(from, target, kind){
  const st = from.stats||from.def;
  const fy = from.y - 34 + from.lane + (from.flying?-46:0);
  const p = {
    x: from.x + from.facing*14, y: fy, side:from.side, facing:from.facing,
    tx: target?target.x:from.x+from.facing*200, ty: target?entYTop(target)+2:fy,
    kind, dmg: st.dmg, splash: st.splash||0, life:2.2, spin: kind==='magic'?rand(0,6):0,
    heal: st.heal||0, element: from.element||'Normal', cls: from.cls||st.cls||null, noAir: !!from.def.noAir,
  };
  const dx=p.tx-p.x, dy=p.ty-p.y, dist=Math.hypot(dx,dy)||1;
  const spd = kind==='arrow'?470: kind==='boulder'?300: kind==='magic'?300:520;
  p.vx = dx/dist*spd; p.vy = dy/dist*spd; p.arc = kind==='arrow'? -dist*0.28 : kind==='boulder'? -dist*0.55 : 0;
  p.t=0;
  state.projectiles.push(p);
  if(kind==='arrow') Sound.arrow(); else if(kind==='heal') Sound.heal(); else if(kind==='boulder') Sound.boom(); else Sound.magic();
}

function damageEntity(e, dmg, atkEl, atkCls){
  const em = atkEl ? typeMult(atkEl, e.element) : 1;
  const cm = atkCls ? classMult(atkCls, e.cls) : 1;
  const mult = em*cm;
  const fin = Math.max(1, Math.round(dmg*mult));
  e.hp -= fin; e.hitFlash = 0.2;
  const superHit = mult>1.15, weakHit = mult<0.85;
  const yTop = entYTop(e);
  const base = e.side==='player' ? '#ff6a6a' : '#ffd23a';    // your units bleed red; enemies take gold
  const col = superHit ? (em>1.01?elemColor(atkEl):'#ffec5a') : (weakHit ? '#b8c0cc' : base);
  const sz = clamp(15 + Math.sqrt(fin)*0.95, 16, 44) * (superHit?1.15:1);
  spawnFloat(e.x, yTop-14, ''+fin, col, {size:sz, crit:superHit, vy:-58, life:1.0});
  if(superHit){ spawnFloat(e.x, yTop-42, 'SUPER!', col, {size:15, crit:true, vy:-42, vx:0}); addShake(0.3); hitStop=Math.max(hitStop,0.05); spawnRing(e.x, yTop+2, col); }
  else if(weakHit){ spawnFloat(e.x, yTop-40, 'resist', '#8f99a6', {size:12, vy:-34, vx:0}); }
  const pc = (atkEl && atkEl!=='Normal') ? elemColor(atkEl) : (e.side==='player'?'#ffd27a':'#ff9a9a');
  const n = superHit?12:6;
  for(let i=0;i<n;i++) spawnParticle(e.x, yTop+2, pc);
  if(e.hp<=0 && !e.dead){ e.dead=true; e.state='dead'; e.deathT=0; Sound.die(); spawnRing(e.x,yTop+2,pc); for(let i=0;i<10;i++) spawnParticle(e.x,yTop+2,pc); }
}
function healEntity(e, amt){
  e.hp = Math.min(e.hpMax, e.hp+amt);
  spawnFloat(e.x, entYTop(e)-16, '+'+Math.round(amt), '#6dffa0', {size:18, crit:true, vy:-52});
  for(let i=0;i<5;i++) spawnParticle(e.x, entYTop(e)+2, '#8dffab');
}

/* ------------------------------ Particles / FX ------------------------- */
function spawnParticle(x,y,color){
  state.particles.push({x,y,vx:rand(-70,70),vy:rand(-140,-30),life:rand(0.3,0.6),t:0,color,r:rand(2,4)});
}
function spawnFloat(x,y,txt,color,opts){
  if(opts===true) opts={screen:true}; opts=opts||{};
  state.floats.push({x,y,txt,color,t:0, life:opts.life||0.9,
    vy: opts.vy!=null?opts.vy:-46, vx: opts.vx!=null?opts.vx:rand(-14,14),
    size: opts.size||16, crit:!!opts.crit, screen:!!opts.screen});
}
function spawnSlash(x,y,color,facing,kind){ state.fx.push({type:'slash',x,y,color,facing:facing||1,t:0,life:kind==='heavy'?0.3:0.22,rot:rand(-0.3,0.3),kind:kind||'slash'}); }
function spawnRing(x,y,color,big){ state.fx.push({type:'ring',x,y,color,t:0,life:big?0.5:0.34,big:!!big}); }
function spawnMuzzle(x,y,color){ state.fx.push({type:'muzzle',x,y,color,t:0,life:0.16}); }
function spawnCast(x,y,color){ state.fx.push({type:'cast',x,y,color,t:0,life:0.4}); }
function spawnStar(x,y,color){ state.fx.push({type:'star',x,y,color,t:0,life:0.28,rot:rand(0,6)}); }

/* =============================== UPDATE ================================= */
function update(dt){
  if(!state.running || state.paused || state.over) return;
  state.t += dt;

  // income
  state.incomeAcc += dt;
  if(state.incomeAcc >= state.incomeTick){
    state.incomeAcc -= state.incomeTick;
    const inc = Math.round(state.incomeRate * incomeMul());
    state.gold += inc; state.goldAcquired += inc;
    spawnFloat(W*0.5-40, 116, '+'+inc, '#ffe08a', {screen:true, size:18, crit:true, vy:-30, vx:0});
    Sound.coin();
  }

  // enemy AI spawns using a growing budget; roster entries are {t,el}
  state.enemySpawnAcc += dt;
  state.enemyBudget += state.enemyBudgetRate*dt;
  if(state.enemySpawnAcc > 1.4 && state.enemies.length < 16){
    const affordable = state.enemyRoster.filter(r=> ENEMIES[r.t] && ENEMIES[r.t].budget <= state.enemyBudget);
    if(affordable.length){
      const r = affordable[Math.floor(rand(0,affordable.length))];
      state.enemyBudget -= ENEMIES[r.t].budget;
      state.enemySpawnAcc = 0;
      spawnUnit(r.t,'enemy',{ element:r.el });
    }
  }
  // boss charges out once the enemy keep is badly wounded — huge, flashy, AoE slams
  if(state.bossDef && !state.bossSpawned && state.eHp <= state.eHpMax*0.45){
    state.bossSpawned=true;
    const b=state.bossDef;
    spawnUnit(b.t,'enemy',{ element:b.el, hpMul:b.hpMul, mul:{dmg:1.25}, boss:true, bossName:b.name, bossSize:2.0, aoe:74 });
    toast('👹 '+(b.name||'BOSS')+'!'); addShake(1.0); hitStop=0.1;
  }
  // elite mini-bosses from stage 4+ — tougher, bigger, small AoE, appear periodically
  if(state.level>=4 && state.enemies.length<15){
    state.eliteAcc += dt;
    if(state.eliteAcc >= state.eliteEvery){
      state.eliteAcc = 0;
      const pool = state.enemyRoster.filter(r=>ENEMIES[r.t]);
      const tanky = pool.filter(r=>r.t==='brute'||r.t==='yeti');
      const pickR = (tanky.length?tanky:pool)[Math.floor(rand(0,(tanky.length?tanky:pool).length))];
      if(pickR){ const nm='Elite '+ENEMIES[pickR.t].name;
        spawnUnit(pickR.t,'enemy',{ element:pickR.el, hpMul:2.6, mul:{dmg:1.3}, boss:true, elite:true, bossName:nm, bossSize:1.45, aoe:46 });
        toast('⚔️ '+nm+'!'); addShake(0.4);
      }
    }
  }

  // keep defenses — ARAM-style towers shoot the nearest foe in range
  state.pTowerCd-=dt; state.eTowerCd-=dt;
  if(state.pTowerCd<=0){ const tg=nearestInRange(state.enemies, state.pTowerX, 285); if(tg){ towerShot('player',tg); state.pTowerCd=1.2; } }
  if(state.eTowerCd<=0){ const tg=nearestInRange(state.units,   state.eTowerX, 285); if(tg){ towerShot('enemy', tg); state.eTowerCd=1.2; } }

  // cooldowns
  for(const k in state.cds){ if(state.cds[k]>0) state.cds[k]=Math.max(0,state.cds[k]-dt); }
  if(state.spellCd>0) state.spellCd=Math.max(0,state.spellCd-dt);
  if(state.spellFx>0) state.spellFx=Math.max(0,state.spellFx-dt);

  updateSide(state.units, state.enemies, dt, +1, 'enemyBase');
  updateSide(state.enemies, state.units, dt, -1, 'playerBase');
  updateProjectiles(dt);

  // particles & floats
  for(const p of state.particles){ p.t+=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=380*dt; }
  state.particles = state.particles.filter(p=>p.t<p.life);
  for(const f of state.floats){ f.t+=dt; f.y+=f.vy*dt; f.vy+=70*dt; f.x+=(f.vx||0)*dt; }
  state.floats = state.floats.filter(f=>f.t<f.life);
  for(const x of state.fx){ x.t+=dt; }
  state.fx = state.fx.filter(x=>x.t<x.life);
  // white-chip HP: shown bar eases down toward real HP (snaps up on heal)
  const easeHp=u=>{ if(u.hpShown==null) u.hpShown=u.hp; else if(u.hp<u.hpShown) u.hpShown += (u.hp-u.hpShown)*Math.min(1,dt*4); else u.hpShown=u.hp; };
  state.units.forEach(easeHp); state.enemies.forEach(easeHp);
  if(state.pHpShown==null) state.pHpShown=state.pHp; else if(state.pHp<state.pHpShown) state.pHpShown+=(state.pHp-state.pHpShown)*Math.min(1,dt*2.5); else state.pHpShown=state.pHp;
  if(state.eHpShown==null) state.eHpShown=state.eHp; else if(state.eHp<state.eHpShown) state.eHpShown+=(state.eHp-state.eHpShown)*Math.min(1,dt*2.5); else state.eHpShown=state.eHp;

  // cleanup dead after fade
  state.units = state.units.filter(u=> !(u.dead && u.deathT>0.7));
  state.enemies = state.enemies.filter(u=> !(u.dead && u.deathT>0.7));

  if(state.shake>0){ state.shakeT+=dt; state.shake=Math.max(0,state.shake-dt*2.2); }

  // win / lose
  if(state.eHp<=0){ endGame(true); }
  else if(state.pHp<=0){ endGame(false); }

  syncHUD();
}

function updateSide(list, foes, dt, dir, baseTarget){
  for(const u of list){
    if(u.dead){ u.deathT+=dt; continue; }
    if(u.spawnT<1) u.spawnT=Math.min(1,u.spawnT+dt*4);
    u.hitFlash = Math.max(0, u.hitFlash-dt);
    u.atkCd = Math.max(0, u.atkCd-dt);
    const def=u.def, st=u.stats;

    // healer logic: find hurt ally
    if(def.role==='healer'){
      let best=null,bd=1e9;
      for(const a of list){ if(a===u||a.dead) continue; if(a.hp<a.hpMax-1){ const d=Math.abs(a.x-u.x); if(d<st.range && d<bd){bd=d;best=a;} } }
      const nf = nearestEnemyOf(u, foes);
      const stopEnemy = nf ? nf.d <= st.range+90 : false;
      marchOrHold(u, dt, stopEnemy || best, dir);
      if(best && u.atkCd<=0){ u.state='attack'; u.swing=1; u.atkCd=st.atk; fireProjectile(u,best,'heal'); }
      u.swing = Math.max(0, u.swing - dt*4.5);
      u.walkPhase += dt*(u.state==='walk'? st.speed*0.09 : 3);
      continue;
    }

    const nf = nearestEnemyOf(u, foes, !canHitFlyers(u));   // melee & catapult ignore flyers
    let engage=false, tgt=null;
    if(nf && nf.d <= st.range){ engage=true; tgt=nf.t; }
    else if(!nf){
      const baseX = dir>0 ? state.eTowerX : state.pTowerX;
      if(Math.abs(u.x-baseX) <= st.range+6){ engage=true; tgt=null; }
    }

    if(engage){
      u.state='fight';
      if(u.atkCd<=0){
        u.atkCd=st.atk; u.swing=1;
        const ec=(u.element&&u.element!=='Normal')?elemColor(u.element):null;
        if(def.role==='ranged' && tgt){
          fireProjectile(u, tgt, def.proj);
          const mz = ec||(def.proj==='magic'?'#c9a2ff':def.proj==='boulder'?'#caa15a':'#ffe6a0');
          spawnMuzzle(u.x+u.facing*14, u.y-34+u.lane, mz);
          if(def.proj==='magic') spawnCast(u.x+u.facing*10, u.y-34+u.lane, ec||'#c9a2ff');     // caster rune ring
          else if(def.proj==='boulder'){ for(let i=0;i<4;i++) spawnParticle(u.x+u.facing*6, u.y-6+u.lane, '#8a6a3a'); } // launch dust
        }
        else if(def.role==='ranged' && !tgt){ damageBase(baseTarget, st.dmg); }
        else {
          if(tgt){
            const slashCol = ec||'#ffffff';
            if(u.aoe){ // boss/elite SLAM — hits everything near the target
              for(const foe of foes){ if(foe.dead) continue; if(Math.abs(foe.x-tgt.x) < u.aoe) damageEntity(foe, st.dmg, u.element, u.cls); }
              spawnSlash(tgt.x, entYTop(tgt), slashCol, u.facing, 'heavy'); spawnRing(tgt.x, entYTop(tgt), slashCol, true);
              addShake(0.5); hitStop=Math.max(hitStop,0.06); Sound.boom();
            } else {
              damageEntity(tgt, st.dmg, u.element, u.cls); Sound.swordHit();
              const wk=def.weapon, kind = wk==='axe'?'heavy' : wk==='club'?'smash' : 'slash';
              spawnSlash(tgt.x, entYTop(tgt), slashCol, u.facing, kind);
              if(kind==='heavy'){ spawnRing(tgt.x, entYTop(tgt), slashCol); addShake(0.16); }
              else if(kind==='smash'){ spawnStar(tgt.x, entYTop(tgt), slashCol); addShake(0.14); }
            }
          }
          else { damageBase(baseTarget, st.dmg); }
        }
      }
    } else {
      marchOrHold(u, dt, false, dir);
    }
    u.swing = Math.max(0, u.swing - dt*4.5);
    u.walkPhase += dt* (u.state==='walk'? st.speed*0.09 : 3);
  }
}

function marchOrHold(u, dt, holdBecauseEnemyClose, dir){
  const spd=(u.stats||u.def).speed;
  // Units march freely and pass through friendly units (no queue) — they only
  // stop to fight an enemy in range or when they reach the enemy base.
  let nextX = u.x + dir*spd*dt;
  if(dir>0) nextX = Math.min(nextX, state.eTowerX-10);
  else nextX = Math.max(nextX, state.pTowerX+10);

  if(holdBecauseEnemyClose){ u.state='fight'; }
  else { u.state='walk'; u.x = nextX; }
}

function damageBase(which, dmg){
  if(which==='enemyBase'){ state.eHp=Math.max(0,state.eHp-dmg); addShake(0.4);
    spawnFloat(state.eTowerX-6, groundY-120, ''+Math.round(dmg), '#ffec5a', {size:22, crit:true, vy:-54}); }
  else { state.pHp=Math.max(0,state.pHp-dmg); addShake(0.5);
    spawnFloat(state.pTowerX+6, groundY-120, ''+Math.round(dmg), '#ff6a6a', {size:22, crit:true, vy:-54}); }
  for(let i=0;i<6;i++) spawnParticle(which==='enemyBase'?state.eTowerX-14:state.pTowerX+14, groundY-90,'#caa15a');
  Sound.baseHit();
}
function addShake(v){ state.shake=Math.max(state.shake,v); }
function towerShot(side, tgt){
  const tx = side==='player'? state.pTowerX : state.eTowerX;
  const dmg = side==='player'? Math.round(20*keepDmgMul()) : Math.round(10 + state.level*0.9);
  const p={ x:tx+(side==='player'?10:-10), y:groundY-120, side, facing:side==='player'?1:-1,
    tx:tgt.x, ty:entYTop(tgt)+2, kind:'bolt', dmg, splash:0, life:2, element:'Normal', cls:null, heal:0, t:0 };
  const dx=p.tx-p.x, dy=p.ty-p.y, dist=Math.hypot(dx,dy)||1, spd=540; p.vx=dx/dist*spd; p.vy=dy/dist*spd; p.arc=0;
  state.projectiles.push(p); spawnMuzzle(p.x, p.y, side==='player'?'#8fd0ff':'#ff9a9a'); Sound.arrow();
}

function updateProjectiles(dt){
  for(const p of state.projectiles){
    p.t+=dt; p.life-=dt;
    p.x += p.vx*dt;
    // arc for arrows
    if(p.arc){ p.y += p.vy*dt + p.arc*dt*(1-2*Math.min(1,p.t*2)); }
    else p.y += p.vy*dt;
    p.spin += dt*12;
    // hit check
    const foes = p.side==='player' ? (p.heal? state.units : state.enemies) : (p.heal? state.enemies : state.units);
    // reached target x?
    const reached = (p.facing>0 ? p.x>=p.tx : p.x<=p.tx) || (Math.abs(p.x-p.tx)<12);
    let hit=null;
    for(const e of foes){ if(e.dead) continue; if(p.noAir && e.flying) continue; if(Math.abs(e.x-p.x)<22 && Math.abs(entYTop(e)-p.y)<44){ hit=e; break; } }
    if(hit || reached){
      if(p.heal){
        // heal nearest wounded ally near impact
        let best=null,bd=1e9; for(const a of foes){ if(a.dead||a.hp>=a.hpMax)continue; const d=Math.abs(a.x-p.x); if(d<bd){bd=d;best=a;} }
        if(best) healEntity(best,p.heal);
        else if(hit) healEntity(hit,p.heal);
      } else if(p.splash){
        const cx=hit?hit.x:p.x;
        for(const e of foes){ if(e.dead)continue; if(p.noAir && e.flying) continue; if(Math.abs(e.x-cx)<p.splash) damageEntity(e,p.dmg,p.element,p.cls); }
        for(let i=0;i<14;i++) spawnParticle(cx, p.y, elemColor(p.element));
        spawnRing(cx, p.y, elemColor(p.element)); addShake(0.2);
      } else if(hit){
        damageEntity(hit,p.dmg,p.element,p.cls);
      } else {
        // hit base?
        if(p.side==='player' && Math.abs(p.x-state.eTowerX)<40) damageBase('enemyBase',p.dmg);
        else if(p.side==='enemy' && Math.abs(p.x-state.pTowerX)<40) damageBase('playerBase',p.dmg);
      }
      p.life=0;
    }
  }
  state.projectiles = state.projectiles.filter(p=>p.life>0);
}

/* =============================== RENDER ================================= */
let bgTrees=[], bgClouds=[];
function initBackground(){
  bgTrees=[]; bgClouds=[];
  const nT = Math.max(8, Math.round(WORLD_W/150));
  for(let i=0;i<nT;i++) bgTrees.push({x:rand(0,WORLD_W), s:rand(0.7,1.3)});
  for(let i=0;i<6;i++) bgClouds.push({x:rand(0,1), y:rand(0.06,0.32), s:rand(0.6,1.4), spd:rand(0.004,0.012)});
}

function render(){
  ctx.clearRect(0,0,W,H);
  updateCamera();
  ctx.save();
  if(state.shake>0){ ctx.translate(rand(-1,1)*state.shake*7, rand(-1,1)*state.shake*7); }

  drawSky();                                          // fixed sky/clouds
  ctx.save(); ctx.translate(-camX*0.4,0); drawHills(); ctx.restore();  // parallax hills

  ctx.save(); ctx.translate(-camX,0);                 // ---- world layer ----
  drawGround();
  drawTrees();
  drawTower('player', state.pTowerX);
  drawTower('enemy', state.eTowerX);
  const all = [...state.units, ...state.enemies].sort((a,b)=> (a.lane+a.y)-(b.lane+b.y));
  for(const u of all) drawFighter(u);
  drawProjectiles();
  drawFx();
  drawParticles();
  drawFloats(false);
  ctx.restore();                                      // ---- end world ----

  drawFloats(true);                                   // income popups (screen space)
  drawEdgeArrows();
  if(state.spellFx>0) drawSpellFx();
  ctx.restore();
}
function updateCamera(){
  const maxC = Math.max(0, WORLD_W - W);
  let target = 0;
  if(state && state.units && state.units.length){
    let fx = state.pTowerX;
    for(const u of state.units) if(!u.dead && u.x>fx) fx=u.x;   // follow the vanguard
    target = fx - W*0.55;
  }
  target = clamp(target, 0, maxC);
  camX += (target - camX) * 0.09;                     // smooth chase
  camX = clamp(camX, 0, maxC);
}
function drawEdgeArrows(){
  if(!state.running) return;
  const viewR = camX + W; let right=0;
  for(const e of state.enemies){ if(!e.dead && e.x>viewR+8) right++; }
  if(right>0){
    const y=groundY-46; ctx.save();
    ctx.fillStyle='rgba(226,59,59,.9)';
    ctx.beginPath(); ctx.moveTo(W-8,y); ctx.lineTo(W-26,y-11); ctx.lineTo(W-26,y+11); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 11px Trebuchet MS'; ctx.textAlign='center'; ctx.fillText(right, W-30, y+4);
    ctx.restore();
  }
}
const SPELL_CD = 14;
function castSpell(){
  if(!state || !state.running || state.over || state.paused) return;
  if(state.spellCd>0) return;
  Sound.unlock();
  state.spellCdMax = meteorCooldown(); state.spellCd = state.spellCdMax; state.spellFx = 0.7;
  const dmg = Math.round((55 + state.level*7) * meteorDamageMul());
  for(const e of state.enemies){ if(!e.dead) damageEntity(e, dmg, 'Fire'); }   // Meteor is Fire — hits air too
  state.eHp = Math.max(0, state.eHp - dmg*0.6);
  addShake(1.1); hitStop=Math.max(hitStop,0.1);
  for(let i=0;i<46;i++) spawnParticle(rand(camX+W*0.2,camX+W-10), groundY-rand(0,70), (i%2)?'#ff8a3a':'#ffd23a');
  Sound.boom();
  pressEl(el('spellBtn'));
}
function drawSpellFx(){
  const a = state.spellFx/0.7;
  ctx.globalAlpha = a*0.55; ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1;
  ctx.strokeStyle='rgba(255,150,50,'+a+')'; ctx.lineWidth=4; ctx.lineCap='round';
  for(let i=0;i<7;i++){ const x=(i/7)*W + (1-a)*120; ctx.beginPath(); ctx.moveTo(x,-20); ctx.lineTo(x-90,groundY*a+60); ctx.stroke(); }
  ctx.lineCap='butt';
}
function drawFx(){
  for(const x of state.fx){ const a=1-x.t/x.life;
    if(x.type==='slash'){
      const R = x.kind==='heavy'?24 : x.kind==='smash'?20 : 15;
      ctx.save(); ctx.translate(x.x,x.y); ctx.rotate((x.facing>0?-0.5:0.5)+x.rot); ctx.globalAlpha=a;
      ctx.strokeStyle=x.color; ctx.lineCap='round'; ctx.lineWidth=(x.kind==='heavy'?6:4)*(0.4+a);
      ctx.beginPath(); ctx.arc(0,0,R*(1.3-a),-1.0,1.0); ctx.stroke();
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.8*a; ctx.beginPath(); ctx.arc(0,0,R*(1.3-a),-0.7,0.7); ctx.stroke();
      if(x.kind==='heavy'){ ctx.strokeStyle=x.color; ctx.lineWidth=3*(0.3+a); ctx.beginPath(); ctx.arc(0,4,R*(1.5-a),-0.8,0.8); ctx.stroke(); }
      ctx.restore();
    } else if(x.type==='ring'){
      ctx.save(); ctx.translate(x.x,x.y); ctx.globalAlpha=a*0.9; ctx.strokeStyle=x.color;
      const R=x.big?46:28; ctx.lineWidth=(x.big?5:3.2)*a; ctx.beginPath(); ctx.arc(0,0,6+(1-a)*R,0,7); ctx.stroke();
      if(x.big){ ctx.globalAlpha=a*0.5; ctx.lineWidth=2*a; ctx.beginPath(); ctx.arc(0,0,6+(1-a)*R*0.6,0,7); ctx.stroke(); }
      ctx.restore();
    } else if(x.type==='muzzle'){
      ctx.save(); ctx.translate(x.x,x.y); ctx.globalAlpha=a;
      const g=ctx.createRadialGradient(0,0,1,0,0,11*(0.6+a)); g.addColorStop(0,'#fff'); g.addColorStop(.5,x.color); g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,11*(0.6+a),0,7); ctx.fill(); ctx.restore();
    } else if(x.type==='cast'){
      ctx.save(); ctx.translate(x.x,x.y); ctx.rotate(x.t*8); ctx.globalAlpha=a;
      ctx.strokeStyle=x.color; ctx.lineWidth=2.4; const r=8+(1-a)*10;
      ctx.beginPath(); for(let i=0;i<6;i++){ const an=i/6*6.28; ctx.moveTo(Math.cos(an)*r,Math.sin(an)*r); ctx.lineTo(Math.cos(an)*(r+5),Math.sin(an)*(r+5)); } ctx.stroke();
      ctx.beginPath(); ctx.arc(0,0,r,0,7); ctx.stroke(); ctx.restore();
    } else if(x.type==='star'){
      ctx.save(); ctx.translate(x.x,x.y); ctx.rotate(x.rot); ctx.globalAlpha=a; ctx.strokeStyle=x.color; ctx.lineCap='round'; ctx.lineWidth=3*a;
      const R=6+(1-a)*20; for(let i=0;i<4;i++){ ctx.rotate(1.57); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-R); ctx.stroke(); } ctx.restore();
    }
  }
  ctx.globalAlpha=1; ctx.lineCap='butt';
}

function theme(){ return (state && state.stage) || FALLBACK.stages[0]; }
function drawSky(){
  const th=theme(), night = th.theme==='night';
  const g=ctx.createLinearGradient(0,0,0,groundY);

    ctx.fillStyle='#f2ecd0'; ctx.beginPath(); ctx.arc(W*0.78,groundY*0.32,26,0,7); ctx.fill();
    ctx.fillStyle=th.sky[1]; ctx.beginPath(); ctx.arc(W*0.82,groundY*0.28,24,0,7); ctx.fill();

}
function drawHills(){

function drawTower(side, x){

/* --------------------------- Fighter drawing --------------------------- */
function drawBossAura(u){
  const ec=(u.element&&u.element!=='Normal')?elemColor(u.element):(u.elite?'#ff8a3a':'#ff4a4a');
  const t=now(), pulse=0.5+0.5*Math.sin(t*3);
  // rotating ground magic circle
  ctx.save(); ctx.globalAlpha=0.5; ctx.strokeStyle=ec; ctx.lineWidth=2;
  ctx.scale(1,0.34); ctx.rotate(t*0.8);
  ctx.beginPath(); ctx.arc(0,0,26,0,7); ctx.stroke();
  ctx.beginPath(); for(let i=0;i<8;i++){ const a=i/8*6.28; ctx.moveTo(Math.cos(a)*20,Math.sin(a)*20); ctx.lineTo(Math.cos(a)*27,Math.sin(a)*27); } ctx.stroke();
  ctx.restore();

  const g=ctx.createRadialGradient(0,-24,3,0,-20,46+pulse*10); g.addColorStop(0,ec); g.addColorStop(0.5,ec); g.addColorStop(1,'rgba(0,0,0,0)');

}
function drawEvoBack(u, stroke){

  ctx.fillStyle= evo>=2?'#ffce4a':(pal.cloth2||'#c9a2ff');
  ctx.beginPath(); ctx.moveTo(-7,-44); ctx.lineTo(7,-44); ctx.lineTo(11+sway,-4); ctx.lineTo(-9+sway,-4); ctx.closePath(); ctx.fill();
  ctx.lineWidth=2; ctx.strokeStyle='rgba(30,18,8,.45)'; ctx.stroke();

function drawEvoFront(u, stroke){

    ctx.beginPath(); ctx.moveTo(-8,cy); ctx.lineTo(-8,cy-3); ctx.lineTo(-4,cy-1); ctx.lineTo(0,cy-6); ctx.lineTo(4,cy-1); ctx.lineTo(8,cy-3); ctx.lineTo(8,cy); ctx.closePath(); ctx.fill(); stroke(1.2);
    ctx.fillStyle='rgba(255,255,255,'+(0.5+0.5*Math.sin(now()*8))+')'; ctx.beginPath(); ctx.arc(0,cy-5,1.6,0,7); ctx.fill(); }
}
function drawFighter(u){
  const def=u.def, pal=u.pal||def.pal, f=u.facing;
  const baseY = u.y + u.lane;
  if(u.flying){ drawFlyer(u, baseY); return; }
  if(def.siege){ drawCatapult(u, baseY); return; }
  const bob = u.state==='walk' ? Math.abs(Math.sin(u.walkPhase))*3 : Math.sin(u.walkPhase*0.3)*1;
  const swing = u.swing; // 0..1
  ctx.save();
  ctx.translate(u.x, baseY);
  if(u.dead){ ctx.globalAlpha = Math.max(0, 1-u.deathT/0.7); ctx.translate(0, u.deathT*10); ctx.rotate(f*u.deathT*1.4); }
  ctx.scale(f,1);
  const sm = u.sizeMul||1;

  let scX=sm, scY=sm;
  if(u.spawnT<1){ const p=u.spawnT, sq=1+0.28*Math.sin(p*Math.PI); scX=sm*(0.45+0.55*p)/sq; scY=sm*(0.45+0.55*p)*sq; }
  ctx.scale(scX,scY);

  if(u.boss) drawBossAura(u);
  // elemental aura — pulsing body halo + ground glow (non-Normal)
  if(u.element && u.element!=='Normal'){
    const ec=elemColor(u.element), pulse=0.5+0.5*Math.sin(now()*4+u.walkPhase);
    const bg=ctx.createRadialGradient(0,-16,2,0,-14,26+pulse*7); bg.addColorStop(0,ec); bg.addColorStop(0.55,ec); bg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.globalAlpha=0.22+0.16*pulse; ctx.fillStyle=bg; ctx.beginPath(); ctx.ellipse(0,-14,22,22,0,0,7); ctx.fill();
    const ag=ctx.createRadialGradient(0,0,1,0,0,20); ag.addColorStop(0,ec); ag.addColorStop(1,'rgba(0,0,0,0)');
    ctx.globalAlpha=0.5; ctx.fillStyle=ag; ctx.beginPath(); ctx.ellipse(0,0,20,7,0,0,7); ctx.fill(); ctx.globalAlpha=1;
  }

  const shg=ctx.createRadialGradient(0,1,1,0,1,17); shg.addColorStop(0,'rgba(0,0,0,.30)'); shg.addColorStop(.7,'rgba(0,0,0,.14)'); shg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=shg; ctx.beginPath(); ctx.ellipse(0,1,17,6,0,0,7); ctx.fill();

  ctx.translate(0,-bob);

    ctx.fillStyle=pal.cloth; ctx.beginPath(); ctx.arc(1,1,4,0,7); ctx.fill();
    ctx.restore();
  }

  // torso — diagonal light gradient for volume
  ctx.save(); ctx.translate(0,-30);
  const tg=ctx.createLinearGradient(-11,-16,11,10);
  tg.addColorStop(0, shade(pal.cloth,-30)); tg.addColorStop(0.5, pal.cloth); tg.addColorStop(1, shade(pal.cloth,16));
  ctx.fillStyle=tg; roundRect(-11,-16,22,26,7); ctx.fill(); stroke(2.4);
  // tunic seam
  ctx.strokeStyle='rgba(30,18,8,.22)'; ctx.lineWidth=1.4; ctx.beginPath(); ctx.moveTo(0,-13); ctx.lineTo(0,5); ctx.stroke();
  // collar
  ctx.fillStyle=shade(pal.cloth2,10); ctx.beginPath(); ctx.moveTo(-8,-16); ctx.lineTo(8,-16); ctx.lineTo(4,-11); ctx.lineTo(-4,-11); ctx.closePath(); ctx.fill();
  // shoulder strap across chest
  ctx.strokeStyle=shade(pal.cloth2,-16); ctx.lineWidth=3; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(-9,-13); ctx.lineTo(7,3); ctx.stroke(); ctx.lineCap='butt';
  // belt + rounded buckle
  ctx.fillStyle=shade(pal.cloth2,-6); ctx.fillRect(-11,4,22,5);
  ctx.fillStyle=pal.metal; roundRect(-3,3.5,6,6,2); ctx.fill(); stroke(1.2);
  // rim light on lit edge
  ctx.strokeStyle='rgba(255,255,255,.30)'; ctx.lineWidth=1.6; ctx.beginPath(); ctx.moveTo(10,-11); ctx.quadraticCurveTo(12.5,-2,9,8); ctx.stroke();
  // armored pauldron (shaded) for helmed classes
  if(def.head==='greathelm'||def.head==='helm'){ const pg=ctx.createRadialGradient(8,-14,1,8,-12,7);
    pg.addColorStop(0,shade(pal.metal,22)); pg.addColorStop(1,shade(pal.metal,-12));
    ctx.fillStyle=pg; ctx.beginPath(); ctx.arc(8,-12,6.2,0,7); ctx.fill(); stroke(1.8); }
  ctx.restore();

  // head (chibi: oversized) with animal ears behind
  ctx.save(); ctx.translate(2,-47);
  drawEars(def, pal, stroke);
  // soft-shaded head
  const hg=ctx.createRadialGradient(-3,-4,2,0,0,12); hg.addColorStop(0,shade(pal.skin,20)); hg.addColorStop(1,pal.skin);
  ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(0,0,10.5,0,7); ctx.fill(); stroke(2.2);
  // lighter muzzle patch
  ctx.fillStyle=shade(pal.skin,24); ctx.beginPath(); ctx.ellipse(4,4,5.5,4.6,0,0,7); ctx.fill();
  // eyes (near + far) with shine
  ctx.fillStyle='#20140b';
  ctx.beginPath(); ctx.arc(4.8,-1.5,1.9,0,7); ctx.fill();
  ctx.beginPath(); ctx.arc(-1.4,-1.9,1.4,0,7); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(5.4,-2.3,0.7,0,7); ctx.fill();
  ctx.beginPath(); ctx.arc(-0.9,-2.5,0.5,0,7); ctx.fill();
  // brows

  ctx.beginPath(); ctx.moveTo(2.8,-4.6); ctx.lineTo(6.8,-4.1); ctx.moveTo(-3.2,-4.6); ctx.lineTo(-0.2,-4.8); ctx.stroke();
  // nose + smile

  ctx.strokeStyle='rgba(30,18,8,.6)'; ctx.lineWidth=1.3; ctx.beginPath(); ctx.arc(5,4.4,2.7,0.12,1.15); ctx.stroke();
  // blush
  ctx.fillStyle='rgba(255,120,110,.26)';
  ctx.beginPath(); ctx.arc(6.6,3.1,2.2,0,7); ctx.fill();
  ctx.beginPath(); ctx.arc(-3.4,2.5,1.7,0,7); ctx.fill();
  drawHead(def, pal, stroke);
  ctx.restore();

  // weapon arm (front)

  ctx.restore();

}
/* white-chip HP bar + element/boss labels (shared by all unit renders) */
function drawUnitBar(u, topY){
  if(u.dead) return;
  const w=(u.sizeMul>1?42:26), hpx=u.x-w/2;
  const cur=clamp(u.hp/u.hpMax,0,1), shown=clamp((u.hpShown!=null?u.hpShown:u.hp)/u.hpMax,0,1);
  if(cur<0.999 || shown<0.999){
    ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(hpx-1,topY-1,w+2,5);
    ctx.fillStyle='rgba(255,255,255,.9)'; ctx.fillRect(hpx,topY,w*shown,3);            // white chip (lag)
    const g=ctx.createLinearGradient(hpx,0,hpx+w,0);
    if(u.side==='player'){ g.addColorStop(0,'#7dff95'); g.addColorStop(1,'#35c250'); } else { g.addColorStop(0,'#ff8b8b'); g.addColorStop(1,'#e23b3b'); }
    ctx.fillStyle=g; ctx.fillRect(hpx,topY,w*cur,3);                                     // current
  }
  if(u.element && u.element!=='Normal'){ ctx.font='11px serif'; ctx.textAlign='center'; ctx.fillText(elemGlyph(u.element), u.x, topY-4); }
  if(u.boss && u.bossName){ ctx.font='bold 9px Trebuchet MS'; ctx.textAlign='center';
    ctx.lineWidth=3; ctx.strokeStyle='rgba(0,0,0,.7)'; ctx.strokeText(u.bossName,u.x,topY-16);
    ctx.fillStyle='#ffd766'; ctx.fillText(u.bossName,u.x,topY-16); }
}
/* ---- flying enemy (bat): hovers, only ranged/caster can hit ---- */
function drawFlyer(u, baseY){
  const f=u.facing, s=(u.sizeMul||1), pal=u.pal||u.def.pal;
  const hover = -(50 + Math.sin(now()*5+(u.flyBob||0))*5);
  ctx.save(); ctx.translate(u.x, baseY);
  ctx.fillStyle='rgba(0,0,0,.16)'; ctx.beginPath(); ctx.ellipse(0,0,9,3,0,0,7); ctx.fill(); ctx.restore();  // ground shadow
  ctx.save(); ctx.translate(u.x, baseY+hover);
  if(u.dead){ ctx.globalAlpha=Math.max(0,1-u.deathT/0.7); ctx.translate(0,u.deathT*40); }
  ctx.scale(f*s,s);
  if(u.boss) drawBossAura(u);
  const flap=Math.sin(now()*16+(u.flyBob||0));
  ctx.strokeStyle='rgba(18,10,22,.85)'; ctx.lineWidth=1.6;
  ctx.fillStyle=pal.cloth2||'#6a4a8a';
  ctx.beginPath(); ctx.moveTo(-2,-1); ctx.quadraticCurveTo(-16,-8-flap*6,-21,5); ctx.quadraticCurveTo(-11,2,-2,4); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2,-1); ctx.quadraticCurveTo(16,-8-flap*6,21,5); ctx.quadraticCurveTo(11,2,2,4); ctx.closePath(); ctx.fill(); ctx.stroke();
  if(u.element&&u.element!=='Normal'){ ctx.globalAlpha=.4; ctx.fillStyle=elemColor(u.element); ctx.beginPath(); ctx.arc(0,0,13,0,7); ctx.fill(); ctx.globalAlpha=1; }
  ctx.fillStyle=pal.fur||'#3a2c48'; ctx.beginPath(); ctx.ellipse(0,0,7,8,0,0,7); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-4,-6); ctx.lineTo(-6,-13); ctx.lineTo(-1,-7); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(4,-6); ctx.lineTo(6,-13); ctx.lineTo(1,-7); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#ff5a5a'; ctx.beginPath(); ctx.arc(-2.5,-1,1.3,0,7); ctx.arc(2.5,-1,1.3,0,7); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.moveTo(-2,4);ctx.lineTo(-1,7);ctx.lineTo(0,4); ctx.moveTo(2,4);ctx.lineTo(1,7);ctx.lineTo(0,4); ctx.fill();
  if(u.hitFlash>0){ ctx.globalAlpha=u.hitFlash*3; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(0,0,9,10,0,0,7); ctx.fill(); ctx.globalAlpha=1; }
  ctx.restore();
  drawUnitBar(u, baseY+hover-18);

/* ---- catapult (siege): ground-only ranged machine ---- */
function drawCatapult(u, baseY){
  const f=u.facing, s=(u.sizeMul||1), swing=u.swing;
  ctx.save(); ctx.translate(u.x, baseY);
  const shg=ctx.createRadialGradient(0,1,1,0,1,22); shg.addColorStop(0,'rgba(0,0,0,.3)'); shg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=shg; ctx.beginPath(); ctx.ellipse(0,1,22,6,0,0,7); ctx.fill();
  if(u.dead){ ctx.globalAlpha=Math.max(0,1-u.deathT/0.7); ctx.rotate(u.deathT*0.5); }
  ctx.scale(f*s,s);
  if(u.boss) drawBossAura(u);
  const wood='#7a4a24', woodD='#5a3418', metal='#9aa0a6';
  const stroke=(w=2)=>{ ctx.lineWidth=w; ctx.strokeStyle='rgba(30,18,8,.8)'; ctx.stroke(); };
  ctx.fillStyle=woodD; ctx.beginPath(); ctx.arc(-8,-6,7,0,7); ctx.fill(); stroke(2); ctx.beginPath(); ctx.arc(8,-6,7,0,7); ctx.fill(); stroke(2);
  ctx.fillStyle=metal; ctx.beginPath(); ctx.arc(-8,-6,2,0,7); ctx.arc(8,-6,2,0,7); ctx.fill();
  ctx.fillStyle=wood; roundRect(-13,-20,26,10,3); ctx.fill(); stroke(2);
  ctx.save(); ctx.translate(-7,-19); ctx.rotate(-2.3 + Math.min(1,swing)*2.0);
  ctx.strokeStyle=woodD; ctx.lineWidth=4; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(24,0); ctx.stroke(); ctx.lineCap='butt';
  ctx.fillStyle=metal; ctx.beginPath(); ctx.arc(24,0,4,0,7); ctx.fill();
  if(swing>0.45){ ctx.fillStyle='#6b5a48'; ctx.beginPath(); ctx.arc(24,-3,4.5,0,7); ctx.fill(); stroke(1.4); }
  ctx.restore();
  if(u.element&&u.element!=='Normal'){ ctx.globalAlpha=.4; ctx.fillStyle=elemColor(u.element); ctx.beginPath(); ctx.ellipse(0,-8,20,9,0,0,7); ctx.fill(); ctx.globalAlpha=1; }
  if(u.hitFlash>0){ ctx.globalAlpha=u.hitFlash*3; ctx.fillStyle='#fff'; roundRect(-14,-22,28,20,4); ctx.fill(); ctx.globalAlpha=1; }
  ctx.restore();
  drawUnitBar(u, baseY-40);
}
function drawLeg(x, sw, pal, stroke){
  const y=-14, dx=sw*0.4;

  ctx.fillStyle=shade(pal.cloth,-26);
  ctx.beginPath(); ctx.moveTo(x-3,y-2); ctx.lineTo(x+3,y-2); ctx.lineTo(x+3+dx,y+9); ctx.lineTo(x-3+dx,y+9); ctx.closePath(); ctx.fill(); stroke(1.8);

function drawParticles(){

function drawFloats(screen){
  ctx.textAlign='center'; ctx.textBaseline='alphabetic'; ctx.lineJoin='round';
  for(const f of state.floats){ if(!!f.screen!==!!screen) continue;
    const tt=f.t/f.life, a = tt<0.8 ? 1 : Math.max(0,1-(tt-0.8)/0.2);
    // MapleStory-style pop: overshoot big → settle
    const pop = f.t<0.10 ? 0.4+0.9*(f.t/0.10) : (f.t<0.22 ? 1.3-0.3*((f.t-0.10)/0.12) : 1);
    const sz = f.size*pop;
    ctx.save(); ctx.globalAlpha=a; ctx.translate(f.x, f.y);
    if(f.crit) ctx.rotate(Math.sin(f.t*30)*0.03);
    ctx.font='900 '+sz.toFixed(1)+'px "Trebuchet MS", Arial Black, sans-serif';
    // dark chunky outline + soft shadow
    ctx.shadowColor='rgba(0,0,0,.5)'; ctx.shadowBlur=4; ctx.shadowOffsetY=2;
    ctx.lineWidth=Math.max(3,sz*0.26); ctx.strokeStyle='rgba(35,12,20,.95)'; ctx.strokeText(f.txt,0,0);
    ctx.shadowColor='transparent';
    // vertical gradient fill (white → colour), crit adds a hot core
    const g=ctx.createLinearGradient(0,-sz*0.8,0,sz*0.25);
    if(f.crit){ g.addColorStop(0,'#ffffff'); g.addColorStop(0.45,f.color); g.addColorStop(1,shade(f.color,-34)); }
    else { g.addColorStop(0,'#ffffff'); g.addColorStop(0.6,f.color); g.addColorStop(1,shade(f.color,-18)); }
    ctx.fillStyle=g; ctx.fillText(f.txt,0,0);
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

/* --------------------------- Small helpers ----------------------------- */
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function shade(hex,amt){
  const c=hex.replace('#',''); let r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);
  r=clamp(r+amt,0,255);g=clamp(g+amt,0,255);b=clamp(b+amt,0,255);
  return '#'+[r,g,b].map(v=>('0'+(v|0).toString(16)).slice(-2)).join('');
}
function mix(h1,h2,t){ // blend two hex colors
  const a=h1.replace('#',''), b=h2.replace('#','');
  const ar=parseInt(a.substr(0,2),16),ag=parseInt(a.substr(2,2),16),ab=parseInt(a.substr(4,2),16);
  const br=parseInt(b.substr(0,2),16),bg=parseInt(b.substr(2,2),16),bb=parseInt(b.substr(4,2),16);
  const r=ar+(br-ar)*t, g=ag+(bg-ag)*t, bl=ab+(bb-ab)*t;
  return '#'+[r,g,bl].map(v=>('0'+(Math.round(v)).toString(16)).slice(-2)).join('');
}
// element-tinted palette: pulls a unit's colours toward its element hue so the
// whole body reads as Fire/Water/etc. at a glance (not just the badge)
function elemTintPal(pal, element){
  if(!element || element==='Normal') return pal;
  const ec=elemColor(element);
  return {
    skin:  mix(pal.skin||'#e8b183', ec, 0.14),
    fur:   mix(pal.fur||pal.skin||'#d9a26a', ec, 0.30),
    cloth: mix(pal.cloth||'#a5512a', ec, 0.44),
    cloth2:mix(pal.cloth2||'#f2d38a', ec, 0.52),
    metal: mix(pal.metal||'#c9d0d8', ec, 0.36),
    hair:  mix(pal.hair||'#3a2414', ec, 0.24),
  };
}

function buildShop(){

  SHOP_ORDER.forEach((key,i)=>{
    const def=shopDef(key);
    const card=document.createElement('div'); card.className='card'; card.dataset.k=key;
    const c=document.createElement('canvas'); c.width=80; c.height=80;
    drawPortrait(c, def);
    card.innerHTML='<div class="key">'+(i+1)+'</div>';
    card.appendChild(c);
    const nm=document.createElement('div'); nm.className='nm'; nm.textContent=displayName(key); card.appendChild(nm);
    const cost=document.createElement('div'); cost.className='cost'; cost.innerHTML='◆ '+def.cost; card.appendChild(cost);
    const cd=document.createElement('div'); cd.className='cd'; card.appendChild(cd);
    const b=unitBuild(key); const uel=b.element||'Normal';
    const badge=document.createElement('div'); badge.className='elembadge';
    badge.textContent = uel!=='Normal'? elemGlyph(uel) : ''; card.appendChild(badge);

function drawPortrait(c, def){

  const u={def,pal:def.pal,facing:1,x:40,y:64,lane:0,state:'fight',walkPhase:0,swing:0.5,hitFlash:0,dead:false,hp:1,hpMax:1};

    portraitFighter(g,u,def);

}

function weaponPortrait(g,def,pal,stroke){

/* ============================== GAME LOOP ============================== */
let rafId=null, lastT=0;
function loop(ts){
  const t=ts/1000; let dt = lastT? Math.min(0.05, t-lastT):0; lastT=t;
  if(hitStop>0){ hitStop=Math.max(0,hitStop-dt); } // freeze the sim, keep rendering (juice)
  else update(dt);
  render();
  rafId=requestAnimationFrame(loop);
}

/* ============================== FLOW / UI =============================== */
function startLevel(level, gold){
  state = newLevel(level, gold);
  state.eTowerX = WORLD_W - 46; state.running=true; camX=0;
  initBackground(); buildShop();
  ['startScreen','endScreen','barracksScreen','settingsScreen'].forEach(id=>el(id).classList.add('hide'));
  const sb=el('spellBtn'); sb.classList.add('show'); el('spellLbl').textContent=t('spellName');
  Sound.unlock(); Sound.startMusic();
  syncHUD();
  toast('Lv '+state.level+' · '+state.stage.name);
  if(!rafId){ lastT=0; rafId=requestAnimationFrame(loop); }
}
function computeScore(){
  const par = state.stage.parTime||40, tt=state.t;
  const timeBonus = Math.max(0, Math.round(par - tt)*25) + 200;
  const hpBonus = Math.round(state.pHp*2);
  const goldBonus = Math.round(state.goldAcquired*0.6);
  let army=0; for(const u of state.units) if(!u.dead) army += (u.def.cost||0);
  const armyBonus = Math.round(army*1.5);
  return { score:Math.max(0,timeBonus+hpBonus+goldBonus+armyBonus), army, clearTime:tt };
}
function pickQuip(L){ const q=(I18N[LANG]&&I18N[LANG].quips)||I18N.en.quips; return q[(L-1)%q.length]; }
function scoreRows(sc, isBest, gems){
  const r=(lbl,val)=>'<div class="scoreline"><span>'+lbl+'</span><b>'+val+'</b></div>';
  let h='';
  if(isBest) h+='<div style="text-align:center;color:#e0851a;font-weight:900;margin-bottom:6px">'+t('newBest')+'</div>';
  h+=r(t('clearTime'), sc.clearTime.toFixed(1)+'s');
  h+=r(t('hpLeft'), Math.ceil(state.pHp));
  h+=r(t('goldGot'), Math.round(state.goldAcquired));
  h+=r(t('armyLeft'), sc.army+' ◆');
  h+='<div class="scoreline" style="border-top:1px solid #d9bd82;margin-top:4px;padding-top:5px"><span><b>'+t('score')+'</b></span><b style="color:#b5560f;font-size:16px">'+sc.score+'</b></div>';
  h+=r(t('best'), SAVE.scores[state.level]||sc.score);
  h+='<div class="scoreline"><span>'+t('gemsEarned')+'</span><b class="gemchip">💎 +'+gems+'</b></div>';
  return h;
}
function endGame(win){
  if(state.over) return;
  state.over=true; state.running=false;
  Sound.stopMusic(); win?Sound.win():Sound.lose();
  el('spellBtn').classList.remove('show');
  el('endScreen').classList.remove('hide');
  el('endTitle').textContent = win? t('clearedTitle') : t('defeatTitle');
  el('endTitle').style.backgroundImage = win?'linear-gradient(#ffe58a,#ffb02e)':'linear-gradient(#ff9a9a,#e23b3b)';
  const box=el('scoreBox');
  if(win){
    const L=state.level, sc=computeScore(), prev=SAVE.scores[L]||0, isBest=sc.score>prev;
    state._lastScore = sc.score;
    if(isBest) SAVE.scores[L]=sc.score;
    const gems=(state.stage.reward||5)+(isBest?5:0);
    SAVE.gems+=gems; SAVE.maxLevel=Math.max(SAVE.maxLevel, L+1); saveGame();
    updateHiScore(); updateContinue();
    el('endMsg').textContent = t('clearedMsg')(L);
    el('endSub').textContent = pickQuip(L);
    box.innerHTML = scoreRows(sc, isBest, gems);
    el('againBtn').textContent = t('nextLevel');
    state._nextLevel = L+1; state._carryGold = Math.floor(state.gold)+150;
  } else {
    el('endMsg').textContent = t('defeatMsg');
    el('endSub').textContent = t('reached')(state.level);
    box.innerHTML='';
    el('againBtn').textContent = t('retry');
    state._nextLevel = state.level; state._carryGold = null;
  }
}

document.querySelectorAll('#langSeg button').forEach(b=> b.onclick=()=>applyLang(b.dataset.lang));
el('musicVol').oninput=e=>{ SAVE.musicVol=e.target.value/100; Sound.setMusic(SAVE.musicVol); saveGame(); };
el('sfxVol').oninput=e=>{ SAVE.sfxVol=e.target.value/100; Sound.setSfx(SAVE.sfxVol); saveGame(); };
el('sfxVol').onchange=()=>Sound.click();
el('wipeBtn').onclick=()=>{ const lang=LANG; SAVE=JSON.parse(JSON.stringify(DEFAULT_SAVE)); SAVE.lang=lang; saveGame(); updateHiScore(); updateContinue(); if(state&&!state.running) buildShop(); toast('✔'); };

// global button juice — every button/card pops + clicks
document.addEventListener('pointerdown', e=>{
  const b=e.target.closest('button, .card, .langbtn, .elempick span, .seg button');
  if(b){ pressEl(b); Sound.unlock(); Sound.click(); }
}, true);

// keyboard
window.addEventListener('keydown', e=>{
  if(e.repeat) return;
  const map={'1':'warrior','2':'archer','3':'barbarian','4':'knight','5':'mage','6':'healer'};
  if(map[e.key]){ Sound.unlock(); tryBuy(map[e.key]); }
  else if(e.key==='q'||e.key==='Q'){ castSpell(); }
  else if(e.key===' '){ e.preventDefault(); if(state&&state.running) el('pauseBtn').click(); else if(!state||state.over) (el('startScreen').classList.contains('hide')?el('againBtn'):el('startBtn')).click(); }
});

// init — seed from inline fallback so the idle screen renders instantly, then override with fetched JSON
function applyData(u,e,s){
  SHOP_ORDER = u._order || Object.keys(u).filter(k=>k[0]!=='_');
  UNITS = {}; SHOP_ORDER.forEach(k=> UNITS[k]=u[k]);
  ENEMIES = e; STAGES = s;
}
loadSave();
LANG = SAVE.lang || ((navigator.language||'en').toLowerCase().indexOf('ko')===0 ? 'ko' : 'en');
Sound.setMusic(SAVE.musicVol); Sound.setSfx(SAVE.sfxVol);
el('musicVol').value=Math.round(SAVE.musicVol*100); el('sfxVol').value=Math.round(SAVE.sfxVol*100);
applyData(FALLBACK.units, FALLBACK.enemies, FALLBACK.stages);
applyLang(LANG);
updateHiScore(); updateContinue();
resize();
window.addEventListener('load', resize);
// idle background render so the start screen isn't blank
state = newLevel(1); state.eTowerX=WORLD_W-46; initBackground();
(function idle(){ if(!state.running){ render(); requestAnimationFrame(idle); } })();
// async: pull real JSON (units/enemies/stages/types), refresh idle scene if a server is available
loadData().then(()=>{ updateHiScore(); if(state && !state.running){ state = newLevel(1); state.eTowerX=WORLD_W-46; initBackground(); } })
          .catch(e=>console.warn('data load failed, keeping fallback', e));
</script>
</body>
</html>
