  if(!owned(key)){
    const cost=UNLOCK_COST[key]||30;
    const gate=document.createElement('button'); gate.className='sheetbtn'; gate.innerHTML='🔓 '+t('unlock')+' — 💎'+cost;
    gate.onclick=()=>{ if(SAVE.gems<cost){ toast(t('notEnoughGems')); return; } SAVE.gems-=cost; SAVE.owned[key]=true; saveGame(); Sound.win(); toast('🔓 '+def.name+'!'); buildShopIfIdle(); renderShop(); };
    list.appendChild(gate);
    const h=document.createElement('div'); h.className='treehint'; h.textContent=t('lockedHint'); list.appendChild(h);
    return;
  }
  list.appendChild(renderTree(key));
}
function tryBuyNode(key,node){
  if(nodeUnlocked(key,node.id)) return;
  if(!canUnlock(key,node)){ toast(t('needPrev')); return; }
  if(SAVE.gems<node.cost){ toast(t('notEnoughGems')); return; }
  SAVE.gems-=node.cost; treeSave(key)[node.id]=true; saveGame();
  const chips=effectChips(node); const tip=chips.slice(0,2).map(c=>c.text).join(' · ');
  if(node.capstone||node.element){ Sound.win(); toast('⭐ '+node.name+(tip?' — '+tip:'')); }
  else { Sound.heal(); toast((node.icon?node.icon+' ':'')+node.name+(tip?' · '+tip:'')); }
  buildShopIfIdle(); renderShop();
}
function renderBuildSummary(key){
  const b=unitBuild(key), box=document.createElement('div'); box.className='buildsum';
  const pathLabel=b.deepName?('▸ '+b.deepName+(b.element?' · '+elemGlyph(b.element)+' '+b.element:'')):t('noNodesYet');
  const evo=b.evo===2?' 🌟':b.evo===1?' ⭐':'';
  // recompute total mul chips from aggregated mul
  const fake={mul:b.mul,set:b.set,element:b.element};
  const chips=effectChips(fake);
  box.innerHTML='<div class="bs-top"><span class="bs-title">'+t('buildPower')+evo+'</span><span class="bs-path">'+pathLabel+'</span></div>'+
    (chips.length?'<div class="bs-chips">'+chipsHtml(chips)+'</div>':'<div class="bs-empty">'+t('noNodesYet')+'</div>');
  return box;
}
function renderTree(key){
  const wrap=document.createElement('div'); wrap.className='skilltree';
  wrap.appendChild(renderBuildSummary(key));
  const nodes=TREES[key]||[];
  const ab=activeBranch(key);
  const identities=nodes.filter(n=>n.kind==='identity');
  if(!ab){
    const hint=document.createElement('div'); hint.className='treehint'; hint.textContent='✨ '+t('pickPath'); wrap.appendChild(hint);
    const pick=document.createElement('div'); pick.className='pathpick';
    identities.forEach(n=>{
      const can=canUnlock(key,n), on=nodeUnlocked(key,n.id);
      const btn=document.createElement('button'); btn.type='button';
      btn.className='pathcard '+(on?'on':can?'avail':'lock');
      const poor=!on && SAVE.gems<n.cost;
      btn.innerHTML='<span class="pc-ico">'+(n.icon||'⭐')+'</span>'+
        '<span class="pc-name">'+n.name+'</span>'+
        '<span class="pc-blurb">'+(n.blurb||'')+'</span>'+
        '<div class="pc-chips">'+chipsHtml(effectChips(n,{sm:true}))+'</div>'+
        '<span class="pc-cost'+(poor?' poor':'')+'">'+(on?'✓ '+t('ownedTag'):'💎 '+n.cost)+'</span>';
      btn.onclick=()=>{ if(on) return; tryBuyNode(key,n); };
      pick.appendChild(btn);
    });
    wrap.appendChild(pick);
    return wrap;
  }
  const branchNode=identities.find(n=>n.branch===ab);
  const badge=document.createElement('div'); badge.className='branchbadge';
  badge.innerHTML=(branchNode&&branchNode.icon?branchNode.icon+' ':'🌳 ')+(branchNode?branchNode.name:ab);
  wrap.appendChild(badge);

  const diag=document.createElement('div'); diag.className='treediag';
  const branchNodes=nodes.filter(n=>!n.root && n.branch===ab);
  const byTier={};
  branchNodes.forEach(n=>{ (byTier[n.tier]=byTier[n.tier]||[]).push(n); });
  const tiers=Object.keys(byTier).map(Number).sort((a,b)=>a-b);
  let prevWasFork=false;
  function addEl(cls){ const d=document.createElement('div'); d.className=cls; diag.appendChild(d); return d; }
  tiers.forEach((tier, ti)=>{
    const group=byTier[tier];
    const isFork=group.length===2 && group.every(n=>n.fork);
    if(ti>0){
      if(isFork){ addEl('tvline'); addEl('tyfork'); }
      else if(prevWasFork){ addEl('tmerge'); addEl('tvline'); }
      else { addEl('tvline'); }
    }
    if(isFork){
      const fl=document.createElement('div'); fl.className='forklabel'; fl.textContent='⚡ '+t('forkPick'); diag.appendChild(fl);
      const row=document.createElement('div'); row.className='trow fork';
      group.forEach(n=> row.appendChild(makeSkillNode(key,n,true)));
      diag.appendChild(row);
      prevWasFork=true;
    } else {
      group.forEach(n=>{
        const row=document.createElement('div'); row.className='trow';
        row.appendChild(makeSkillNode(key,n,false));
        diag.appendChild(row);
      });
      prevWasFork=false;
    }
  });
  wrap.appendChild(diag);
  return wrap;
}
function makeSkillNode(key,node,isFork){
  const on=nodeUnlocked(key,node.id), can=canUnlock(key,node);
  const btn=document.createElement('button'); btn.type='button';
  btn.className='tnode'+(on?' on':can?' avail':' lock')+
    (node.capstone?' capstone':'')+(node.kind==='element'?' element':'');
  const tag=node.capstone?'CAPSTONE':node.kind==='element'?'ELEMENT':node.kind==='spec'?'PICK ONE':node.kind==='power'?'POWER':node.kind==='identity'?'PATH':'UPGRADE';
  const poor=!on && SAVE.gems<node.cost;
  btn.innerHTML=
    '<span class="tn-ico">'+(node.icon||(node.element?elemGlyph(node.element):'◆'))+'</span>'+
    '<span class="tn-name">'+node.name+'</span>'+
    '<span class="tn-tag">'+tag+(node.blurb?' · '+node.blurb:'')+'</span>'+
    '<div class="tn-chips">'+chipsHtml(effectChips(node,{sm:true}))+'</div>'+
    '<span class="tn-cost'+(poor?' poor':'')+'">'+(on?('✓ '+t('ownedTag')):('💎 '+node.cost))+'</span>';
  btn.onclick=()=>{ if(on){ toast(node.name); return; } tryBuyNode(key,node); };
  return btn;
}
function def_(key){ return UNITS[key]||{name:key}; }
function renderCommanderTab(list){
  const intro=document.createElement('div'); intro.className='treehint'; intro.textContent=t('commanderHint'); list.appendChild(intro);
  if(!hasMeteor()){
    const lock=document.createElement('div'); lock.className='treehint';
    lock.textContent='🔒 '+t('meteorLocked');
    list.appendChild(lock);
  }
  Object.keys(GLOBALS).forEach(id=>{
    const g=GLOBALS[id], lv=globalLvl(id);
    // Meteor upgrades hidden until spell is unlocked (Stage 4)
    if((id==='meteorDmg'||id==='meteorCd') && !hasMeteor()) return;
    const row=document.createElement('div'); row.className='ucard';
    if(g.icon){
      const ico=document.createElement('div'); ico.className='cmdico';
      ico.style.backgroundImage='url("'+g.icon+'")';
      ico.title=g.name; row.appendChild(ico);
    }
    const info=document.createElement('div'); info.className='info';
    let pips=''; for(let i=0;i<g.max;i++) pips+='<span class="pip'+(i<lv?' on':'')+'"></span>';
    info.innerHTML='<b>'+g.name+'</b> <span class="lvl">'+lv+'/'+g.max+'</span><div class="gdesc">'+g.desc+'</div><div class="pips">'+pips+'</div>';
    row.appendChild(info);
    const up=document.createElement('button'); up.className='upg';
    if(lv>=g.max){ up.textContent=t('maxed'); up.disabled=true; }
    else { const cost=g.cost(lv); up.innerHTML=t('levelUp')+'<br>💎'+cost;
      up.onclick=()=>{ if(SAVE.gems<cost){ toast(t('notEnoughGems')); return; } SAVE.gems-=cost; SAVE.global[id]=lv+1; saveGame(); Sound.heal(); renderShop(); }; }
    row.appendChild(up); list.appendChild(row);
  });
}
function shareCard(){
  const cw=640, ch=920, cvs=document.createElement('canvas'); cvs.width=cw; cvs.height=ch;
  const g=cvs.getContext('2d');
  const bg=g.createLinearGradient(0,0,0,ch); bg.addColorStop(0,'#20304a'); bg.addColorStop(1,'#0d1420'); g.fillStyle=bg; g.fillRect(0,0,cw,ch);
  g.strokeStyle='#ffce4a'; g.lineWidth=8; g.strokeRect(14,14,cw-28,ch-28);
  g.textAlign='center';
  g.fillStyle='#ffd766'; g.font='400 22px PressStart, Pixelify, monospace'; g.fillText('REALM VIBE RUSH', cw/2, 74);
  g.fillStyle='#e8d4a8'; g.font='700 14px Pixelify, monospace'; g.fillText((state&&state.stage?state.stage.name:'—'), cw/2, 104);
  g.fillStyle='rgba(255,255,255,.08)'; rr(g,40,128,cw-80,140,18); g.fill();
  g.textAlign='left'; g.fillStyle='#fff8e8'; g.font='700 16px Pixelify, monospace';
  g.fillText(t('score'), 70, 172); g.fillText(t('best'), 70, 212); g.fillText('🏆', 70, 252);
  g.textAlign='right'; g.fillStyle='#ffd766'; g.font='700 18px Pixelify, monospace';
  g.fillText(((state&&state._lastScore)||0).toLocaleString(), cw-70, 174);
  g.fillText(((state&&SAVE.scores[state.level])||0).toLocaleString(), cw-70, 214);
  g.fillText(totalScore().toLocaleString()+'  ·  💎'+SAVE.gems, cw-70, 252);
  g.textAlign='center'; g.fillStyle='#e8d4a8'; g.font='700 13px Pixelify, monospace'; g.fillText('— ARMY & PATHS —', cw/2, 312);
  SHOP_ORDER.forEach((key,i)=>{
    const col=i%2, ri=(i/2|0), px=44+col*286, py=340+ri*178;
    g.fillStyle='rgba(255,255,255,.06)'; rr(g,px,py,272,158,16); g.fill();
    const b=unitBuild(key), def=shopDef(key), lock=!owned(key);
    g.save(); g.translate(px+58, py+92); g.scale(1.55,1.55); g.translate(-40,-60);
    if(lock) g.globalAlpha=0.35;
    portraitFighter(g,{def,pal:def.pal,facing:1,x:40,y:60,lane:0,state:'fight',walkPhase:0,swing:0.4,hitFlash:0,dead:false,hp:1,hpMax:1,evo:0}, def); g.globalAlpha=1; g.restore();
    g.textAlign='left'; g.fillStyle='#fff8e8'; g.font='700 14px Pixelify, monospace'; g.fillText(lock?('🔒 '+def.name):displayName(key), px+112, py+42);
    g.fillStyle='#8dffab'; g.font='700 12px Pixelify, monospace'; g.fillText(lock?'locked':(b.element!=='Normal'&&b.element?('Nodes '+b.count+'  '+elemGlyph(b.element)):('Nodes '+b.count)), px+112, py+70);
    g.fillStyle='#ffd766'; g.font='700 11px Pixelify, monospace'; g.fillText(b.deepName?('▸ '+b.deepName):'▸ recruit', px+112, py+98);
  });
  g.textAlign='center'; g.fillStyle='#a8b8d0'; g.font='400 11px Pixelify, monospace'; g.fillText('Realm Vibe Rush · lane battle for the realm', cw/2, ch-26);
  cvs.toBlob(blob=>{
    if(!blob){ toast('share failed'); return; }
    const file=new File([blob],'realm-vibe-rush.png',{type:'image/png'});
    if(navigator.canShare && navigator.canShare({files:[file]})){ navigator.share({files:[file], title:'Realm Vibe Rush', text:'My Realm Vibe Rush army 🐱⚔️'}).catch(()=>{}); }
    else { const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='realm-vibe-rush.png'; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),5000); toast('📸 PNG saved'); }
  });
}

// buttons
function resetProgressKeepSettings(){
  const lang=LANG, musicVol=SAVE.musicVol, sfxVol=SAVE.sfxVol;
  SAVE=JSON.parse(JSON.stringify(DEFAULT_SAVE));
  SAVE.lang=lang; SAVE.musicVol=musicVol; SAVE.sfxVol=sfxVol;
  saveGame(); updateHiScore(); updateContinue();
  if(state&&!state.running) buildShop();
}
el('startBtn').onclick=()=>{
  if(!confirm(t('confirmNewGame'))) return;
  resetProgressKeepSettings();
  startLevel(1);
};
el('againBtn').onclick=()=>{
  // Always start stages with stage startGold (no carry-over). Retry uses current level.
  const next = (state && state.over && state.won) ? (state._nextLevel||((state.level||1)+1)) : (state && state.level)||1;
  startLevel(next); // omit gold → newLevel uses stage.startGold
};
function openPauseMenu(){
  if(!state||!state.running||state.over) return;
  state.paused=true;
  Sound.stopMusic();
  el('pauseScreen').classList.remove('hide');
  applyLang(); // refresh labels
}
function closePauseMenu(resumePlay){
  el('pauseScreen').classList.add('hide');
  if(!state) return;
  if(resumePlay){
    state.paused=false;
    Sound.startMusic();
  }
}
function quitToMenu(){
  el('pauseScreen').classList.add('hide');
  el('endScreen').classList.add('hide');
  el('barracksScreen').classList.add('hide');
  el('settingsScreen').classList.add('hide');
  el('spellBtn').classList.remove('show');
  if(state){
    state.running=false; state.paused=false; state.over=true;
  }
  Sound.stopMusic();
  // Fresh idle preview stage (not a live run)
  state = newLevel(1);
  state.eTowerX = WORLD_W-46;
  initBackground();
  buildShop();
  el('startScreen').classList.remove('hide');
  updateContinue();
  syncHUD();
}
el('pauseBtn').onclick=()=>{ openPauseMenu(); };
el('pauseResume').onclick=()=>{ closePauseMenu(true); };
el('pauseRestart').onclick=()=>{
  el('pauseScreen').classList.add('hide');
  const lv = (state && state.level) || 1;
  startLevel(lv); // fresh startGold, same stage
};
el('pauseQuit').onclick=()=>{ quitToMenu(); };
el('gearBtn').onclick=openSettings;
el('spellBtn').onclick=castSpell;
el('continueBtn').onclick=()=> startLevel(SAVE.maxLevel||1);
el('shareBtn').onclick=shareCard;
function updateContinue(){ const b=el('continueBtn'); if(!b) return;
  if((SAVE.maxLevel||1)>1){ b.style.display='block'; b.textContent=t('continue')+' · Lv'+SAVE.maxLevel; } else b.style.display='none'; }
el('settingsClose').onclick=()=>{ el('settingsScreen').classList.add('hide'); resumeFromSheet(); };
el('barracksBtn').onclick=openBarracks;
el('endBarracksBtn').onclick=openBarracks;
el('barracksClose').onclick=()=>{ el('barracksScreen').classList.add('hide'); if(state&&!state.running) buildShop(); resumeFromSheet(); };
el('langEn').onclick=()=>applyLang('en');
el('langKo').onclick=()=>applyLang('ko');
document.querySelectorAll('#langSeg button').forEach(b=> b.onclick=()=>applyLang(b.dataset.lang));
el('musicVol').oninput=e=>{ SAVE.musicVol=e.target.value/100; Sound.setMusic(SAVE.musicVol); saveGame(); };
el('sfxVol').oninput=e=>{ SAVE.sfxVol=e.target.value/100; Sound.setSfx(SAVE.sfxVol); saveGame(); };
el('sfxVol').onchange=()=>Sound.click();
el('wipeBtn').onclick=()=>{ if(!confirm(t('confirmNewGame'))) return; resetProgressKeepSettings(); toast('✔'); };

// global button juice — every button/card pops + clicks
document.addEventListener('pointerdown', e=>{
  const b=e.target.closest('button, .card, .langbtn, .elempick span, .seg button');
  if(b){ pressEl(b); Sound.unlock(); Sound.click(); }
}, true);

// keyboard
window.addEventListener('keydown', e=>{
  if(e.repeat) return;
  // keys 1-9 map first 9 shop slots; 0 = 10th if present
  const map={}; SHOP_ORDER.forEach((k,i)=>{ if(i<9) map[String(i+1)]=k; else if(i===9) map['0']=k; });
  if(map[e.key]){ Sound.unlock(); tryBuy(map[e.key]); }
  else if(e.key==='q'||e.key==='Q'){ if(hasMeteor()) castSpell(); else if(state&&state.running) toast(t('meteorLocked')); }
  else if(e.key===' '){ e.preventDefault(); if(state&&state.running) el('pauseBtn').click(); else if(!state||state.over) (el('startScreen').classList.contains('hide')?el('againBtn'):el('startBtn')).click(); }
});

// init — seed from inline fallback so the idle screen renders instantly, then override with fetched JSON
function applyData(u,e,s){
  SHOP_ORDER = u._order || Object.keys(u).filter(k=>k[0]!=='_');
  UNITS = {}; SHOP_ORDER.forEach(k=> UNITS[k]=u[k]);
  ENEMIES = e; STAGES = s;
}
loadSave();
LANG = SAVE.lang || ((navigator.language||'en').toLowerCase().indexOf('ko')===0 ? 'ko' : 'en');
Sound.setMusic(SAVE.musicVol); Sound.setSfx(SAVE.sfxVol);
el('musicVol').value=Math.round(SAVE.musicVol*100); el('sfxVol').value=Math.round(SAVE.sfxVol*100);
applyData(FALLBACK.units, FALLBACK.enemies, FALLBACK.stages);
applyLang(LANG);
updateHiScore(); updateContinue();
resize();
window.addEventListener('load', resize);
// idle background render so the start screen isn't blank
state = newLevel(1); state.eTowerX=WORLD_W-46; initBackground();
(function idle(){ if(!state.running){ render(); requestAnimationFrame(idle); } })();
// async: pull real JSON (units/enemies/stages/types), refresh idle scene if a server is available
// Preload pixel fonts for UI + canvas damage text
const FONT_READY = (document.fonts && document.fonts.load)
  ? Promise.all([
      document.fonts.load('700 16px Pixelify'),
      document.fonts.load('400 14px PressStart'),
      document.fonts.load('700 20px PressStart'),
    ]).catch(()=>{})
  : Promise.resolve();
loadData().then(()=> FONT_READY).then(()=>{
  // drop save-owned keys for removed units (tiny buddies, huntress, etc.)
  if(SAVE.owned){
    Object.keys(SAVE.owned).forEach(k=>{ if(!UNITS[k]) delete SAVE.owned[k]; });
    Object.assign(SAVE.owned, START_OWNED);
  }
  updateHiScore();
  if(state && !state.running){ state = newLevel(1); state.eTowerX=WORLD_W-46; initBackground(); }
  try{ if(typeof renderShop==='function') renderShop(); }catch(e){}
}).catch(e=>console.warn('data load failed, keeping fallback', e));
</script>
