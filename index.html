<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Realm Vibe Rush — Idle Lane Battler</title>
<style>
  /* Local pixel fonts (no CDN) */
  @font-face{ font-family:'Pixelify'; src:url('assets/fonts/pixelify-sans-400.woff2') format('woff2'); font-weight:400; font-style:normal; font-display:swap; }
  @font-face{ font-family:'Pixelify'; src:url('assets/fonts/pixelify-sans-700.woff2') format('woff2'); font-weight:700; font-style:normal; font-display:swap; }
  @font-face{ font-family:'PressStart'; src:url('assets/fonts/press-start-2p-400.woff2') format('woff2'); font-weight:400; font-style:normal; font-display:swap; }
  :root{
    --phone-w: 440px;
    --gold:#ffcf3f; --danger:#ff5a5a; --hp:#54d66a; --ink:#2a1808;
    --ink-soft:#5a3a18; --ink-muted:#7a5a30; --paper:#f5e6c8;
    --btn-text:#fff0c8;           /* light cream on dark wood buttons */
    --btn-text-hi:#ffe08a;        /* selected / gold emphasis */
    --panel:#3a2a1b; --panel2:#2b1d12; --line:#5a4128;
    --btn:#c98a3a;
    --font-ui: 'Pixelify', 'Courier New', monospace;
    --font-title: 'PressStart', 'Pixelify', monospace;
    --font-dmg: 'PressStart', 'Pixelify', monospace;
    /* Crusenho TravelBook Lite (itch free Book Styles) — primary panels/buttons/slots */
    --ui-panel: url("assets/ui/crusenho/travelbook/scaled/book_panel_x3.png");
    --ui-panel-light: url("assets/ui/crusenho/travelbook/scaled/book_page_x3.png");
    --ui-panel-brown: url("assets/ui/crusenho/travelbook/scaled/Popup01a_x3.png");
    --ui-inset: url("assets/ui/crusenho/travelbook/scaled/Frame01a_x3.png");
    --ui-inset-light: url("assets/ui/crusenho/travelbook/scaled/FrameSelect01a_x3.png");
    --ui-border: url("assets/ui/crusenho/travelbook/scaled/Frame01a_x3.png");
    --ui-border-fancy: url("assets/ui/crusenho/travelbook/scaled/FrameSelect01b_x3.png");
    --ui-popup: url("assets/ui/crusenho/travelbook/scaled/popup_wide_x3.png");
    --ui-slot: url("assets/ui/crusenho/travelbook/scaled/Slot01a_x3.png");
    --ui-slot-on: url("assets/ui/crusenho/travelbook/scaled/Select01a_x3.png");
    --ui-slot-b: url("assets/ui/crusenho/travelbook/scaled/Slot01b_x3.png");
    --ui-btn: url("assets/ui/crusenho/travelbook/scaled/button_long.png");
    --ui-btn-press: url("assets/ui/crusenho/travelbook/scaled/button_long_press.png");
    --ui-btn-gold: url("assets/ui/crusenho/travelbook/scaled/button_long.png");
    --ui-btn-gold-press: url("assets/ui/crusenho/travelbook/scaled/button_long_press.png");
    --ui-btn-blue: url("assets/ui/crusenho/travelbook/scaled/button_med.png");
    --ui-btn-blue-press: url("assets/ui/crusenho/travelbook/scaled/button_med_press.png");
    --ui-btn-grey: url("assets/ui/crusenho/travelbook/scaled/button_med.png");
    --ui-btn-sq: url("assets/ui/crusenho/travelbook/scaled/Button01a_1_x4.png");
    --ui-btn-sq-press: url("assets/ui/crusenho/travelbook/scaled/Button01a_3_x4.png");
    --ui-btn-round: url("assets/ui/crusenho/travelbook/scaled/Button01a_1_x4.png");
    --ui-btn-round-brown: url("assets/ui/crusenho/travelbook/scaled/Button01a_1_x4.png");
    --ui-ico-coin: url("assets/ui/crusenho/travelbook/scaled/IconCoin01a_x5.png");
    --ui-ico-gear: url("assets/ui/crusenho/travelbook/scaled/IconGear01a_x5.png");
    --ui-ico-pause: url("assets/ui/crusenho/travelbook/scaled/IconPause01a_x5.png");
    --ui-ico-play: url("assets/ui/crusenho/travelbook/scaled/IconPlay01a_x5.png");
    --ui-ico-star: url("assets/ui/crusenho/travelbook/scaled/IconStar01a_x5.png");
    --ui-ico-heart: url("assets/ui/crusenho/travelbook/scaled/IconHeart01a_x5.png");
    --ui-ico-tick: url("assets/ui/crusenho/travelbook/scaled/IconTick01a_x5.png");
    --ui-ico-cross: url("assets/ui/crusenho/travelbook/scaled/IconCross01a_x5.png");
    /* BDragon1727 Basic Pixel Health bar — keep HP bars */
    --ui-bar-back: url("assets/ui/bdragon/hud/hp_track_x3.png");
    --ui-bar-hp: url("assets/ui/bdragon/hud/hp_green_x3.png");
    --ui-bar-dmg: url("assets/ui/bdragon/hud/hp_red_x3.png");
    --ui-bar-gold: url("assets/ui/bdragon/hud/hp_yellow_x3.png");
    --ui-bar-blue: url("assets/ui/bdragon/hud/hp_blue_x3.png");
    --ui-check: url("assets/ui/crusenho/travelbook/scaled/IconTick01a_x5.png");
    --ui-check-on: url("assets/ui/crusenho/travelbook/scaled/IconTick01a_x5.png");
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:
      radial-gradient(1200px 700px at 50% -10%, #2a3a4d, #10161f 60%, #080b10 100%);
    font-family:var(--font-ui);
    color:#f5e6c8; display:flex; align-items:center; justify-content:center;
    overflow:hidden; user-select:none; -webkit-user-select:none; touch-action:manipulation;
    -webkit-font-smoothing:none;
    image-rendering:pixelated;
  }
  /* Phone frame — caps width on desktop, fills screen on mobile */
  #app{
    position:relative; width:100%; max-width:var(--phone-w); height:100%;
    max-height:960px; background:#0b0f14; overflow:hidden;
    box-shadow:0 30px 90px rgba(0,0,0,.7), 0 0 0 2px rgba(255,255,255,.04) inset;
  }
  @media(min-width:520px){ #app{ height:min(96vh,940px); border-radius:34px; border:10px solid #14181d; } }
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }

  /* ---------- Top HUD ---------- */
  #hud{ position:absolute; top:0; left:0; right:0; padding:30px 12px 4px; z-index:5;
        display:flex; flex-direction:column; gap:6px; pointer-events:none;
        text-shadow:0 2px 0 rgba(0,0,0,.45); }
  /* cumulative career highscore — always visible, above every screen */
  #hiscore{ position:absolute; top:-4px; left:50%; transform:translateX(-50%); z-index:26;
            display:flex; align-items:center; gap:5px; padding:6px 20px 8px; border-radius:10px;
            font-family:var(--font-ui); font-size:12px; font-weight:700; letter-spacing:.3px; color:var(--ink);
            background:var(--ui-popup) center/100% 100% no-repeat;
            border:none; filter:drop-shadow(0 3px 6px rgba(0,0,0,.45));
            text-shadow:0 1px 0 rgba(255,255,255,.35); pointer-events:none; image-rendering:pixelated; }
  #hiscore .t{ font-size:9px; opacity:.7; font-weight:900; }
  #hiscore .star{ width:18px; height:18px; background:var(--ui-ico-star) center/contain no-repeat; image-rendering:pixelated; }
  .bars{ display:flex; align-items:center; gap:8px; }
  .barwrap{ flex:1; }
  .barlabel{ font-size:10px; font-weight:700; letter-spacing:.4px; opacity:.95; margin-bottom:3px;
             display:flex; justify-content:space-between; color:#f0e0b8; text-shadow:0 1px 2px rgba(0,0,0,.7);
             font-family:var(--font-ui); }
  /* Clean CSS/SVG-style keep HP bars — lag chip + smooth fill */
  .bar{
    position:relative; height:16px; border-radius:999px; overflow:hidden;
    background:linear-gradient(180deg,#1a1410 0%, #0c0a08 100%);
    border:2px solid rgba(255,220,140,.35);
    box-shadow:inset 0 2px 4px rgba(0,0,0,.55), 0 1px 0 rgba(255,255,255,.08);
  }
  .bar > i{
    position:absolute; left:0; top:0; bottom:0; height:100%; max-width:100%;
    border-radius:999px; width:100%;
  }
  .bar > i.lag{
    z-index:0; opacity:.95;
    background:linear-gradient(180deg,#ffe08a 0%, #e0851a 55%, #a05010 100%);
    transition:width .45s cubic-bezier(.22,.8,.25,1);
  }
  .bar > i#pHp, .bar > i#eHp{
    z-index:1;
    transition:width .12s linear;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.35);
  }
  #pHp{
    background:linear-gradient(180deg,#9dffb0 0%, #3ecf5a 40%, #1a9a38 100%);
  }
  #eHp{
    background:linear-gradient(180deg,#ffb0a0 0%, #e23b3b 42%, #9a1818 100%);
  }
  .bar.enemy{ border-color:rgba(255,120,100,.4); }
  .bar::after{
    content:""; position:absolute; inset:0; border-radius:999px; pointer-events:none; z-index:2;
    background:linear-gradient(180deg, rgba(255,255,255,.22) 0%, rgba(255,255,255,0) 45%, rgba(0,0,0,.15) 100%);
  }
  .midrow{ display:flex; align-items:center; justify-content:center; gap:14px; }
  .chip{ display:flex; align-items:center; gap:6px; color:var(--btn-text); font-family:var(--font-ui);
         background:var(--ui-btn-blue) center/100% 100% no-repeat; border:none; border-radius:8px;
         padding:6px 14px; font-weight:700; min-height:36px;
         filter:drop-shadow(0 2px 3px rgba(0,0,0,.4)); text-shadow:0 1px 0 rgba(0,0,0,.55);
         image-rendering:pixelated; }
  .coin{ width:22px;height:22px;border-radius:0;
         background:var(--ui-ico-coin) center/contain no-repeat; image-rendering:pixelated;
         box-shadow:none; position:relative; flex:none; }
  .coin::after{ content:""; }
  #wave{ background:var(--ui-btn-blue) center/100% 100% no-repeat; color:var(--btn-text); text-shadow:0 1px 0 rgba(0,0,0,.55); }
  .iconbtn{ pointer-events:auto; width:40px;height:40px;border-radius:8px; border:none;
            background:var(--ui-btn-sq) center/100% 100% no-repeat; color:transparent; font-size:0; cursor:pointer;
            filter:drop-shadow(0 2px 3px rgba(0,0,0,.4)); image-rendering:pixelated;
            background-color:transparent; }
  /* First layer paints on top — icon above wood square (was reversed → blank buttons) */
  .iconbtn:active{ transform:translateY(2px); }
  #gearBtn{ background-image:var(--ui-ico-gear), var(--ui-btn-sq);
            background-size:55% 55%, 100% 100%; background-position:center, center; background-repeat:no-repeat; }
  #gearBtn:active{ background-image:var(--ui-ico-gear), var(--ui-btn-sq-press); }
  #pauseBtn{ background-image:var(--ui-ico-pause), var(--ui-btn-sq);
             background-size:50% 50%, 100% 100%; background-position:center, center; background-repeat:no-repeat; }
  #pauseBtn:active{ background-image:var(--ui-ico-pause), var(--ui-btn-sq-press); }

  /* ---------- Bottom shop (horizontal scroll) ---------- */
  #shop{ position:absolute; left:0; right:0; bottom:0; z-index:5;
         padding:10px 10px calc(12px + env(safe-area-inset-bottom));
         background:linear-gradient(180deg, rgba(12,8,4,0) 0%, rgba(12,8,4,.72) 16%, #120c08 68%);
         display:flex; flex-direction:row; flex-wrap:nowrap; gap:8px;
         overflow-x:auto; overflow-y:hidden; -webkit-overflow-scrolling:touch;
         scrollbar-width:thin; scrollbar-color:#c98a3a transparent; }
  #shop::-webkit-scrollbar{ height:4px; }
  #shop::-webkit-scrollbar-thumb{ background:#c98a3a; border-radius:4px; }
  /* Dark wood slots → cream/gold text (same rule as main buttons) */
  .card{
    position:relative; flex:0 0 84px; width:84px; border-radius:10px;
    padding:8px 5px 8px; cursor:pointer; overflow:hidden;
    background:
      linear-gradient(180deg, rgba(255,240,200,.08) 0%, rgba(0,0,0,.18) 100%),
      var(--ui-slot) center/100% 100% no-repeat;
    border:2px solid rgba(255,210,120,.22);
    box-shadow:0 3px 8px rgba(0,0,0,.45);
    display:flex; flex-direction:column; align-items:center; gap:3px;
    transition:transform .06s, border-color .12s, filter .12s;
    image-rendering:pixelated; color:var(--btn-text);
  }
  .card:active{ transform:translateY(2px) scale(.97); filter:brightness(.95); }
  .card canvas{
    position:static; width:52px; height:52px; border-radius:8px;
    background:rgba(0,0,0,.25);
    box-shadow:inset 0 0 0 1px rgba(255,220,140,.15);
  }
  .card .nm{
    font-family:var(--font-ui); font-size:11px; font-weight:700; letter-spacing:.2px;
    color:#fff3d0; text-shadow:0 1px 0 #000, 0 0 4px rgba(0,0,0,.8);
    line-height:1.15; text-align:center; width:100%;
    max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .card .path{
    font-family:var(--font-ui); font-size:9px; font-weight:700;
    color:#ffd766; text-shadow:0 1px 0 #000; opacity:.95;
    line-height:1; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    min-height:10px;
  }
  .card .cost{
    font-family:var(--font-ui); font-size:12px; font-weight:700;
    color:#ffe08a; display:flex; align-items:center; gap:3px;
    text-shadow:0 1px 0 #000, 0 0 4px rgba(0,0,0,.7);
    background:rgba(0,0,0,.35); border-radius:6px; padding:2px 7px;
    border:1px solid rgba(255,200,80,.25);
  }
  .card .key{
    position:absolute; top:5px; left:6px; font-size:9px; font-weight:700;
    color:#ffe8b0; opacity:.8; text-shadow:0 1px 0 #000;
  }
  .card .cd{ position:absolute; inset:3px; background:rgba(0,0,0,.62); border-radius:8px;
             transform-origin:bottom; display:none; z-index:3; }
  .card.cooling .cd{ display:block; }
  .card.poor{ filter:grayscale(.25) brightness(.88); border-color:rgba(255,80,60,.35); }
  .card.poor .cost{ color:#ff8a7a; border-color:rgba(255,100,80,.4); }
  .card.locked{ filter:grayscale(.55) brightness(.65); }
  .card .lockicon{
    position:absolute; inset:0; z-index:4;
    display:flex; align-items:center; justify-content:center;
    font-size:26px; background:rgba(10,6,4,.45);
    text-shadow:0 2px 4px #000;
  }
  .card .evo{
    position:absolute; right:5px; bottom:28px; z-index:2;
    font-size:12px; filter:drop-shadow(0 1px 1px #000);
  }

  /* ---------- Overlays ---------- */
  .screen{ position:absolute; inset:0; z-index:20; display:flex; flex-direction:column;
           align-items:center; justify-content:center; gap:16px; text-align:center; padding:24px;
           background:radial-gradient(600px 400px at 50% 40%, rgba(10,14,20,.55), rgba(6,9,13,.92)); }
  .screen.hide{ display:none; }
  .title{ font-family:var(--font-title); font-size:22px; font-weight:400; letter-spacing:1px; line-height:1.35;
          color:#ffd766; text-shadow:0 2px 0 #3a1800, 0 3px 6px rgba(0,0,0,.55); }
  /* Victory / defeat — big solid text, no yellow plate */
  #endTitle{
    font-family:var(--font-title); font-size:34px; font-weight:400; letter-spacing:2px; line-height:1.2;
    background:none !important; background-image:none !important; padding:0; border:none; border-radius:0;
    color:#ffe08a; text-shadow:
      0 0 1px #3a1800,
      0 3px 0 #5a2800,
      0 5px 0 #2a1000,
      0 6px 14px rgba(0,0,0,.65),
      0 0 18px rgba(255,180,40,.35);
  }
  #endTitle.defeat{
    color:#ff9a9a;
    text-shadow:
      0 0 1px #400808,
      0 3px 0 #601010,
      0 5px 0 #300808,
      0 6px 14px rgba(0,0,0,.65),
      0 0 18px rgba(255,80,60,.3);
  }
  .sub{ font-family:var(--font-ui); font-size:13px; font-weight:400; color:#f0e0b8; max-width:320px; line-height:1.45;
        text-shadow:0 1px 2px rgba(0,0,0,.75); }
  .big{ font-family:var(--font-title); font-size:14px; font-weight:400; color:#ffe08a; text-shadow:0 2px 0 #3a1a00; line-height:1.4; }
  /* Dark wood button art → ALWAYS light cream text */
  .play{ pointer-events:auto; margin-top:6px; padding:16px 28px 18px; font-family:var(--font-ui); font-size:15px; font-weight:700; letter-spacing:.4px;
         border:none; border-radius:12px; cursor:pointer; color:var(--btn-text) !important;
         background:var(--ui-btn-gold) center/100% 100% no-repeat;
         filter:drop-shadow(0 5px 10px rgba(0,0,0,.4)); text-shadow:0 2px 0 rgba(0,0,0,.65);
         min-height:52px; image-rendering:pixelated; }
  .play:active{ transform:translateY(3px); background-image:var(--ui-btn-gold-press); filter:brightness(.96) drop-shadow(0 2px 4px rgba(0,0,0,.35)); }
  .hintrow{ font-size:12px; opacity:.7; }
  #toast{ position:absolute; top:132px; left:50%; transform:translateX(-50%); z-index:8;
          background:var(--ui-popup) center/100% 100% no-repeat; border:none; padding:12px 22px; border-radius:8px;
          font-family:var(--font-ui); font-size:12px; font-weight:700; color:var(--ink); opacity:0; transition:opacity .25s; pointer-events:none;
          max-width:90%; text-align:center; filter:drop-shadow(0 3px 6px rgba(0,0,0,.45));
          text-shadow:0 1px 0 rgba(255,245,220,.4); image-rendering:pixelated; min-height:40px;}
  #toast.show{ opacity:1; }

  /* ---------- Button juice (exaggerated) ---------- */
  @keyframes popIn{ 0%{transform:scale(.4) rotate(-8deg);opacity:0;} 70%{transform:scale(1.12) rotate(2deg);opacity:1;} 100%{transform:scale(1);} }
  @keyframes wob{ 0%,100%{transform:rotate(-2deg);} 50%{transform:rotate(2deg);} }
  .pressed{ animation:pressPop .32s cubic-bezier(.2,1.6,.4,1); }
  @keyframes pressPop{ 0%{transform:scale(.82);} 45%{transform:scale(1.18);} 70%{transform:scale(.94);} 100%{transform:scale(1);} }
  .play{ animation:pop-breathe 2.2s ease-in-out infinite; }
  @keyframes pop-breathe{ 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(-3px) scale(1.03);} }
  .play:active{ animation:none; transform:scale(.9); }

  /* ---------- Spell button (circular CD ring) ---------- */
  #spellBtn{
    --cd:0; /* 0 ready · 1 full cooldown remaining */
    position:absolute; right:10px; bottom:calc(128px + env(safe-area-inset-bottom)); z-index:6;
    width:66px;height:66px;border-radius:50%; border:none; cursor:pointer; display:none;
    background:
      radial-gradient(circle at 38% 28%, rgba(255,255,255,.35), transparent 42%),
      radial-gradient(circle at 50% 55%, #5a2088 0%, #2a0a48 70%, #140420 100%);
    box-shadow:0 6px 18px rgba(160,60,255,.55), 0 0 0 3px rgba(255,224,138,.45); color:#fff;
    align-items:center; justify-content:center; overflow:visible;
  }
  #spellBtn.show{ display:flex; }
  #spellBtn.ready{ animation:pop-breathe 1.6s ease-in-out infinite;
    box-shadow:0 6px 18px rgba(160,60,255,.55), 0 0 0 3px rgba(255,224,138,.55), 0 0 16px rgba(255,140,40,.5); }
  #spellBtn:not(.ready){ filter:saturate(.75) brightness(.88); }
  #spellBtn:active{ transform:scale(.86); animation:none; }
  /* Ring: remaining CD = dark arc; ready portion = gold arc (starts at top, clockwise) */
  #spellBtn .sc{
    position:absolute; inset:-5px; border-radius:50%; pointer-events:none; z-index:1;
    background:conic-gradient(from -90deg,
      rgba(20,8,40,.72) 0 calc(var(--cd) * 360deg),
      #ffe08a 0);
    -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 4px));
            mask:radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 4px));
  }
  #spellBtn.ready .sc{
    background:conic-gradient(#ffe08a 0 360deg);
    filter:drop-shadow(0 0 3px rgba(255,220,100,.7));
  }
  /* CraftPix skill icon (100 Skill Game Icons) */
  #spellBtn .ico{
    position:relative; z-index:2; width:44px; height:44px; border-radius:50%;
    background:url('assets/ui/icons/meteor.png') center/contain no-repeat;
    image-rendering:auto; filter:drop-shadow(0 2px 3px rgba(0,0,0,.55));
    font-size:0; color:transparent; overflow:hidden;
  }
  #spellBtn .lbl{ position:absolute; bottom:-16px; left:50%; transform:translateX(-50%); font-size:9px; font-weight:900;
                  white-space:nowrap; text-shadow:0 1px 2px #000; z-index:2; color:#fff3d0; }

  /* ---------- Element badges ---------- */
  .elem{ display:inline-flex; align-items:center; gap:2px; font-size:8px; font-weight:900; padding:1px 5px; border-radius:8px;
         color:#141018; text-shadow:none; }
  .card .elembadge{ position:absolute; top:2px; right:3px; font-size:11px; filter:drop-shadow(0 1px 1px #000); }

  /* ---------- Language select ---------- */
  .langrow{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .langbtn{ pointer-events:auto; padding:12px 16px; border-radius:10px; font-family:var(--font-ui); font-size:13px; font-weight:700; cursor:pointer;
            border:none; background:var(--ui-btn) center/100% 100% no-repeat; color:var(--btn-text) !important; transition:transform .1s;
            min-height:44px; filter:drop-shadow(0 3px 4px rgba(0,0,0,.35)); text-shadow:0 2px 0 rgba(0,0,0,.65); }
  .langbtn.sel{ background-image:var(--ui-btn-gold); color:var(--btn-text-hi) !important; transform:scale(1.05);
                text-shadow:0 2px 0 rgba(0,0,0,.7); }
  .langbtn:active{ transform:scale(.94); background-image:var(--ui-btn-press); }

  /* ---------- Modal sheets (settings / barracks / pause) ---------- */
  .sheet{ position:absolute; inset:0; z-index:30; display:flex; align-items:center; justify-content:center; padding:16px;
          background:rgba(8,6,4,.78); backdrop-filter:blur(3px); }
  .sheet.hide{ display:none; }
  .bubble{
    position:relative; width:100%; max-width:360px; max-height:88%; overflow-y:auto;
    border-radius:16px; padding:20px 18px 16px; color:#2a1808;
    background:
      linear-gradient(180deg, #fff6e0 0%, #f0d9a0 100%);
    border:4px solid #6a4420;
    box-shadow:
      0 0 0 3px #c9a060,
      0 18px 50px rgba(0,0,0,.65),
      inset 0 1px 0 rgba(255,255,255,.55);
    animation:popIn .32s cubic-bezier(.2,1.5,.4,1);
    -webkit-overflow-scrolling:touch;
  }
  .bubble h2{
    margin:0 0 16px; font-family:var(--font-title); font-size:16px; font-weight:400;
    text-align:center; color:#3a1c08; letter-spacing:1px;
    text-shadow:0 1px 0 rgba(255,255,255,.7);
  }
  /* Shop: fixed header (title + X) while body scrolls */
  .bubble.shop-bubble{
    display:flex; flex-direction:column; overflow:hidden; padding:0;
  }
  .shop-head{
    flex:none; position:sticky; top:0; z-index:5;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:14px 12px 12px 16px;
    background:linear-gradient(180deg, #fff8e8 0%, #f5e0a8 100%);
    border-bottom:2px solid rgba(106,68,32,.28);
    border-radius:12px 12px 0 0;
    box-shadow:0 2px 8px rgba(60,30,8,.12);
  }
  .shop-head h2{
    margin:0; flex:1; text-align:left; font-size:15px; padding-right:8px;
  }
  .shop-x{
    flex:none; width:40px; height:40px; border-radius:10px; border:2px solid #5a3818;
    background:linear-gradient(180deg, #e8a040 0%, #b06018 55%, #8a4010 100%);
    color:#fff8e0; font-size:20px; font-weight:900; line-height:1; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 0 #4a2408; text-shadow:0 1px 0 rgba(0,0,0,.5);
    font-family:var(--font-ui);
  }
  .shop-x:active{ transform:translateY(2px); box-shadow:0 0 0 #4a2408; filter:brightness(.96); }
  .shop-body{
    flex:1 1 auto; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch;
    padding:12px 18px 16px;
  }
  .set-row{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    margin:0 0 14px; padding:10px 12px; border-radius:10px;
    background:rgba(255,255,255,.45); border:2px solid rgba(106,68,32,.18);
  }
  .set-row label{
    font-family:var(--font-ui); font-weight:700; font-size:13px; color:#3a1c08;
    display:flex; align-items:center; gap:6px; flex:none;
  }
  .row{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin:10px 0; }
  .row > label{ font-family:var(--font-ui); font-weight:700; font-size:13px; color:#3a1c08; }
  /* Language chips — light panel, clear selected state */
  .seg{ display:flex; gap:8px; }
  .seg button{
    padding:8px 14px; border-radius:8px; font-family:var(--font-ui); font-weight:700; font-size:12px; cursor:pointer;
    border:2px solid #8a6030; background:linear-gradient(180deg,#fff8e8,#e8d0a0);
    color:#3a1c08 !important; min-width:52px; min-height:38px;
    box-shadow:0 2px 0 #6a4420; text-shadow:none;
  }
  .seg button.on{
    background:linear-gradient(180deg,#ffe08a,#e08a20);
    border-color:#8a5010; color:#2a1400 !important;
    box-shadow:0 2px 0 #6a3808, 0 0 0 2px rgba(255,200,80,.35);
  }
  .seg button:active{ transform:translateY(1px); box-shadow:0 1px 0 #6a4420; }
  input[type=range]{
    flex:1; height:8px; border-radius:999px; appearance:none; -webkit-appearance:none;
    background:linear-gradient(90deg,#c9a060,#8a6020);
    outline:none; border:1px solid #6a4420;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:22px; height:22px; border-radius:50%;
    background:linear-gradient(180deg,#ffe08a,#e08a20); border:2px solid #5a3010;
    box-shadow:0 2px 4px rgba(0,0,0,.35); cursor:pointer;
  }
  .closeX{ position:absolute; }
  /* Modal primary actions — solid gold, cream text */
  .sheetbtn{
    pointer-events:auto; display:block; width:100%; margin-top:10px;
    padding:14px 12px; border:3px solid #6a3808; border-radius:12px;
    font-family:var(--font-ui); font-size:14px; font-weight:700; cursor:pointer;
    color:#fff8e0 !important; text-shadow:0 2px 0 rgba(0,0,0,.55);
    background:linear-gradient(180deg,#e8a040 0%, #b06018 55%, #8a4010 100%);
    box-shadow:0 3px 0 #4a2408, 0 4px 10px rgba(0,0,0,.3);
    min-height:48px;
  }
  .sheetbtn:active{ transform:translateY(2px); box-shadow:0 1px 0 #4a2408; filter:brightness(.96); }
  .sheetbtn.ghost{
    background:linear-gradient(180deg,#6a4a38 0%, #3a2818 100%);
    border-color:#2a1810; color:#f0e0c0 !important;
    box-shadow:0 3px 0 #1a1008;
  }
  .sheetbtn.danger{
    background:linear-gradient(180deg,#e07060 0%, #a02820 55%, #701810 100%);
    border-color:#501008; color:#fff5f0 !important;
    box-shadow:0 3px 0 #400808; margin-top:14px; font-size:12px;
  }
  .set-actions{ margin-top:6px; }

  /* Barracks unit rows */
  .ucard{ display:flex; gap:10px; align-items:center;
          background:var(--ui-popup) center/100% 100% no-repeat; border:none; border-radius:10px;
          padding:12px 10px; margin:8px 0; filter:drop-shadow(0 2px 3px rgba(0,0,0,.12)); image-rendering:pixelated; }
  .ucard canvas{ width:52px;height:52px; background:transparent; border-radius:10px; flex:none; }
  .ucard .cmdico{
    flex:none; width:52px; height:52px; border-radius:12px;
    background:#1a1028 center/cover no-repeat;
    box-shadow:inset 0 0 0 2px rgba(90,50,20,.35), 0 2px 6px rgba(0,0,0,.2);
    image-rendering:auto;
  }
  .ucard .info{ flex:1; min-width:0; }
  .ucard .info b{ font-size:14px; }
  .ucard .lvl{ font-size:11px; opacity:.8; }
  .ucard .upg{ flex:none; padding:10px 14px; border-radius:8px; border:none; font-weight:900; font-size:11px; cursor:pointer;
               color:var(--btn-text) !important; text-shadow:0 2px 0 rgba(0,0,0,.65);
               background:var(--ui-btn-gold) center/100% 100% no-repeat; min-height:42px; min-width:72px; }
  .ucard .upg:active{ transform:translateY(2px); background-image:var(--ui-btn-gold-press); }
  .ucard .upg:disabled{ filter:grayscale(1) opacity(.6); background-image:var(--ui-btn-grey); }
  .gemchip{ display:inline-flex; align-items:center; gap:4px; font-family:var(--font-ui); font-weight:700;
            color:#e8f4ff; padding:6px 12px; border-radius:8px;
            background:var(--ui-btn-blue) center/100% 100% no-repeat;
            border:none; font-variant-numeric:tabular-nums; min-height:32px;
            text-shadow:0 1px 0 rgba(0,0,0,.65), 0 0 6px rgba(120,180,255,.35); }
  .scoreline{ display:flex; justify-content:space-between; align-items:center; font-size:13px; margin:3px 0 10px; font-weight:800; color:#5a3a12; }
  .scoreline b{ font-variant-numeric:tabular-nums; }

  /* ---------- Fun polish + Shop skill-tree UI ---------- */
  .bigrow{ display:flex; gap:10px; width:100%; max-width:340px; }
  .play.half{ flex:1; margin-top:0; padding:14px 8px; font-size:13px; }
  .play.half.up{ background-image:var(--ui-btn-blue); color:var(--btn-text) !important; }
  .play.half.up:active{ background-image:var(--ui-btn-blue-press); }
  /* shop scroll rules live above */

  /* shop tabs */
  .shoptabs{ display:flex; gap:8px; margin-bottom:12px; }
  .shoptab{ flex:1; padding:12px 8px; border-radius:10px; font-family:var(--font-ui); font-weight:700; font-size:12px; cursor:pointer;
            border:none; background:var(--ui-btn) center/100% 100% no-repeat; color:var(--btn-text) !important; transition:transform .08s;
            min-height:44px; filter:drop-shadow(0 2px 2px rgba(0,0,0,.15)); text-shadow:0 2px 0 rgba(0,0,0,.6); }
  .shoptab.on{ background-image:var(--ui-btn-gold); color:var(--btn-text-hi) !important; transform:translateY(-1px); }
  .shoptab:active{ transform:scale(.96); background-image:var(--ui-btn-press); }
  /* unit selector strip */
  .unitstrip{ display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin-bottom:10px; }
  .ustripbtn{ position:relative; width:56px; height:56px; border-radius:8px; cursor:pointer; padding:0; overflow:hidden;
              border:none; background:var(--ui-slot) center/100% 100% no-repeat; transition:transform .1s;
              filter:drop-shadow(0 2px 2px rgba(0,0,0,.2)); image-rendering:pixelated; }
  .ustripbtn canvas{ width:48px; height:48px; margin:4px; }
  .ustripbtn.on{ background-image:var(--ui-slot-on); transform:translateY(-3px) scale(1.08);
                 filter:drop-shadow(0 4px 3px rgba(0,0,0,.28)); }
  .ustripbtn .ulock{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:20px; background:rgba(20,12,6,.45); }
  .treehd{ display:flex; align-items:baseline; justify-content:space-between; gap:8px; margin:2px 2px 8px; }
  .treehd b{ font-family:var(--font-title); font-size:18px; color:#4a2808; font-weight:400; }
  .treehd span{ font-size:11px; opacity:.75; text-transform:capitalize; color:var(--ink-soft); }
  .treehint{ font-size:12px; text-align:center; margin:6px 4px; line-height:1.4; color:var(--ink-soft); font-weight:600; }

  /* ---- Skill tree (classic tree diagram) ---- */
  .skilltree{ margin-top:4px; }
  .buildsum{ color:var(--ink); border-radius:10px; padding:10px 12px 9px; margin-bottom:10px;
             background:var(--ui-popup) center/100% 100% no-repeat;
             border:none; filter:drop-shadow(0 3px 4px rgba(0,0,0,.15)); image-rendering:pixelated; }
  .buildsum .bs-top{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:6px; }
  .buildsum .bs-title{ font-family:var(--font-ui); font-size:12px; font-weight:700; color:#6a3008; }
  .buildsum .bs-path{ font-size:11px; font-weight:600; color:var(--ink-soft); }
  .buildsum .bs-chips{ display:flex; flex-wrap:wrap; gap:4px; }
  .buildsum .bs-empty{ font-size:11px; opacity:.7; font-weight:700; }

  .schip{ display:inline-flex; align-items:center; gap:2px; padding:2px 6px; border-radius:4px; font-size:10px; font-weight:700;
          font-variant-numeric:tabular-nums; line-height:1.2; border:1.5px solid transparent;
          text-shadow:0 1px 0 rgba(255,255,255,.2); }
  .schip.st-dmg{ background:#ff7a62; color:#5a0e08; border-color:#c03020; }
  .schip.st-hp{ background:#6fdc7e; color:#0d3d18; border-color:#2a9d4a; }
  .schip.st-rng{ background:#5aa8f0; color:#0a2f5a; border-color:#2a6fbf; }
  .schip.st-spd{ background:#ffb83a; color:#5a3400; border-color:#d48910; }
  .schip.st-aoe{ background:#c070ff; color:#3a0a5a; border-color:#8a30c8; }
  .schip.st-heal{ background:#4ecdc4; color:#0a3d38; border-color:#1a9a8c; }
  .schip.st-el{ background:#ffd766; color:#4a2e00; border-color:#c98a3a; }
  .schip.st-big{ background:#ffe8a8; color:#6a2a8a; border-color:#a060d0; }
  .schip.st-misc{ background:#fff4d8; color:#5a3a12; border-color:#d9bd82; }
  .schip.sm{ font-size:9px; padding:1px 5px; }

  /* Destiny path pick — two roots */
  .pathpick{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:4px 0 8px; }
  .pathcard{ text-align:center; padding:12px 8px 10px; border-radius:12px; cursor:pointer; font-family:var(--font-ui);
             border:3px solid #8a6a3a; background:linear-gradient(180deg,#fff4d8,#e8c878);
             color:var(--ink); box-shadow:0 3px 0 #6a4a20, 0 4px 8px rgba(0,0,0,.18);
             transition:transform .1s; position:relative; min-height:108px; }
  .pathcard:active{ transform:translateY(2px); box-shadow:0 1px 0 #6a4a20; }
  .pathcard.avail{ border-color:#e0851a; box-shadow:0 0 0 2px #ffe08a, 0 3px 0 #a06010; animation:pathPulse 1.4s ease-in-out infinite; }
  .pathcard.on{ border-color:#2fbf55; background:linear-gradient(180deg,#e8ffe8,#b8f0b8); }
  .pathcard.lock{ opacity:.5; filter:grayscale(.4); cursor:not-allowed; }
  .pathcard .pc-ico{ font-size:28px; line-height:1; display:block; }
  .pathcard .pc-name{ display:block; font-size:13px; font-weight:700; margin-top:6px; color:#3a1a08; }
  .pathcard .pc-blurb{ display:block; font-size:10px; font-weight:400; opacity:.75; margin:3px 0 6px; line-height:1.25; }
  .pathcard .pc-chips{ display:flex; flex-wrap:wrap; gap:3px; justify-content:center; margin-bottom:6px; min-height:18px; }
  .pathcard .pc-cost{ font-size:11px; font-weight:700; color:#6a2a9a; }
  .pathcard.on .pc-cost{ color:#1a6a2a; }
  .pathcard .pc-cost.poor{ color:#c02020; }
  @keyframes pathPulse{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-2px);} }

  /* Tree trunk diagram */
  .treediag{ position:relative; display:flex; flex-direction:column; align-items:center; gap:0; padding:6px 4px 8px; }
  .trow{ position:relative; display:flex; justify-content:center; width:100%; z-index:1; }
  .trow.fork{ display:grid; grid-template-columns:1fr 1fr; gap:12px; width:100%; padding:0 2px; }
  .trow.fork .tnode{ width:100%; }
  .tvline{ width:4px; height:14px; background:#c9a040; border-radius:2px; box-shadow:1px 0 0 #6a4a18; flex:none; }
  .tyfork{ position:relative; width:70%; height:18px; margin:0 auto; }
  .tyfork::before, .tyfork::after{
    content:""; position:absolute; top:0; width:50%; height:18px;
    border-top:4px solid #c9a040; box-sizing:border-box;
  }
  .tyfork::before{ left:0; border-left:4px solid #c9a040; border-top-left-radius:10px; }
  .tyfork::after{ right:0; border-right:4px solid #c9a040; border-top-right-radius:10px; }
  .tmerge{ position:relative; width:70%; height:18px; margin:0 auto; }
  .tmerge::before, .tmerge::after{
    content:""; position:absolute; bottom:0; width:50%; height:18px;
    border-bottom:4px solid #c9a040; box-sizing:border-box;
  }
  .tmerge::before{ left:0; border-left:4px solid #c9a040; border-bottom-left-radius:10px; }
  .tmerge::after{ right:0; border-right:4px solid #c9a040; border-bottom-right-radius:10px; }

  .tnode{ display:flex; flex-direction:column; align-items:center; gap:4px; width:min(220px, 92%);
          padding:10px 10px 8px; border-radius:14px; cursor:pointer; font-family:var(--font-ui);
          border:3px solid #8a6a3a; background:linear-gradient(180deg,#fff8e8,#f0d8a0);
          color:var(--ink); box-shadow:0 3px 0 #6a4a20; transition:transform .08s; text-align:center; }
  .tnode:active:not(.lock):not(.on){ transform:translateY(2px); box-shadow:0 1px 0 #6a4a20; }
  .tnode .tn-ico{ font-size:22px; line-height:1; width:40px; height:40px; border-radius:50%;
                  display:flex; align-items:center; justify-content:center;
                  background:radial-gradient(circle at 35% 30%, #fff,#e8c878 70%, #c9a040);
                  border:2px solid #8a6020; box-shadow:inset 0 -2px 0 rgba(0,0,0,.12); }
  .tnode .tn-name{ font-size:12px; font-weight:700; color:#3a1a08; line-height:1.2; }
  .tnode .tn-tag{ font-size:9px; font-weight:700; color:#8a5a20; opacity:.85; text-transform:uppercase; letter-spacing:.3px; }
  .tnode .tn-chips{ display:flex; flex-wrap:wrap; gap:3px; justify-content:center; min-height:16px; }
  .tnode .tn-cost{ font-size:11px; font-weight:700; color:#6a2a9a; }
  .tnode .tn-cost.poor{ color:#c02020; }
  .tnode.avail{ border-color:#e0851a; box-shadow:0 0 0 2px #ffe08a, 0 3px 0 #a06010; animation:nodePulse 1.3s ease-in-out infinite; }
  .tnode.on{ border-color:#2a9d4a; background:linear-gradient(180deg,#f0fff0,#c8f0c8); box-shadow:0 3px 0 #1a6a2a; }
  .tnode.on .tn-name{ color:#145a24; }
  .tnode.on .tn-cost{ color:#1a6a2a; }
  .tnode.on .tn-ico{ background:radial-gradient(circle at 35% 30%, #fff,#8dffab 65%, #2fbf55); border-color:#1a7a30; }
  .tnode.lock{ opacity:.48; filter:grayscale(.35); cursor:not-allowed; }
  .tnode.capstone{ border-color:#8a40c0; }
  .tnode.capstone.avail{ border-color:#c060ff; box-shadow:0 0 0 2px #e8c0ff, 0 3px 0 #6a20a0; }
  .tnode.capstone.on{ border-color:#6a20a0; background:linear-gradient(180deg,#f8f0ff,#e0c8f8); }
  .tnode.element.avail{ border-color:#3aa0ff; box-shadow:0 0 0 2px #b0d8ff, 0 3px 0 #2060a0; }
  .forklabel{ width:100%; text-align:center; font-size:9px; font-weight:700; color:#8a5a18;
              letter-spacing:.5px; text-transform:uppercase; margin:2px 0 4px; opacity:.9; }
  .branchbadge{ display:flex; align-items:center; justify-content:center; gap:6px; padding:8px 16px; border-radius:10px;
                margin:0 auto 8px; width:fit-content; max-width:100%;
                background:var(--ui-btn-gold) center/100% 100% no-repeat; border:none;
                font-family:var(--font-ui); font-size:11px; font-weight:700; color:var(--btn-text) !important;
                text-shadow:0 2px 0 rgba(0,0,0,.6); filter:drop-shadow(0 2px 2px rgba(0,0,0,.15)); min-height:34px; }
  @keyframes nodePulse{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-2px);} }

  /* commander pips */
  .gdesc{ font-size:10px; opacity:.72; margin-top:2px; }
  .pips{ display:flex; gap:3px; margin-top:5px; }
  .pip{ width:14px; height:8px; border-radius:3px; background:#d9c39a; }
  .pip.on{ background:linear-gradient(#ffd766,#e0851a); }

  /* Pause menu */
  .pause-bubble{ text-align:center; max-width:320px; }
  .pause-bubble h2{ margin-bottom:14px; }
  .pause-bubble .sheetbtn{ margin-top:10px; }
  .pause-bubble .sheetbtn:first-of-type{ margin-top:4px; }
</style>
</head>
<body>
<div id="app">
  <canvas id="battle"></canvas>
  <div id="hiscore"><span class="star" aria-hidden="true"></span><span class="t">TOTAL</span><span id="hiscoreVal">0</span></div>

  <div id="hud">
    <div class="bars">
      <div class="barwrap">
        <div class="barlabel"><span data-i18n="yourKeep">🏰 YOUR KEEP</span><span id="pHpTxt">1000</span></div>
        <div class="bar"><i class="lag" id="pHpLag"></i><i id="pHp"></i></div>
      </div>
      <div class="barwrap">
        <div class="barlabel"><span id="eHpTxt" style="text-align:left">1000</span><span data-i18n="enemyKeep">ENEMY 🗼</span></div>
        <div class="bar enemy"><i class="lag" id="eHpLag"></i><i id="eHp"></i></div>
      </div>
    </div>
    <div class="midrow">
      <button class="iconbtn" id="gearBtn" title="Settings">⚙️</button>
      <div class="chip"><span class="coin"></span><span id="gold">100</span></div>
      <div class="chip" id="wave">Lv <span id="lvl">1</span></div>
      <button class="iconbtn" id="pauseBtn" title="Pause">⏸</button>
    </div>
  </div>

  <div id="toast"></div>
  <button id="spellBtn" type="button" title="Meteor"><span class="ico" aria-hidden="true"></span><span class="sc"></span><span class="lbl" id="spellLbl">METEOR</span></button>
  <div id="shop"></div>

  <!-- Pause menu -->
  <div class="sheet hide" id="pauseScreen">
    <div class="bubble pause-bubble">
      <h2 data-i18n="paused">⏸ PAUSED</h2>
      <button class="sheetbtn" id="pauseResume" data-i18n="resume">▶ RESUME</button>
      <button class="sheetbtn" id="pauseRestart" data-i18n="restart">↻ RESTART</button>
      <button class="sheetbtn ghost" id="pauseQuit" data-i18n="quitMenu">⌂ QUIT TO MENU</button>
    </div>
  </div>

  <!-- Language + start splash -->
  <div class="screen" id="startScreen">
    <div class="title">REALM<br>VIBE<br>RUSH</div>
    <div class="langrow">
      <button class="langbtn" id="langEn" data-lang="en">🇬🇧 English</button>
      <button class="langbtn" id="langKo" data-lang="ko">🇰🇷 한국어</button>
    </div>
    <div class="sub" id="storyText"></div>
    <button class="play" id="continueBtn" data-i18n="continue" style="display:none">▶ CONTINUE</button>
    <button class="play" id="startBtn" data-i18n="gameStart" style="font-size:16px;padding:10px 26px">▶ NEW GAME</button>
    <div class="langrow">
      <button class="langbtn" id="barracksBtn" style="font-size:13px" data-i18n="barracks">⚔️ BARRACKS</button>
    </div>
    <div class="hintrow" data-i18n="hint">Tap cards · or press 1–6</div>
  </div>

  <!-- End of level -->
  <div class="screen hide" id="endScreen">
    <div class="title" id="endTitle">VICTORY</div>
    <div class="big" id="endMsg"></div>
    <div class="sub" id="endSub"></div>
    <div id="scoreBox" style="width:100%;max-width:280px"></div>
    <div class="bigrow">
      <button class="play half up" id="endBarracksBtn" data-i18n="upgrade">⬆️ UPGRADE</button>
      <button class="play half" id="againBtn" data-i18n="nextLevel">▶ NEXT LEVEL</button>
    </div>
    <button class="langbtn" id="shareBtn" style="font-size:13px" data-i18n="share">📸 SHARE CARD</button>
  </div>

  <!-- Settings -->
  <div class="sheet hide" id="settingsScreen">
    <div class="bubble">
      <h2 data-i18n="settings">⚙️ SETTINGS</h2>

/* ----------------------------- Canvas setup ----------------------------- */
const cv = document.getElementById('battle');
const ctx = cv.getContext('2d');
let W = 0, H = 0, groundY = 0, DPR = 1, WORLD_W = 0, camX = 0;
function resize(){
  const r = cv.getBoundingClientRect();
  DPR = Math.min(window.devicePixelRatio || 1, 2.5);
  W = r.width; H = r.height;
  cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  groundY = H * 0.70;
  WORLD_W = Math.round(W * 2.4); // battlefield is ~2.4 screens wide → camera scrolls L→R
  if(state){ state.eTowerX = WORLD_W - 46; }
}
window.addEventListener('resize', resize);

/* ------------------------------- Utilities ------------------------------ */
const rand = (a,b)=> a + Math.random()*(b-a);
const clamp = (v,a,b)=> v<a?a:v>b?b:v;

/* =============================== AUDIO ================================== */
const Sound = (()=>{
  let ac=null, master=null, musicGain=null, sfxGain=null, muted=false, musicTimer=null, step=0;
  let musicVol=0.16, sfxVol=0.55;
  function ensure(){
    if(ac) return;
    ac = new (window.AudioContext||window.webkitAudioContext)();
    master = ac.createGain(); master.gain.value = 0.9; master.connect(ac.destination);
    musicGain = ac.createGain(); musicGain.gain.value = muted?0:musicVol; musicGain.connect(master);
    sfxGain = ac.createGain(); sfxGain.gain.value = muted?0:sfxVol; sfxGain.connect(master);
  }
  function tone(freq, dur, type='sine', dst=null, vol=1, slideTo=null){
    if(!ac||muted) return;
    const o=ac.createOsc?ac.createOsc():ac.createOscillator();
    const g=ac.createGain();
    o.type=type; o.frequency.setValueAtTime(freq, ac.currentTime);
    if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, ac.currentTime+dur);
    g.gain.setValueAtTime(0.0001, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(vol, ac.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime+dur);
    o.connect(g); g.connect(dst||sfxGain); o.start(); o.stop(ac.currentTime+dur+0.02);
  }
  function noise(dur, vol=0.4, filterFreq=1200){
    if(!ac||muted) return;
    const n=ac.createBufferSource();
    const buf=ac.createBuffer(1, ac.sampleRate*dur, ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
    n.buffer=buf;
    const f=ac.createBiquadFilter(); f.type='bandpass'; f.frequency.value=filterFreq;
    const g=ac.createGain(); g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime+dur);
    n.connect(f); f.connect(g); g.connect(sfxGain); n.start(); n.stop(ac.currentTime+dur+0.02);
  }
  // Music: gentle 8-step epic-ish loop
  const scale=[196,220,246.9,261.6,293.7,329.6,392]; // G minor-ish
  const bassSeq=[98,98,116.5,130.8, 98,98,87.3,73.4];
  function musicStep(){
    if(!ac||muted) return;
    const b=bassSeq[step%bassSeq.length];
    tone(b,0.42,'triangle',musicGain,0.9);
    if(step%2===0){ const n=scale[(step*3)%scale.length]; tone(n,0.5,'sawtooth',musicGain,0.32); }
    if(step%4===0){ tone(scale[0]*2,0.9,'sine',musicGain,0.25); }
    step++;
  }
  return {
    unlock(){ ensure(); if(ac.state==='suspended') ac.resume(); },
    startMusic(){ ensure(); if(musicTimer) return; musicStep(); musicTimer=setInterval(musicStep,300); },
    stopMusic(){ if(musicTimer){clearInterval(musicTimer);musicTimer=null;} },
    toggle(){ muted=!muted; if(musicGain) musicGain.gain.value = muted?0:musicVol; if(sfxGain) sfxGain.gain.value = muted?0:sfxVol; return muted; },
    setMusic(v){ musicVol=v; if(musicGain) musicGain.gain.value=muted?0:v; },
    setSfx(v){ sfxVol=v; if(sfxGain) sfxGain.gain.value=muted?0:v; },
    click(){ tone(660,0.05,'square',null,0.18,880); },
    boom(){ noise(0.4,0.7,300); tone(70,0.5,'sawtooth',null,0.4,40); tone(200,0.3,'square',null,0.2); },
    // SFX
    coin(){ tone(880,0.08,'square',null,0.25,1320); },
    spawn(){ tone(300,0.12,'sawtooth',null,0.3,520); },
    swordHit(){ noise(0.09,0.5,2600); tone(220,0.06,'square',null,0.15); },
    arrow(){ tone(900,0.12,'triangle',null,0.2,300); },
    magic(){ tone(500,0.25,'sine',null,0.3,1400); tone(760,0.25,'sine',null,0.2,1900); },
    heal(){ tone(660,0.2,'sine',null,0.25,990); tone(990,0.25,'sine',null,0.18,1320); },
    die(){ tone(200,0.3,'sawtooth',null,0.3,60); },
    baseHit(){ noise(0.2,0.6,400); tone(90,0.25,'square',null,0.35,55); },
    win(){ [523,659,784,1046].forEach((f,i)=> setTimeout(()=>tone(f,0.35,'triangle',null,0.4),i*130)); },
    lose(){ [392,330,262,196].forEach((f,i)=> setTimeout(()=>tone(f,0.4,'sawtooth',null,0.35),i*160)); }
  };
})();

const SAVE_KEY='rvr_save_v2';
const START_OWNED={warrior:true, archer:true, healer:true}; // lean starter trio
const UNLOCK_COST={amazon:18, barbarian:22, mage:32, samurai:24, dragon:40};
const DEFAULT_SAVE={ schemaVersion:3, lang:null, musicVol:0.16, sfxVol:0.55, gems:0, maxLevel:1,
  owned:Object.assign({},START_OWNED), trees:{}, global:{}, scores:{}, meteorUnlocked:false };
const METEOR_UNLOCK_LEVEL=4;
function hasMeteor(){
  // Free unlock from stage 4 onward (also honor explicit flag + continuing runs)
  if(SAVE.meteorUnlocked) return true;
  if((SAVE.maxLevel||1) >= METEOR_UNLOCK_LEVEL) return true;
  if(state && state.level >= METEOR_UNLOCK_LEVEL) return true;
  return false;
}
function ensureMeteorUnlock(level, announce){
  if(level < METEOR_UNLOCK_LEVEL) return false;
  if(SAVE.meteorUnlocked) return false;
  SAVE.meteorUnlocked = true;
  saveGame();
  if(announce) toast(t('meteorUnlocked'));
  return true;
}
let SAVE = JSON.parse(JSON.stringify(DEFAULT_SAVE));
function migrateSave(s){
  if(!s || typeof s!=='object' || (s.schemaVersion||0) < 2){
    // v1 (or unknown) → latest: keep meta; reset unit progression
    const base=JSON.parse(JSON.stringify(DEFAULT_SAVE));
    if(s && typeof s==='object') ['lang','musicVol','sfxVol','gems','maxLevel','scores','meteorUnlocked'].forEach(k=>{ if(s[k]!==undefined) base[k]=s[k]; });
    if((base.maxLevel||1) >= METEOR_UNLOCK_LEVEL) base.meteorUnlocked=true;
    return base;
  }
  // v2 → v3: new branched skill trees (node ids changed) — keep meta/owned/globals, wipe trees only
  if((s.schemaVersion||0) < 3){
    const m=Object.assign(JSON.parse(JSON.stringify(DEFAULT_SAVE)), s);
    m.schemaVersion=3; m.trees={};
    if(m.owned) m.owned=Object.assign({}, START_OWNED, m.owned);
    if((m.maxLevel||1) >= METEOR_UNLOCK_LEVEL) m.meteorUnlocked=true;
    return m;
  }
  const out=Object.assign(JSON.parse(JSON.stringify(DEFAULT_SAVE)), s);
  // Existing saves past stage 4 keep Meteor
  if(out.meteorUnlocked==null && (out.maxLevel||1) >= METEOR_UNLOCK_LEVEL) out.meteorUnlocked=true;
  return out;
}
function loadSave(){ try{ const raw=localStorage.getItem(SAVE_KEY)||localStorage.getItem('rvr_save_v1'); if(raw) SAVE=migrateSave(JSON.parse(raw)); }catch(e){ console.warn('save load failed',e); } }
function saveGame(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(SAVE)); }catch(e){} }

function treeSave(key){ if(!SAVE.trees[key]) SAVE.trees[key]={}; return SAVE.trees[key]; } // {nodeId:true}

  if(!atkCls||!defCls||atkCls==='support'||defCls==='support') return 1;

function buildTree(key){
  const sp=TREE_SPEC[key], out=[{id:key+'.root',tier:0,root:true,name:key}];
  if(!sp) return out;
  ['a','b'].forEach(bk=>{ const br=sp[bk]; if(!br) return; const p=key+'.'+bk;
    out.push({id:p+'1',tier:1,branch:bk,requires:key+'.root',cost:8,name:br.name,blurb:br.blurb,icon:br.icon,mul:br.mul,set:br.set,look:br.look,kind:'identity'});
    const c=br.core; out.push({id:p+'2',tier:2,branch:bk,requires:p+'1',cost:c.cost,name:c.name,icon:c.icon,mul:c.mul,set:c.set,look:c.look,kind:'power'});
    ['x','y'].forEach(fk=>{ const s=br.specs[fk];
      out.push({id:p+'3'+fk,tier:3,branch:bk,fork:fk,requires:p+'2',cost:s.cost,name:s.name,blurb:s.blurb,icon:s.icon,mul:s.mul,set:s.set,look:s.look,tag:s.tag,kind:'spec'});
    });
    const e=br.el; out.push({id:p+'4',tier:4,branch:bk,requiresAny:[p+'3x',p+'3y'],cost:e.cost,name:e.name,icon:e.icon,element:e.element,mul:e.mul,set:e.set,kind:'element'});
    const cap=br.cap; out.push({id:p+'5',tier:5,branch:bk,requires:p+'4',cost:cap.cost,name:cap.name,icon:cap.icon,mul:cap.mul,set:cap.set,look:cap.look,capstone:true,kind:'capstone'});
  });
  return out;
}
const TREES={}; Object.keys(TREE_SPEC).forEach(k=>TREES[k]=buildTree(k));
// Root is the free hub — always unlocked for owned units (tier-1 requires it).
function nodeUnlocked(key,id){ if(id && String(id).endsWith('.root')) return true; return !!treeSave(key)[id]; }
function activeBranch(key){ const t=treeSave(key); for(const n of TREES[key]||[]) if(!n.root && t[n.id]) return n.branch; return null; }
function activeFork(key){ const t=treeSave(key); for(const n of TREES[key]||[]) if(n.fork && t[n.id]) return n.fork; return null; }
function canUnlock(key,node){
  if(!node || node.root || nodeUnlocked(key,node.id)) return false;
  if(node.requires && !nodeUnlocked(key,node.requires)) return false;
  if(node.requiresAny && !node.requiresAny.some(id=>nodeUnlocked(key,id))) return false;
  const ab=activeBranch(key); if(ab && node.branch && node.branch!==ab) return false;
  const af=activeFork(key); if(af && node.fork && node.fork!==af) return false;
  return true;
}
/* Build colored stat chips from a node's mul/set/element for shop UI */
function effectChips(node, opts){
  opts=opts||{}; const sm=!!opts.sm, chips=[];
  if(!node) return chips;
  if(node.element) chips.push({cls:'st-el', text:elemGlyph(node.element)+' '+node.element});
  if(node.mul){
    const order=['dmg','heal','hp','range','speed','splash','atk'];
    const labels={dmg:'DMG',heal:'HEAL',hp:'HP',range:'RANGE',speed:'SPD',splash:'AOE',atk:'ATK SPD'};
    const cls={dmg:'st-dmg',heal:'st-heal',hp:'st-hp',range:'st-rng',speed:'st-spd',splash:'st-aoe',atk:'st-spd'};
    order.forEach(k=>{ if(node.mul[k]==null) return; const v=node.mul[k];
      if(k==='atk'){ const pct=Math.round((1-v)*100); if(!pct) return;
        chips.push({cls:cls.atk+(sm?' sm':''), text:(pct>0?'+':'')+pct+'% '+labels.atk}); return; }
      const pct=Math.round((v-1)*100); if(!pct) return;
      chips.push({cls:(cls[k]||'st-misc')+(sm?' sm':''), text:(pct>0?'+':'')+pct+'% '+labels[k]});
    });
  }
  if(node.set){
    if(node.set.role) chips.push({cls:'st-big'+(sm?' sm':''), text:'→ '+String(node.set.role).toUpperCase()});
    if(node.set.range!=null && !(node.mul&&node.mul.range)) chips.push({cls:'st-rng'+(sm?' sm':''), text:'RANGE '+node.set.range});
    if(node.set.splash===0) chips.push({cls:'st-big'+(sm?' sm':''), text:'SINGLE-TARGET'});
    if(node.set.shield===true) chips.push({cls:'st-hp'+(sm?' sm':''), text:'SHIELD ON'});
    if(node.set.shield===false) chips.push({cls:'st-misc'+(sm?' sm':''), text:'NO SHIELD'});
    if(node.set.weapon && node.kind==='identity') chips.push({cls:'st-misc'+(sm?' sm':''), text:String(node.set.weapon).toUpperCase()});
  }
  if(node.tag==='big' && !chips.some(c=>c.cls.indexOf('st-big')>=0))
    chips.push({cls:'st-big'+(sm?' sm':''), text:'★ BIG UPGRADE'});
  return chips;
}
function chipsHtml(chips){ return chips.map(c=>'<span class="schip '+c.cls+'">'+c.text+'</span>').join(''); }
function unitBuild(key){
  const t=treeSave(key), R={mul:{},set:{},look:{},element:null,count:0,branch:null,deepName:null,fork:null};
  (TREES[key]||[]).forEach(n=>{ if(n.root||!t[n.id]) return; R.count++; R.branch=n.branch; R.deepName=n.name;
    if(n.fork) R.fork=n.fork;
    if(n.mul) for(const k in n.mul) R.mul[k]=(R.mul[k]||1)*n.mul[k];
    if(n.set) Object.assign(R.set,n.set);
    if(n.look) for(const k in n.look){ if(k==='pal') R.look.pal=Object.assign(R.look.pal||{},n.look.pal); else R.look[k]=n.look[k]; }
    if(n.element) R.element=n.element;
  });
  // full path = 5 nodes (identity+core+spec+element+cap)
  R.evo = R.count>=5?2 : R.count>=3?1 : 0;
  return R;
}
function evoTierOf(key){ return unitBuild(key).evo; }
function displayName(key){ const b=unitBuild(key), base=(UNITS[key]&&UNITS[key].name)||key;
  return (b.evo===2?'🌟 ':b.evo===1?'⭐ ':'')+(b.deepName||base); }
function effectiveDef(key){
  const base=UNITS[key], b=unitBuild(key), d=Object.assign({},base);
  for(const k in b.set){ if(b.set[k]===null) delete d[k]; else d[k]=b.set[k]; }
  for(const k in b.look){ if(k==='pal') d.pal=Object.assign({},base.pal,b.look.pal); else d[k]=b.look[k]; }
  return d;
}
// effective def with element tint baked into the palette (for Shop/card portraits)
function shopDef(key){ const b=unitBuild(key); let d=effectiveDef(key);
  if(b.element && b.element!=='Normal') d=Object.assign({},d,{pal:elemTintPal(d.pal,b.element)}); return d; }
/* ==================== STAT PIPELINE (base→tree→element) ================= */
function resolveStats(baseDef, opts){
  opts=opts||{}; const mul=opts.mul||{};
  const s=Object.assign({}, baseDef);
  s.hp    = Math.round((baseDef.hp||1)   * (mul.hp||1) * (opts.hpMul||1));
  s.dmg   = Math.round((baseDef.dmg||0)  * (mul.dmg||1));
  if(baseDef.heal!==undefined) s.heal = Math.round((baseDef.heal||0) * (mul.heal||1));
  s.range = Math.round((baseDef.range||0)* (mul.range||1));
  s.speed = (baseDef.speed||0) * (mul.speed||1);
  s.atk   = (baseDef.atk||1)   * (mul.atk||1);
  s.splash= (baseDef.splash||0)* (mul.splash||1);
  s.element = opts.element || baseDef.element || 'Normal';
  s.cls = baseDef.cls || 'melee';
  return s;
}

  function rng(seed){ let a=seed>>>0; return function(){ a|=0;a=a+0x6D2B79F5|0; let x=Math.imul(a^a>>>15,1|a); x=x+Math.imul(x^x>>>7,61|x)^x; return ((x^x>>>14)>>>0)/4294967296; }; }

    }

    const reward=(L<=3?3:4+Math.floor(L/8)*2)+(boss?12+Math.floor(L/20)*3:0);
    const parTime=Math.round(20 + baseHp/70 + budgetRate*2.2);
    const place=(NAMES[element]?pick(r,NAMES[element]):'Stage').trim();
    const nm=place+' · Lv'+L;

    const enPool=STORY_EN[element]||STORY_EN.Normal;
    const koPool=STORY_KO[element]||STORY_KO.Normal;
    let storyEn=pick(r,enPool);
    let storyKo=pick(r,koPool);
    if(boss){
      storyEn+=' '+pick(r,BOSS_STORY_EN);

    if(L<=3){
      storyEn='Tutorial hills. Summon units, watch them march, crack the enemy keep.';

    }

    levels.push({
      level:L, name:nm, theme:th.theme, element, element2,
      baseHp, startGold, income, budgetRate, roster, boss:bossDef, reward, parTime,
      sky:th.sky, ground:th.ground, hillFar:th.hillFar, hillNear:th.hillNear, tree:th.tree,

  }
