async function loadJSON(path, fallback){
  try{
    const r = await fetch(path, {cache:'no-store'});
    if(!r.ok) throw new Error(r.status);
    return await r.json();
  }catch(e){
    console.warn('Using inline fallback for '+path+' ('+e+')');
    return fallback;
  }
}
/* ---- sprite-sheet monsters (CraftPix anime demon, etc.) ---- */
const SPRITE_PACKS = {}; // id -> { idle:[Image], walk:[], attack:[], hurt:[], dead:[], ready:bool }
function spriteAnimFor(u){
  if(u.dead) return 'dead';
  if(u.hitFlash>0.12) return 'hurt';
  if(u.state==='attack' || (u.swing||0)>0.15) return 'attack';
  if(u.state==='walk') return 'walk';
  return 'idle';
}
function loadSpritePack(id){
  if(SPRITE_PACKS[id]) return SPRITE_PACKS[id];
  const pack = SPRITE_PACKS[id] = { id, ready:false, anims:{} };
  const base = 'assets/monsters/'+id+'/game/';
  // probe up to 12 frames per anim; missing files are skipped
  const anims=['idle','walk','attack','hurt','dead'];
  let pending=0, done=0;
  function fin(){ done++; if(done>=pending) pack.ready=true; }
  anims.forEach(anim=>{
    pack.anims[anim]=[];
    for(let i=0;i<12;i++){
      pending++;
      const img=new Image();
      const idx=i;
      img.onload=()=>{ pack.anims[anim][idx]=img; fin(); };
      img.onerror=()=>{ fin(); };
      img.src = base+anim+'_'+String(i).padStart(2,'0')+'.png';
    }
  });
  if(pending===0) pack.ready=true;
  return pack;
}
/* ---- CraftPix Magic Effects Pack 4 (assets/fx/magic4/game/) ---- */
// https://craftpix.net/product/magic-effects-pixel-art-asset-pack-4/
const MAGIC_FX = {}; // id -> { frames:[Image], ready, n }
const MAGIC_FX_SPEC = {
  magic_proj: 8, poison_proj: 8, water_proj: 7,
  hit_slash: 9, hit_acid: 14, hit_boom: 10,
  meteor: 8, cast: 7, heal: 7, fist: 5,
};
function loadMagicFx(id){
  if(MAGIC_FX[id]) return MAGIC_FX[id];
  const n = MAGIC_FX_SPEC[id]||8;
  const pack = MAGIC_FX[id] = { id, frames:[], ready:false, n };
  let left=n;
  for(let i=0;i<n;i++){
    const img=new Image();
    const idx=i;
    img.onload=()=>{ pack.frames[idx]=img; if(--left<=0) pack.ready=true; };
    img.onerror=()=>{ if(--left<=0) pack.ready=true; };
    img.src='assets/fx/magic4/game/'+id+'/'+String(i).padStart(2,'0')+'.png';
  }
  if(n===0) pack.ready=true;
  return pack;
}
function preloadMagicFx(){ Object.keys(MAGIC_FX_SPEC).forEach(loadMagicFx); }
function magicFxFrames(id){
  const p=MAGIC_FX[id]||loadMagicFx(id);
  if(!p.ready) return null;
  const f=p.frames.filter(Boolean);
  return f.length?f:null;
}
/** Draw one-shot or looping magic FX sprite. Returns true if drawn. */
function drawMagicFx(id, x, y, opts){
  opts=opts||{};
  const frames=magicFxFrames(id); if(!frames) return false;
  let fi;
  if(opts.loop){
    const fps=opts.fps||12;
    fi = Math.floor((opts.t!=null?opts.t:now())*fps) % frames.length;
  } else {
    const life=opts.life||0.4, t=opts.t||0;
    fi = Math.min(frames.length-1, Math.floor((t/life)*frames.length));
  }
  const img=frames[fi]; if(!img||!img.width) return false;
  const h = opts.h || 48;
  const w = (img.width/img.height)*h;
  const facing = opts.facing!=null?opts.facing:1;
  ctx.save();
  ctx.translate(x, y+(opts.oy||0));
  if(opts.rot) ctx.rotate(opts.rot);
  ctx.scale(facing, 1);
  if(opts.alpha!=null) ctx.globalAlpha=opts.alpha;
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(img, -w/2, -h/2, w, h);
  ctx.restore();
  return true;
}
function spawnMagicFx(id, x, y, opts){
  opts=opts||{};
  const life = opts.life!=null?opts.life: Math.max(0.28, (MAGIC_FX_SPEC[id]||8)/18);
  state.fx.push({
    type:'mfx', id, x, y, t:0, life,
    h: opts.h||48, facing: opts.facing||1, oy: opts.oy||0,
    rot: opts.rot||0, alpha: opts.alpha!=null?opts.alpha:1,
  });
}
function magicProjIdFor(element, kind){
  if(kind==='heal') return 'water_proj';
  const el=(element||'').toLowerCase();
  if(el==='poison'||el==='nature'||el==='earth') return 'poison_proj';
  if(el==='water'||el==='ice'||el==='frost') return 'water_proj';
  return 'magic_proj'; // fire / arcane / default
}
function magicHitIdFor(element, splash){
  if(splash) return 'hit_boom';
  const el=(element||'').toLowerCase();
  if(el==='poison'||el==='nature'||el==='acid') return 'hit_acid';
  if(el==='fire'||el==='lightning') return 'hit_boom';
  return 'hit_slash';
}

/* Hit-flash on sprite alpha only. source-atop on the MAIN canvas whites the whole
   rect (sky is already opaque). Bake flash on an offscreen buffer first. */
let _flashCvs=null, _flashCtx=null;
function drawImageHitFlash(img, dx, dy, dw, dh, amount){
  if(amount<=0.02){ ctx.drawImage(img, dx, dy, dw, dh); return; }
  const iw=img.naturalWidth||img.width, ih=img.naturalHeight||img.height;
  if(!iw||!ih){ ctx.drawImage(img, dx, dy, dw, dh); return; }
  if(!_flashCvs){ _flashCvs=document.createElement('canvas'); _flashCtx=_flashCvs.getContext('2d',{willReadFrequently:false}); }
  if(_flashCvs.width!==iw||_flashCvs.height!==ih){ _flashCvs.width=iw; _flashCvs.height=ih; }
  const f=_flashCtx;
  f.setTransform(1,0,0,1,0,0);
  f.globalCompositeOperation='source-over';
  f.globalAlpha=1;
  f.clearRect(0,0,iw,ih);
  f.imageSmoothingEnabled=false;
  f.drawImage(img,0,0);
  // White only where sprite alpha > 0
  f.globalCompositeOperation='source-atop';
  f.fillStyle='#ffffff';
  f.globalAlpha=Math.min(0.92, amount);
  f.fillRect(0,0,iw,ih);
  f.globalCompositeOperation='source-over';
  f.globalAlpha=1;
  ctx.drawImage(_flashCvs, dx, dy, dw, dh);
}
function drawSpriteUnit(u){
  const def=u.def, pack=SPRITE_PACKS[def.sprite];
  if(!pack || !pack.ready){ return false; }
  const anim=spriteAnimFor(u);
  let frames=pack.anims[anim]||[];
  frames=frames.filter(Boolean);
  if(!frames.length){ frames=(pack.anims.idle||[]).filter(Boolean); }
  if(!frames.length) return false;
  let fi;
  if(anim==='attack'){
    const t=clamp(u.swing||0,0,1);
    fi=Math.min(frames.length-1, Math.floor((1-t)*frames.length));
  } else if(anim==='dead'){
    fi=Math.min(frames.length-1, Math.floor(clamp(u.deathT/0.7,0,0.999)*frames.length));
  } else if(anim==='hurt'){
    fi=Math.min(frames.length-1, Math.floor((1-clamp(u.hitFlash*4,0,1))*(frames.length-1)));
  } else {
    const fps = anim==='walk'?10:8;
    fi = Math.floor((now()*fps + (u.id||0)) ) % frames.length;
  }
  const img=frames[fi]; if(!img) return false;
  const baseY=u.y+u.lane+(u.flying?-(40+Math.sin(now()*4+(u.flyBob||0))*6):0);
  const sm=(u.sizeMul||1)*(def.spriteScale||1);
  const h=72*sm, w=(img.width/img.height)*h;
  ctx.save();
  ctx.translate(u.x, baseY);
  if(u.dead){ ctx.globalAlpha=Math.max(0,1-u.deathT/0.7); ctx.translate(0,u.deathT*8); }
  // enemies face left (facing=-1): flip so sprite faces the player keep
  ctx.scale(u.facing, 1);
  // soft shadow
  const shg=ctx.createRadialGradient(0,1,1,0,1,Math.max(12,w*0.35));
  shg.addColorStop(0,'rgba(0,0,0,.32)'); shg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=shg; ctx.beginPath(); ctx.ellipse(0,1,Math.max(12,w*0.35),6,0,0,7); ctx.fill();
  if(u.boss) drawBossAura(u);
  if(u.element && u.element!=='Normal'){
    const ec=elemColor(u.element), pulse=0.5+0.5*Math.sin(now()*4+u.walkPhase);
    ctx.globalAlpha=0.2+0.12*pulse; ctx.fillStyle=ec;
    ctx.beginPath(); ctx.ellipse(0,-h*0.45,w*0.45,h*0.4,0,0,7); ctx.fill(); ctx.globalAlpha=1;
  }
  if(u.spawnT<1){ const p=u.spawnT; ctx.globalAlpha=p; ctx.translate(0,(1-p)*20); }
  ctx.imageSmoothingEnabled=false;
  // Flash only the monster silhouette (opaque pixels), not the bounding square
  if(u.hitFlash>0){
    drawImageHitFlash(img, -w/2, -h, w, h, Math.min(0.88, u.hitFlash*3.6));
  } else {
    ctx.drawImage(img, -w/2, -h, w, h);
  }
  ctx.restore();
  drawUnitBar(u, baseY - (h + 6 + (u.sizeMul>1?12:0)));
  return true;
}
async function loadData(){
  const [u,e,s,ty] = await Promise.all([
    loadJSON('data/units.json', FALLBACK.units),
    loadJSON('data/enemies.json', FALLBACK.enemies),
    loadJSON('data/stages.json', FALLBACK.stages),
    loadJSON('data/types.json', TYPES),
  ]);
  SHOP_ORDER = u._order || Object.keys(u).filter(k=>k[0]!=='_');
  UNITS = {}; SHOP_ORDER.forEach(k=> UNITS[k]=u[k]);
  ENEMIES = {};
  Object.keys(e||{}).forEach(k=>{ if(k[0]!=='_' && e[k] && e[k].name) ENEMIES[k]=e[k]; });
  STAGES = (Array.isArray(s) && s.length) ? s : FALLBACK.stages;
  if(ty && ty.types) TYPES = ty;
  // preload any enemy sprite packs + magic VFX
  Object.keys(ENEMIES).forEach(k=>{ if(ENEMIES[k].sprite) loadSpritePack(ENEMIES[k].sprite); });
  Object.keys(UNITS).forEach(k=>{ if(UNITS[k].sprite) loadSpritePack(UNITS[k].sprite); });
  preloadMagicFx();
}
// stage for a level (scales past the authored 100 for the truly obsessed)
function stageFor(level){
  if(level>=1 && level <= STAGES.length) return STAGES[level-1];
  const base = STAGES[STAGES.length-1], over = level - STAGES.length;
  return Object.assign({}, base, {
    level, name: base.name+' +'+over,
    baseHp: Math.round(base.baseHp*Math.pow(1.05,over)),
    income: base.income+over*1.5, budgetRate: base.budgetRate+over*1.2,
  });
}

/* ============================== GAME STATE ============================== */
let state = null;
let hitStop = 0; // brief freeze-frame on big impacts (juice)
function newLevel(level, keepGold){
  const st = stageFor(level);
  // normalise roster to [{t,el}] and keep only real enemy shapes
  const roster = (st.roster || (st.enemies||[]).map(t=>({t,el:st.element||'Normal'})))
                  .filter(r=> ENEMIES[r.t]);
  return {
    running:false, over:false, paused:false,
    level, stage:st, t:0, last:0,
    gold: keepGold!=null ? keepGold : st.startGold,
    incomeAcc:0, incomeRate: st.income, incomeTick:1.0,
    pHp: 1000, pHpMax:1000,
    eHp: st.baseHp, eHpMax: st.baseHp,
    units:[], enemies:[], projectiles:[], particles:[], floats:[], fx:[],
    cds:{}, spellCd:0, spellFx:0, pTowerCd:1.5, eTowerCd:1.5,
    enemyRoster: roster,
    bossDef: st.boss && ENEMIES[st.boss.t] ? st.boss : null, bossSpawned:false,
    enemyBudget: 30, enemyBudgetRate: st.budgetRate, enemySpawnAcc:0,
    eliteAcc:0, eliteEvery: clamp(24 - level*0.25, 11, 24), // elite cadence tightens with depth
    goldAcquired:0, // for score
    shake:0, shakeT:0,
    pTowerX: 46, eTowerX: 0, // eTowerX set on start
  };
}

/* ============================== ENTITIES ================================ */
let uid=0;
function spawnUnit(key, side, opts){
  opts=opts||{};
  const build = side==='player' ? unitBuild(key) : null;
  const def = side==='player' ? effectiveDef(key) : ENEMIES[key];
  if(!def) return null;
  const stats = resolveStats(def, {
    element: opts.element || (side==='player' ? (build.element||'Normal') : (def.element||'Normal')),
    hpMul: opts.hpMul||1,
    mul: opts.mul || (build ? build.mul : null),
  });
  const facing = side==='player' ? 1 : -1;
  const boss = !!opts.boss;
  const evo = build ? build.evo : 0;
  const x = side==='player' ? state.pTowerX+18 : state.eTowerX-18;
  const flying = !!def.flying;
  const u = {
    id:++uid, key, side, def, stats, element:stats.element, cls:stats.cls, boss, elite:!!opts.elite, bossName:opts.bossName, evo, flying, aoe:opts.aoe||0,
    pal: (stats.element && stats.element!=='Normal') ? elemTintPal(def.pal, stats.element) : def.pal,
    facing, x, y: groundY, lane: rand(-16,10), flyBob: rand(0,6.28),
    sizeMul: (boss?(opts.bossSize||1.7):1)*(evo===2?1.28:evo===1?1.12:1),
    hp: stats.hp, hpMax: stats.hp, hpShown: stats.hp,
    atkCd:0, walkPhase: rand(0,6.28), state:'walk',
    swing:0, hitFlash:0, dead:false, deathT:0, spawnT:0,
    target:null,
  };
  (side==='player'? state.units : state.enemies).push(u);
  Sound.spawn();
  return u;
}

function unitCost(key){
  const def=UNITS[key]; if(!def) return 99999;
  // Always charge base unit cost (skill tree does not change spawn price)
  return Math.max(1, Math.round(def.cost||0));
}
function tryBuy(key){
  if(!state || !state.running || state.over || state.paused) return;
  if(!owned(key)){ toast('🔒 '+t('unlockInShop')); return; }
  const cost = unitCost(key);
  if(state.gold < cost){ toast(t('notEnoughGold')); return; }
  if((state.cds[key]||0) > 0){ return; }
  // Deduct exactly once, floor gold so UI and checks stay in sync
  state.gold = Math.max(0, Math.floor(state.gold) - cost);
  state.cds[key] = (UNITS[key].cd||1);
  spawnUnit(key,'player');
  flashCard(key);
  syncHUD();
}

/* ------------------------------- Combat -------------------------------- */
function canHitFlyers(u){ return u.def.role==='ranged' && !u.def.noAir; }   // catapult noAir → ground only
function nearestEnemyOf(u, list, ignoreFlying){
  let best=null, bd=1e9;
  for(const e of list){
    if(e.dead) continue;
    if(ignoreFlying && e.flying) continue;
    const d = Math.abs(e.x - u.x);
    if(d<bd){ bd=d; best=e; }
  }
  return best ? {t:best, d:bd} : null;
}
function nearestInRange(list, x, range){
  let best=null, bd=range;
  for(const e of list){ if(e.dead) continue; const d=Math.abs(e.x-x); if(d<bd){ bd=d; best=e; } }
  return best;
}
function entYTop(e){ return e.y-30+e.lane+(e.flying?-46:0); } // fx anchor (flyers hover higher)
function fireProjectile(from, target, kind){
  const st = from.stats||from.def;
  const fy = from.y - 34 + from.lane + (from.flying?-46:0);
  const p = {
    x: from.x + from.facing*14, y: fy, side:from.side, facing:from.facing,
    tx: target?target.x:from.x+from.facing*200, ty: target?entYTop(target)+2:fy,
    kind, dmg: st.dmg, splash: st.splash||0, life:2.2, spin: kind==='magic'?rand(0,6):0,
    heal: st.heal||0, element: from.element||'Normal', cls: from.cls||st.cls||null, noAir: !!from.def.noAir,
  };
  const dx=p.tx-p.x, dy=p.ty-p.y, dist=Math.hypot(dx,dy)||1;
  const spd = kind==='arrow'?470: kind==='boulder'?300: kind==='magic'?300:520;
  p.vx = dx/dist*spd; p.vy = dy/dist*spd; p.arc = kind==='arrow'? -dist*0.28 : kind==='boulder'? -dist*0.55 : 0;
  p.t=0;
  state.projectiles.push(p);
  if(kind==='arrow') Sound.arrow(); else if(kind==='heal') Sound.heal(); else if(kind==='boulder') Sound.boom(); else Sound.magic();
}

function damageEntity(e, dmg, atkEl, atkCls){
  const em = atkEl ? typeMult(atkEl, e.element) : 1;
  const cm = atkCls ? classMult(atkCls, e.cls) : 1;
  const mult = em*cm;
  const fin = Math.max(1, Math.round(dmg*mult));
  e.hp -= fin; e.hitFlash = 0.2;
  const superHit = mult>1.15, weakHit = mult<0.85;
  const yTop = entYTop(e);
  const base = e.side==='player' ? '#ff6a6a' : '#ffd23a';    // your units bleed red; enemies take gold
  const col = superHit ? (em>1.01?elemColor(atkEl):'#ffec5a') : (weakHit ? '#b8c0cc' : base);
  const sz = clamp(26 + Math.sqrt(fin)*1.5, 28, 64) * (superHit?1.18:1);
  // Damage number on TOP; SUPER / resist tag sits below it
  spawnFloat(e.x, yTop-46, ''+fin, col, {size:sz, crit:superHit, vy:-58, life:1.05, thick:true});
  if(superHit){ spawnFloat(e.x, yTop-18, 'SUPER!', col, {size:14, crit:true, vy:-36, vx:0, life:0.9}); addShake(0.3); hitStop=Math.max(hitStop,0.05); spawnRing(e.x, yTop+2, col); }
  else if(weakHit){ spawnFloat(e.x, yTop-16, 'resist', '#c8d0d8', {size:13, vy:-32, vx:0, life:0.85}); }
  const pc = (atkEl && atkEl!=='Normal') ? elemColor(atkEl) : (e.side==='player'?'#ffd27a':'#ff9a9a');
  const n = superHit?12:6;
  for(let i=0;i<n;i++) spawnParticle(e.x, yTop+2, pc);
  // CraftPix elemental hit spark (slash/acid/boom)
  if(atkEl && atkEl!=='Normal'){
    spawnMagicFx(magicHitIdFor(atkEl, false), e.x, yTop-8, { h: superHit?56:40, life:0.38 });
  }
  if(e.hp<=0 && !e.dead){ e.dead=true; e.state='dead'; e.deathT=0; Sound.die(); spawnRing(e.x,yTop+2,pc); for(let i=0;i<10;i++) spawnParticle(e.x,yTop+2,pc);
    spawnMagicFx('hit_boom', e.x, yTop-6, { h:52, life:0.45 });
  }
}
function healEntity(e, amt){
  e.hp = Math.min(e.hpMax, e.hp+amt);
  spawnFloat(e.x, entYTop(e)-18, '+'+Math.round(amt), '#6dffa0', {size:26, crit:true, vy:-54});
  for(let i=0;i<5;i++) spawnParticle(e.x, entYTop(e)+2, '#8dffab');
  spawnMagicFx('heal', e.x, entYTop(e)-10, { h:42, life:0.42 });
}

/* ------------------------------ Particles / FX ------------------------- */
function spawnParticle(x,y,color){
  state.particles.push({x,y,vx:rand(-70,70),vy:rand(-140,-30),life:rand(0.3,0.6),t:0,color,r:rand(2,4)});
}
function spawnFloat(x,y,txt,color,opts){
  if(opts===true) opts={screen:true}; opts=opts||{};
  state.floats.push({x,y,txt,color,t:0, life:opts.life||0.9,
    vy: opts.vy!=null?opts.vy:-46, vx: opts.vx!=null?opts.vx:rand(-14,14),
    size: opts.size||16, crit:!!opts.crit, screen:!!opts.screen, thick:!!opts.thick});
}
/** +gold popup anchored under the HUD coin chip (not floating mid-HUD). */
function spawnGoldIncomeFloat(inc){
  let x=W*0.5, y=96;
  try{
    const goldEl=el('gold'), cvs=el('battle');
    if(goldEl && cvs){
      const gr=goldEl.getBoundingClientRect(), cr=cvs.getBoundingClientRect();
      if(cr.width>0 && cr.height>0){
        x = ((gr.left+gr.width*0.5)-cr.left)/cr.width * W;
        y = (gr.bottom-cr.top)/cr.height * H + 10;
      }
    }
  }catch(e){}
  spawnFloat(x, y, '+'+inc, '#ffe08a', {screen:true, size:15, crit:true, vy:-38, vx:0, life:0.75});
}
function spawnSlash(x,y,color,facing,kind){
  state.fx.push({type:'slash',x,y,color,facing:facing||1,t:0,life:kind==='heavy'?0.3:0.22,rot:rand(-0.3,0.3),kind:kind||'slash'});
  // overlay CraftPix sword / death-punch impact
  const heavy = kind==='heavy'||kind==='smash';
  spawnMagicFx(heavy?'fist':'hit_slash', x, y-6, { h: heavy?58:46, facing:facing||1, life:heavy?0.36:0.32 });
}
function spawnRing(x,y,color,big){
  state.fx.push({type:'ring',x,y,color,t:0,life:big?0.5:0.34,big:!!big});
  if(big) spawnMagicFx('hit_boom', x, y, { h:64, life:0.48 });
}
function spawnMuzzle(x,y,color){ state.fx.push({type:'muzzle',x,y,color,t:0,life:0.16}); }
function spawnCast(x,y,color){
  state.fx.push({type:'cast',x,y,color,t:0,life:0.4});
  spawnMagicFx('cast', x, y, { h:52, life:0.45 });
}
function spawnStar(x,y,color){ state.fx.push({type:'star',x,y,color,t:0,life:0.28,rot:rand(0,6)}); }

/* =============================== UPDATE ================================= */
function update(dt){
  if(!state.running || state.paused || state.over) return;
  state.t += dt;

  // income
  state.incomeAcc += dt;
  if(state.incomeAcc >= state.incomeTick){
    state.incomeAcc -= state.incomeTick;
    const inc = Math.round(state.incomeRate * incomeMul());
    state.gold += inc; state.goldAcquired += inc;
    spawnGoldIncomeFloat(inc);
    Sound.coin();
  }

  // enemy AI spawns using a growing budget; roster entries are {t,el}
  state.enemySpawnAcc += dt;
  state.enemyBudget += state.enemyBudgetRate*dt;
  if(state.enemySpawnAcc > 1.4 && state.enemies.length < 16){
    const affordable = state.enemyRoster.filter(r=> ENEMIES[r.t] && ENEMIES[r.t].budget <= state.enemyBudget);
    if(affordable.length){
      const r = affordable[Math.floor(rand(0,affordable.length))];
      state.enemyBudget -= ENEMIES[r.t].budget;
      state.enemySpawnAcc = 0;
      spawnUnit(r.t,'enemy',{ element:r.el });
    }
  }
  // boss charges out once the enemy keep is badly wounded — huge, flashy, AoE slams
  if(state.bossDef && !state.bossSpawned && state.eHp <= state.eHpMax*0.45){
    state.bossSpawned=true;
    const b=state.bossDef;
    spawnUnit(b.t,'enemy',{ element:b.el, hpMul:b.hpMul, mul:{dmg:1.25}, boss:true, bossName:b.name, bossSize:2.0, aoe:74 });
    toast('👹 '+(b.name||'BOSS')+'!'); addShake(1.0); hitStop=0.1;
  }
  // elite mini-bosses from stage 4+ — tougher, bigger, small AoE, appear periodically
  if(state.level>=4 && state.enemies.length<15){
    state.eliteAcc += dt;
    if(state.eliteAcc >= state.eliteEvery){
      state.eliteAcc = 0;
      const pool = state.enemyRoster.filter(r=>ENEMIES[r.t]);
      const tanky = pool.filter(r=>r.t==='brute'||r.t==='yeti'||r.t==='minotax'||r.t==='hellhorn');
      const pickR = (tanky.length?tanky:pool)[Math.floor(rand(0,(tanky.length?tanky:pool).length))];
      if(pickR){ const nm='Elite '+ENEMIES[pickR.t].name;
        spawnUnit(pickR.t,'enemy',{ element:pickR.el, hpMul:2.6, mul:{dmg:1.3}, boss:true, elite:true, bossName:nm, bossSize:1.45, aoe:46 });
        toast('⚔️ '+nm+'!'); addShake(0.4);
      }
    }
  }

  // keep defenses — ARAM-style towers shoot the nearest foe in range
  state.pTowerCd-=dt; state.eTowerCd-=dt;
  if(state.pTowerCd<=0){ const tg=nearestInRange(state.enemies, state.pTowerX, 285); if(tg){ towerShot('player',tg); state.pTowerCd=1.2; } }
  if(state.eTowerCd<=0){ const tg=nearestInRange(state.units,   state.eTowerX, 285); if(tg){ towerShot('enemy', tg); state.eTowerCd=1.2; } }

  // cooldowns
  for(const k in state.cds){ if(state.cds[k]>0) state.cds[k]=Math.max(0,state.cds[k]-dt); }
  if(state.spellCd>0) state.spellCd=Math.max(0,state.spellCd-dt);
  if(state.spellFx>0) state.spellFx=Math.max(0,state.spellFx-dt);

  updateSide(state.units, state.enemies, dt, +1, 'enemyBase');
  updateSide(state.enemies, state.units, dt, -1, 'playerBase');
  updateProjectiles(dt);

  // particles & floats
  for(const p of state.particles){ p.t+=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=380*dt; }
  state.particles = state.particles.filter(p=>p.t<p.life);
  for(const f of state.floats){ f.t+=dt; f.y+=f.vy*dt; f.vy+=70*dt; f.x+=(f.vx||0)*dt; }
  state.floats = state.floats.filter(f=>f.t<f.life);
  for(const x of state.fx){ x.t+=dt; }
  state.fx = state.fx.filter(x=>x.t<x.life);
  // white-chip HP: shown bar eases down toward real HP (snaps up on heal)
  const easeHp=u=>{ if(u.hpShown==null) u.hpShown=u.hp; else if(u.hp<u.hpShown) u.hpShown += (u.hp-u.hpShown)*Math.min(1,dt*4); else u.hpShown=u.hp; };
  state.units.forEach(easeHp); state.enemies.forEach(easeHp);
  if(state.pHpShown==null) state.pHpShown=state.pHp; else if(state.pHp<state.pHpShown) state.pHpShown+=(state.pHp-state.pHpShown)*Math.min(1,dt*2.5); else state.pHpShown=state.pHp;
  if(state.eHpShown==null) state.eHpShown=state.eHp; else if(state.eHp<state.eHpShown) state.eHpShown+=(state.eHp-state.eHpShown)*Math.min(1,dt*2.5); else state.eHpShown=state.eHp;

  // cleanup dead after fade
  state.units = state.units.filter(u=> !(u.dead && u.deathT>0.7));
  state.enemies = state.enemies.filter(u=> !(u.dead && u.deathT>0.7));

  if(state.shake>0){ state.shakeT+=dt; state.shake=Math.max(0,state.shake-dt*2.2); }

  // win / lose
  if(state.eHp<=0){ endGame(true); }
  else if(state.pHp<=0){ endGame(false); }

  syncHUD();
}

function updateSide(list, foes, dt, dir, baseTarget){
  for(const u of list){
    if(u.dead){ u.deathT+=dt; continue; }
    if(u.spawnT<1) u.spawnT=Math.min(1,u.spawnT+dt*4);
    u.hitFlash = Math.max(0, u.hitFlash-dt);
    u.atkCd = Math.max(0, u.atkCd-dt);
    const def=u.def, st=u.stats;

    // healer: walk toward wounded allies, stop only when in heal range (don't hang back vs enemies)
    if(def.role==='healer'){
      let best=null, bd=1e9;
      for(const a of list){
        if(a===u||a.dead) continue;
        if(a.hp < a.hpMax-0.5){
          const d=Math.abs(a.x-u.x);
          if(d<bd){ bd=d; best=a; }
        }
      }
      const healRange = Math.max(80, st.range||140);
      const inRange = best && bd <= healRange;
      // Hold only when we can heal; otherwise keep marching with the army
      marchOrHold(u, dt, !!inRange, dir);
      if(inRange && u.atkCd<=0){
        u.state='attack'; u.swing=1; u.atkCd=Math.max(0.55, st.atk||1.2);
        // Instant heal if close; projectile if a bit farther
        if(bd < 70){
          healEntity(best, st.heal||20);
          spawnCast(u.x+u.facing*8, u.y-34+u.lane, '#8dffab');
          Sound.heal();
        } else {
          fireProjectile(u, best, 'heal');
        }
      }
      u.swing = Math.max(0, u.swing - dt*4.5);
      u.walkPhase += dt*(u.state==='walk'? st.speed*0.09 : 3);
      continue;
    }

    const nf = nearestEnemyOf(u, foes, !canHitFlyers(u));   // melee & catapult ignore flyers
    let engage=false, tgt=null;
    if(nf && nf.d <= st.range){ engage=true; tgt=nf.t; }
    else if(!nf){
      const baseX = dir>0 ? state.eTowerX : state.pTowerX;
      if(Math.abs(u.x-baseX) <= st.range+6){ engage=true; tgt=null; }
    }

    if(engage){
      u.state='fight';
      if(u.atkCd<=0){
        u.atkCd=st.atk; u.swing=1;
        const ec=(u.element&&u.element!=='Normal')?elemColor(u.element):null;
        if(def.role==='ranged' && tgt){
          fireProjectile(u, tgt, def.proj);
          const mz = ec||(def.proj==='magic'?'#c9a2ff':def.proj==='boulder'?'#caa15a':'#ffe6a0');
          spawnMuzzle(u.x+u.facing*14, u.y-34+u.lane, mz);
          if(def.proj==='magic') spawnCast(u.x+u.facing*10, u.y-34+u.lane, ec||'#c9a2ff');     // caster rune ring
          else if(def.proj==='boulder'){ for(let i=0;i<4;i++) spawnParticle(u.x+u.facing*6, u.y-6+u.lane, '#8a6a3a'); } // launch dust
        }
        else if(def.role==='ranged' && !tgt){ damageBase(baseTarget, st.dmg); }
        else {
          if(tgt){
            const slashCol = ec||'#ffffff';
            if(u.aoe){ // boss/elite SLAM — hits everything near the target
              for(const foe of foes){ if(foe.dead) continue; if(Math.abs(foe.x-tgt.x) < u.aoe) damageEntity(foe, st.dmg, u.element, u.cls); }
              spawnSlash(tgt.x, entYTop(tgt), slashCol, u.facing, 'heavy'); spawnRing(tgt.x, entYTop(tgt), slashCol, true);
              addShake(0.5); hitStop=Math.max(hitStop,0.06); Sound.boom();
            } else {
              damageEntity(tgt, st.dmg, u.element, u.cls); Sound.swordHit();
              const wk=def.weapon, kind = wk==='axe'?'heavy' : wk==='club'?'smash' : 'slash';
              spawnSlash(tgt.x, entYTop(tgt), slashCol, u.facing, kind);
              if(kind==='heavy'){ spawnRing(tgt.x, entYTop(tgt), slashCol); addShake(0.16); }
              else if(kind==='smash'){ spawnStar(tgt.x, entYTop(tgt), slashCol); addShake(0.14); }
            }
          }
          else { damageBase(baseTarget, st.dmg); }
        }
      }
    } else {
      marchOrHold(u, dt, false, dir);
    }
    u.swing = Math.max(0, u.swing - dt*4.5);
    u.walkPhase += dt* (u.state==='walk'? st.speed*0.09 : 3);
  }
}

function marchOrHold(u, dt, holdBecauseEnemyClose, dir){
  const spd=(u.stats||u.def).speed;
  // Units march freely and pass through friendly units (no queue) — they only
  // stop to fight an enemy in range or when they reach the enemy base.
  let nextX = u.x + dir*spd*dt;
  if(dir>0) nextX = Math.min(nextX, state.eTowerX-10);
  else nextX = Math.max(nextX, state.pTowerX+10);

  if(holdBecauseEnemyClose){ u.state='fight'; }
  else { u.state='walk'; u.x = nextX; }
}

function damageBase(which, dmg){
  if(which==='enemyBase'){ state.eHp=Math.max(0,state.eHp-dmg); addShake(0.4);
    spawnFloat(state.eTowerX-6, groundY-120, ''+Math.round(dmg), '#ffec5a', {size:32, crit:true, vy:-54}); }
  else { state.pHp=Math.max(0,state.pHp-dmg); addShake(0.5);
    spawnFloat(state.pTowerX+6, groundY-120, ''+Math.round(dmg), '#ff6a6a', {size:32, crit:true, vy:-54}); }
  for(let i=0;i<6;i++) spawnParticle(which==='enemyBase'?state.eTowerX-14:state.pTowerX+14, groundY-90,'#caa15a');
  Sound.baseHit();
}
function addShake(v){ state.shake=Math.max(state.shake,v); }
function towerShot(side, tgt){
  const tx = side==='player'? state.pTowerX : state.eTowerX;
  const dmg = side==='player'? Math.round(20*keepDmgMul()) : Math.round(10 + state.level*0.9);
  const p={ x:tx+(side==='player'?10:-10), y:groundY-120, side, facing:side==='player'?1:-1,
    tx:tgt.x, ty:entYTop(tgt)+2, kind:'bolt', dmg, splash:0, life:2, element:'Normal', cls:null, heal:0, t:0 };
  const dx=p.tx-p.x, dy=p.ty-p.y, dist=Math.hypot(dx,dy)||1, spd=540; p.vx=dx/dist*spd; p.vy=dy/dist*spd; p.arc=0;
  state.projectiles.push(p); spawnMuzzle(p.x, p.y, side==='player'?'#8fd0ff':'#ff9a9a'); Sound.arrow();
}

function updateProjectiles(dt){
  for(const p of state.projectiles){
    p.t+=dt; p.life-=dt;
    p.x += p.vx*dt;
    // arc for arrows
    if(p.arc){ p.y += p.vy*dt + p.arc*dt*(1-2*Math.min(1,p.t*2)); }
    else p.y += p.vy*dt;
    p.spin += dt*12;
    // hit check
    const foes = p.side==='player' ? (p.heal? state.units : state.enemies) : (p.heal? state.enemies : state.units);
    // reached target x?
    const reached = (p.facing>0 ? p.x>=p.tx : p.x<=p.tx) || (Math.abs(p.x-p.tx)<12);
    let hit=null;
    for(const e of foes){ if(e.dead) continue; if(p.noAir && e.flying) continue; if(Math.abs(e.x-p.x)<22 && Math.abs(entYTop(e)-p.y)<44){ hit=e; break; } }
    if(hit || reached){
      if(p.heal){
        // heal nearest wounded ally near impact
        let best=null,bd=1e9; for(const a of foes){ if(a.dead||a.hp>=a.hpMax)continue; const d=Math.abs(a.x-p.x); if(d<bd){bd=d;best=a;} }
        if(best) healEntity(best,p.heal);
        else if(hit) healEntity(hit,p.heal);
      } else if(p.splash){
        const cx=hit?hit.x:p.x;
        for(const e of foes){ if(e.dead)continue; if(p.noAir && e.flying) continue; if(Math.abs(e.x-cx)<p.splash) damageEntity(e,p.dmg,p.element,p.cls); }
        for(let i=0;i<14;i++) spawnParticle(cx, p.y, elemColor(p.element));
        spawnRing(cx, p.y, elemColor(p.element)); addShake(0.2);
        spawnMagicFx(magicHitIdFor(p.element, true), cx, p.y, { h:70, life:0.5 });
      } else if(hit){
        damageEntity(hit,p.dmg,p.element,p.cls);
        // non-elemental magic/bolt still get a CraftPix hit spark (elemental hits spawn inside damageEntity)
        if((p.kind==='magic'||p.kind==='bolt') && (!p.element || p.element==='Normal'))
          spawnMagicFx('hit_slash', hit.x, entYTop(hit)-4, { h:40, life:0.34 });
      } else {
        // hit base?
        if(p.side==='player' && Math.abs(p.x-state.eTowerX)<40) damageBase('enemyBase',p.dmg);
        else if(p.side==='enemy' && Math.abs(p.x-state.pTowerX)<40) damageBase('playerBase',p.dmg);
      }
      p.life=0;
    }
  }
  state.projectiles = state.projectiles.filter(p=>p.life>0);
}

/* =============================== RENDER ================================= */
let bgTrees=[], bgClouds=[];
function initBackground(){
  bgTrees=[]; bgClouds=[];
  const nT = Math.max(8, Math.round(WORLD_W/150));
  for(let i=0;i<nT;i++) bgTrees.push({x:rand(0,WORLD_W), s:rand(0.7,1.3)});
  for(let i=0;i<6;i++) bgClouds.push({x:rand(0,1), y:rand(0.06,0.32), s:rand(0.6,1.4), spd:rand(0.004,0.012)});
}

function render(){
  ctx.clearRect(0,0,W,H);
  updateCamera();
  ctx.save();
  if(state.shake>0){ ctx.translate(rand(-1,1)*state.shake*7, rand(-1,1)*state.shake*7); }

  drawSky();                                          // fixed sky/clouds
  ctx.save(); ctx.translate(-camX*0.4,0); drawHills(); ctx.restore();  // parallax hills

  ctx.save(); ctx.translate(-camX,0);                 // ---- world layer ----
  drawGround();
  drawTrees();
  drawTower('player', state.pTowerX);
  drawTower('enemy', state.eTowerX);
  const all = [...state.units, ...state.enemies].sort((a,b)=> (a.lane+a.y)-(b.lane+b.y));
  for(const u of all) drawFighter(u);
  drawProjectiles();
  drawFx();
  drawParticles();
  drawFloats(false);
  ctx.restore();                                      // ---- end world ----

  drawFloats(true);                                   // income popups (screen space)
  drawEdgeArrows();
  if(state.spellFx>0) drawSpellFx();
  ctx.restore();
}
function updateCamera(){
  const maxC = Math.max(0, WORLD_W - W);
  let target = 0;
  if(state && state.units && state.units.length){
    let fx = state.pTowerX;
    for(const u of state.units) if(!u.dead && u.x>fx) fx=u.x;   // follow the vanguard
    target = fx - W*0.55;
  }
  target = clamp(target, 0, maxC);
  camX += (target - camX) * 0.09;                     // smooth chase
  camX = clamp(camX, 0, maxC);
}
function drawEdgeArrows(){
  if(!state.running) return;
  const viewR = camX + W; let right=0;
  for(const e of state.enemies){ if(!e.dead && e.x>viewR+8) right++; }
  if(right>0){
    const y=groundY-46; ctx.save();
    ctx.fillStyle='rgba(226,59,59,.9)';
    ctx.beginPath(); ctx.moveTo(W-8,y); ctx.lineTo(W-26,y-11); ctx.lineTo(W-26,y+11); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='700 10px Pixelify, monospace'; ctx.textAlign='center'; ctx.fillText(right, W-30, y+4);
    ctx.restore();
  }
}
const SPELL_CD = 14;
function castSpell(){
  if(!state || !state.running || state.over || state.paused) return;
  if(!hasMeteor()){ toast(t('meteorLocked')); return; }
  if(state.spellCd>0) return;
  Sound.unlock();
  state.spellCdMax = meteorCooldown(); state.spellCd = state.spellCdMax; state.spellFx = 0.7;
  const dmg = Math.round((55 + state.level*7) * meteorDamageMul());
  for(const e of state.enemies){ if(!e.dead) damageEntity(e, dmg, 'Fire'); }   // Meteor is Fire — hits air too
  state.eHp = Math.max(0, state.eHp - dmg*0.6);
  addShake(1.1); hitStop=Math.max(hitStop,0.1);
  for(let i=0;i<46;i++) spawnParticle(rand(camX+W*0.2,camX+W-10), groundY-rand(0,70), (i%2)?'#ff8a3a':'#ffd23a');
  // CraftPix fire-blast meteors along the battlefield
  for(let i=0;i<8;i++){
    const mx = camX + W*(0.12 + i*0.1) + rand(-18,18);
    const my = groundY - rand(20, 90);
    spawnMagicFx('meteor', mx, my, { h: 72+rand(0,24), life:0.55+rand(0,0.15), oy: -10 });
    if(i%2===0) spawnMagicFx('hit_boom', mx, groundY-8, { h:58, life:0.48 });
  }
  Sound.boom();
  pressEl(el('spellBtn'));
}
function drawSpellFx(){
  const a = state.spellFx/0.7;
  ctx.globalAlpha = a*0.55; ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1;
  // falling CraftPix meteor sprites (screen-space, on top of white flash)
  const tLife = 0.7, t = 0.7 - state.spellFx;
  for(let i=0;i<6;i++){
    const x = (i/6)*W + (1-a)*40 + Math.sin(i*2.1)*12;
    const y = -20 + (t/tLife)*(groundY*0.75 + 40) + i*8;
    if(!drawMagicFx('meteor', x, y, { t, life:tLife, h: 64+i*4, alpha: a, rot: 0.4 })){
      ctx.strokeStyle='rgba(255,150,50,'+a+')'; ctx.lineWidth=4; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(x,-20); ctx.lineTo(x-90,groundY*a+60); ctx.stroke();
    }
  }
  ctx.lineCap='butt';
}
function drawFx(){
  for(const x of state.fx){ const a=1-x.t/x.life;
    if(x.type==='mfx'){
      drawMagicFx(x.id, x.x, x.y, { t:x.t, life:x.life, h:x.h, facing:x.facing, oy:x.oy, rot:x.rot, alpha:a*(x.alpha!=null?x.alpha:1) });
    } else if(x.type==='slash'){
      const R = x.kind==='heavy'?24 : x.kind==='smash'?20 : 15;
      ctx.save(); ctx.translate(x.x,x.y); ctx.rotate((x.facing>0?-0.5:0.5)+x.rot); ctx.globalAlpha=a*0.55;
      ctx.strokeStyle=x.color; ctx.lineCap='round'; ctx.lineWidth=(x.kind==='heavy'?6:4)*(0.4+a);
      ctx.beginPath(); ctx.arc(0,0,R*(1.3-a),-1.0,1.0); ctx.stroke();
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.8*a; ctx.beginPath(); ctx.arc(0,0,R*(1.3-a),-0.7,0.7); ctx.stroke();
      if(x.kind==='heavy'){ ctx.strokeStyle=x.color; ctx.lineWidth=3*(0.3+a); ctx.beginPath(); ctx.arc(0,4,R*(1.5-a),-0.8,0.8); ctx.stroke(); }
      ctx.restore();
    } else if(x.type==='ring'){
      ctx.save(); ctx.translate(x.x,x.y); ctx.globalAlpha=a*0.9; ctx.strokeStyle=x.color;
      const R=x.big?46:28; ctx.lineWidth=(x.big?5:3.2)*a; ctx.beginPath(); ctx.arc(0,0,6+(1-a)*R,0,7); ctx.stroke();
      if(x.big){ ctx.globalAlpha=a*0.5; ctx.lineWidth=2*a; ctx.beginPath(); ctx.arc(0,0,6+(1-a)*R*0.6,0,7); ctx.stroke(); }
      ctx.restore();
    } else if(x.type==='muzzle'){
      ctx.save(); ctx.translate(x.x,x.y); ctx.globalAlpha=a;
      const g=ctx.createRadialGradient(0,0,1,0,0,11*(0.6+a)); g.addColorStop(0,'#fff'); g.addColorStop(.5,x.color); g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,11*(0.6+a),0,7); ctx.fill(); ctx.restore();
    } else if(x.type==='cast'){
      // procedural rune kept faint under CraftPix cube cast
      ctx.save(); ctx.translate(x.x,x.y); ctx.rotate(x.t*8); ctx.globalAlpha=a*0.45;
      ctx.strokeStyle=x.color; ctx.lineWidth=2.4; const r=8+(1-a)*10;
      ctx.beginPath(); for(let i=0;i<6;i++){ const an=i/6*6.28; ctx.moveTo(Math.cos(an)*r,Math.sin(an)*r); ctx.lineTo(Math.cos(an)*(r+5),Math.sin(an)*(r+5)); } ctx.stroke();
      ctx.beginPath(); ctx.arc(0,0,r,0,7); ctx.stroke(); ctx.restore();
    } else if(x.type==='star'){
      ctx.save(); ctx.translate(x.x,x.y); ctx.rotate(x.rot); ctx.globalAlpha=a; ctx.strokeStyle=x.color; ctx.lineCap='round'; ctx.lineWidth=3*a;
      const R=6+(1-a)*20; for(let i=0;i<4;i++){ ctx.rotate(1.57); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-R); ctx.stroke(); } ctx.restore();
    }
  }
  ctx.globalAlpha=1; ctx.lineCap='butt';
}

function theme(){ return (state && state.stage) || FALLBACK.stages[0]; }
function drawSky(){
  const th=theme(), night = th.theme==='night';
  const g=ctx.createLinearGradient(0,0,0,groundY);
  g.addColorStop(0,th.sky[0]); g.addColorStop(0.55,th.sky[1]); g.addColorStop(1,th.sky[2]);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,groundY+2);
  if(night){
    // stars + moon
    ctx.fillStyle='rgba(255,255,255,.8)';
    for(const c of bgClouds){ const cx=(c.x*1.7%1)*W, cy=c.y*H*0.9; ctx.beginPath(); ctx.arc(cx,cy,c.s*0.9,0,7); ctx.fill(); }
    ctx.fillStyle='#f2ecd0'; ctx.beginPath(); ctx.arc(W*0.78,groundY*0.32,26,0,7); ctx.fill();
    ctx.fillStyle=th.sky[1]; ctx.beginPath(); ctx.arc(W*0.82,groundY*0.28,24,0,7); ctx.fill();
  } else {
    const sg=ctx.createRadialGradient(W*0.5,groundY*0.5,10,W*0.5,groundY*0.5,W*0.7);
    sg.addColorStop(0,'rgba(255,246,200,.7)'); sg.addColorStop(1,'rgba(255,246,200,0)');
    ctx.fillStyle=sg; ctx.fillRect(0,0,W,groundY);
    ctx.fillStyle='rgba(255,255,255,.85)';
    for(const c of bgClouds){ c.x+= c.spd*0.01; if(c.x>1.15)c.x=-0.15;
      const cx=c.x*W, cy=c.y*H, s=26*c.s;
      ctx.beginPath();
      ctx.arc(cx,cy,s,0,7); ctx.arc(cx+s*0.9,cy+4,s*0.8,0,7); ctx.arc(cx-s*0.9,cy+4,s*0.7,0,7); ctx.arc(cx,cy+8,s*0.9,0,7);
      ctx.fill();
    }
  }
}
function drawHills(){
  const th=theme(), WW=WORLD_W;
  ctx.fillStyle=th.hillFar;
  ctx.beginPath(); ctx.moveTo(0,groundY);
  for(let x=0;x<=WW;x+=20){ ctx.lineTo(x, groundY-40 - Math.sin(x*0.01+1)*26 - 30); }
  ctx.lineTo(WW,groundY); ctx.closePath(); ctx.fill();
  ctx.fillStyle=th.hillNear;
  ctx.beginPath(); ctx.moveTo(0,groundY);
  for(let x=0;x<=WW;x+=20){ ctx.lineTo(x, groundY-14 - Math.sin(x*0.014+3)*16); }
  ctx.lineTo(WW,groundY); ctx.closePath(); ctx.fill();
}
function drawTrees(){ for(const t of bgTrees){ drawTree(t.x, groundY-16, t.s); } }
function drawTree(x,y,s){
  const th=theme(), tc=th.tree;
  ctx.save(); ctx.translate(x,y); ctx.scale(s,s);
  ctx.fillStyle='#6b4a24'; ctx.fillRect(-4,-30,8,32);
  ctx.fillStyle=tc;
  ctx.beginPath(); ctx.arc(0,-46,22,0,7); ctx.arc(-16,-34,16,0,7); ctx.arc(16,-34,16,0,7); ctx.fill();
  ctx.fillStyle=shade(tc,18);
  ctx.beginPath(); ctx.arc(-4,-52,14,0,7); ctx.fill();
  ctx.restore();
}
function drawGround(){
  const th=theme();
  const g=ctx.createLinearGradient(0,groundY,0,H);
  g.addColorStop(0,th.ground[0]); g.addColorStop(0.16,th.ground[1]); g.addColorStop(1,th.ground[2]);
  ctx.fillStyle=g; ctx.fillRect(0,groundY,WORLD_W,H-groundY);
  // grass/edge tuft (tinted to stage)
  ctx.fillStyle=shade(th.ground[0],18); ctx.fillRect(0,groundY-3,WORLD_W,6);
  ctx.fillStyle=shade(th.ground[0],34);
  for(let x=0;x<WORLD_W;x+=14){ ctx.beginPath(); ctx.moveTo(x,groundY); ctx.lineTo(x+3,groundY-7); ctx.lineTo(x+6,groundY); ctx.fill(); }
  // dirt path shading
  ctx.fillStyle='rgba(60,40,20,.12)'; ctx.fillRect(0,groundY+12,WORLD_W,10);
}

function drawTower(side, x){
  ctx.save(); ctx.translate(x, groundY);
  const flip = side==='enemy'? -1:1; ctx.scale(flip,1);
  const stone = side==='player' ? '#c9c2b0' : '#b7a9a0';
  const stoneD= side==='player' ? '#9c9484' : '#8c7d74';
  const roof = side==='player' ? '#4a72c8' : '#8a2f2f';
  // shadow
  ctx.fillStyle='rgba(0,0,0,.18)'; ctx.beginPath(); ctx.ellipse(6,4,54,14,0,0,7); ctx.fill();
  // main keep body (shaded)
  const kg=ctx.createLinearGradient(-40,0,32,0); kg.addColorStop(0,shade(stone,12)); kg.addColorStop(.65,stone); kg.addColorStop(1,stoneD);
  ctx.fillStyle=kg; roundRect(-40,-138,72,138,6); ctx.fill();
  ctx.fillStyle=stoneD; roundRect(6,-138,26,138,4); ctx.fill();
  // brick lines
  ctx.strokeStyle='rgba(0,0,0,.14)'; ctx.lineWidth=1.5;
  for(let y=-124;y<0;y+=22){ ctx.beginPath(); ctx.moveTo(-40,y); ctx.lineTo(32,y); ctx.stroke(); }
  // battlements
  ctx.fillStyle=stone; for(let bx=-40;bx<32;bx+=18){ ctx.fillRect(bx,-152,12,16); }
  // door
  ctx.fillStyle='#3a2a18'; roundRect(-20,-46,30,46,6); ctx.fill();
  // window
  ctx.fillStyle='#2a2f45'; roundRect(-24,-104,16,24,4); ctx.fill();
  // side turret + roof
  ctx.fillStyle=stone; roundRect(-58,-118,26,88,5); ctx.fill();
  ctx.fillStyle=roof; ctx.beginPath(); ctx.moveTo(-62,-118); ctx.lineTo(-45,-150); ctx.lineTo(-28,-118); ctx.closePath(); ctx.fill();
  // flag
  ctx.strokeStyle='#5a4028'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-45,-150); ctx.lineTo(-45,-176); ctx.stroke();
  ctx.fillStyle=roof; const fw = 20 + Math.sin(now()*4)*3;
  ctx.beginPath(); ctx.moveTo(-45,-176); ctx.lineTo(-45+fw,-170); ctx.lineTo(-45,-164); ctx.closePath(); ctx.fill();
  ctx.restore();
}

/* --------------------------- Fighter drawing --------------------------- */
function drawBossAura(u){
  const ec=(u.element&&u.element!=='Normal')?elemColor(u.element):(u.elite?'#ff8a3a':'#ff4a4a');
  const t=now(), pulse=0.5+0.5*Math.sin(t*3);
  // rotating ground magic circle
  ctx.save(); ctx.globalAlpha=0.5; ctx.strokeStyle=ec; ctx.lineWidth=2;
  ctx.scale(1,0.34); ctx.rotate(t*0.8);
  ctx.beginPath(); ctx.arc(0,0,26,0,7); ctx.stroke();
  ctx.beginPath(); for(let i=0;i<8;i++){ const a=i/8*6.28; ctx.moveTo(Math.cos(a)*20,Math.sin(a)*20); ctx.lineTo(Math.cos(a)*27,Math.sin(a)*27); } ctx.stroke();
  ctx.restore();
  // big pulsing body glow
  const g=ctx.createRadialGradient(0,-24,3,0,-20,46+pulse*10); g.addColorStop(0,ec); g.addColorStop(0.5,ec); g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.globalAlpha=0.24+0.14*pulse; ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,-20,48,0,7); ctx.fill(); ctx.globalAlpha=1;
}
function drawEvoBack(u, stroke){
  const pal=u.def.pal, evo=u.evo;
  if(evo>=2){ const ag=ctx.createRadialGradient(0,-30,4,0,-30,36);
    ag.addColorStop(0,'rgba(255,231,150,.55)'); ag.addColorStop(1,'rgba(255,231,150,0)');
    ctx.fillStyle=ag; ctx.beginPath(); ctx.arc(0,-30,36,0,7); ctx.fill(); }
  const sway=Math.sin(u.walkPhase*0.9)*3+2; // flowing cape
  ctx.fillStyle= evo>=2?'#ffce4a':(pal.cloth2||'#c9a2ff');
  ctx.beginPath(); ctx.moveTo(-7,-44); ctx.lineTo(7,-44); ctx.lineTo(11+sway,-4); ctx.lineTo(-9+sway,-4); ctx.closePath(); ctx.fill();
  ctx.lineWidth=2; ctx.strokeStyle='rgba(30,18,8,.45)'; ctx.stroke();
}
function drawEvoFront(u, stroke){
  const evo=u.evo, gold=evo>=2?'#ffd766':'#e6c27a';
  ctx.fillStyle=gold; ctx.beginPath(); ctx.arc(-9,-38,4.5,0,7); ctx.fill(); ctx.beginPath(); ctx.arc(9,-38,4.5,0,7); ctx.fill(); stroke(1.4);
  if(evo>=2){ ctx.fillStyle=gold; const cy=-58;
    ctx.beginPath(); ctx.moveTo(-8,cy); ctx.lineTo(-8,cy-3); ctx.lineTo(-4,cy-1); ctx.lineTo(0,cy-6); ctx.lineTo(4,cy-1); ctx.lineTo(8,cy-3); ctx.lineTo(8,cy); ctx.closePath(); ctx.fill(); stroke(1.2);
    ctx.fillStyle='rgba(255,255,255,'+(0.5+0.5*Math.sin(now()*8))+')'; ctx.beginPath(); ctx.arc(0,cy-5,1.6,0,7); ctx.fill(); }
}
function drawSpritePlaceholder(u){
  // while pixel pack loads — simple chibi blob, never the old vector fighter
  const def=u.def, baseY=u.y+u.lane+(u.flying?-(40+Math.sin(now()*4+(u.flyBob||0))*6):0);
  const sm=(u.sizeMul||1)*(def.spriteScale||1);
  const h=48*sm;
  ctx.save(); ctx.translate(u.x, baseY);
  if(u.dead){ ctx.globalAlpha=Math.max(0,1-u.deathT/0.7); }
  ctx.scale(u.facing||1, 1);
  const col=(u.pal&&u.pal.cloth)||(def.pal&&def.pal.cloth)||'#c9a2ff';
  ctx.fillStyle='rgba(0,0,0,.25)'; ctx.beginPath(); ctx.ellipse(0,1,14*sm,5*sm,0,0,7); ctx.fill();
  ctx.fillStyle=col; ctx.beginPath(); ctx.ellipse(0,-h*0.35,12*sm,16*sm,0,0,7); ctx.fill();
  ctx.fillStyle='#20140b'; ctx.beginPath(); ctx.arc(4*sm,-h*0.45,2*sm,0,7); ctx.fill();
  ctx.restore();
  drawUnitBar(u, baseY - (h + 6));
}
function drawFighter(u){
  const def=u.def, pal=u.pal||def.pal, f=u.facing;
  const baseY = u.y + u.lane;
  // Pixel sprite packs first — no procedural/SVG body when a pack is assigned
  if(def.sprite){
    loadSpritePack(def.sprite);
    if(drawSpriteUnit(u)) return;
    drawSpritePlaceholder(u); return;
  }
  // Flying enemies without a pack (legacy)
  if(u.flying){ drawFlyer(u, baseY); return; }
  // Siege machines stay canvas-drawn (no CraftPix catapult pack yet)
  if(def.siege){ drawCatapult(u, baseY); return; }
  // Last resort: still no sprite — tiny colored blob (not the old vector fighter)
  drawSpritePlaceholder(u);
}
/* white-chip HP bar + element/boss labels (shared by all unit renders) */
function drawUnitBar(u, topY){
  if(u.dead) return;
  const w=(u.sizeMul>1?42:26), hpx=u.x-w/2;
  const cur=clamp(u.hp/u.hpMax,0,1), shown=clamp((u.hpShown!=null?u.hpShown:u.hp)/u.hpMax,0,1);
  if(cur<0.999 || shown<0.999){
    ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(hpx-1,topY-1,w+2,5);
    ctx.fillStyle='rgba(255,255,255,.9)'; ctx.fillRect(hpx,topY,w*shown,3);            // white chip (lag)
    const g=ctx.createLinearGradient(hpx,0,hpx+w,0);
    if(u.side==='player'){ g.addColorStop(0,'#7dff95'); g.addColorStop(1,'#35c250'); } else { g.addColorStop(0,'#ff8b8b'); g.addColorStop(1,'#e23b3b'); }
    ctx.fillStyle=g; ctx.fillRect(hpx,topY,w*cur,3);                                     // current
  }
  if(u.element && u.element!=='Normal'){ ctx.font='11px serif'; ctx.textAlign='center'; ctx.fillText(elemGlyph(u.element), u.x, topY-4); }
  if(u.boss && u.bossName){ ctx.font='700 9px Pixelify, monospace'; ctx.textAlign='center';
    ctx.lineWidth=3; ctx.strokeStyle='rgba(0,0,0,.7)'; ctx.strokeText(u.bossName,u.x,topY-16);
    ctx.fillStyle='#ffd766'; ctx.fillText(u.bossName,u.x,topY-16); }
}
/* ---- flying enemy (bat): hovers, only ranged/caster can hit ---- */
function drawFlyer(u, baseY){
  const f=u.facing, s=(u.sizeMul||1), pal=u.pal||u.def.pal;
  const hover = -(50 + Math.sin(now()*5+(u.flyBob||0))*5);
  ctx.save(); ctx.translate(u.x, baseY);
  ctx.fillStyle='rgba(0,0,0,.16)'; ctx.beginPath(); ctx.ellipse(0,0,9,3,0,0,7); ctx.fill(); ctx.restore();  // ground shadow
  ctx.save(); ctx.translate(u.x, baseY+hover);
  if(u.dead){ ctx.globalAlpha=Math.max(0,1-u.deathT/0.7); ctx.translate(0,u.deathT*40); }
  ctx.scale(f*s,s);
  if(u.boss) drawBossAura(u);
  const flap=Math.sin(now()*16+(u.flyBob||0));
  ctx.strokeStyle='rgba(18,10,22,.85)'; ctx.lineWidth=1.6;
  ctx.fillStyle=pal.cloth2||'#6a4a8a';
  ctx.beginPath(); ctx.moveTo(-2,-1); ctx.quadraticCurveTo(-16,-8-flap*6,-21,5); ctx.quadraticCurveTo(-11,2,-2,4); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2,-1); ctx.quadraticCurveTo(16,-8-flap*6,21,5); ctx.quadraticCurveTo(11,2,2,4); ctx.closePath(); ctx.fill(); ctx.stroke();
  if(u.element&&u.element!=='Normal'){ ctx.globalAlpha=.4; ctx.fillStyle=elemColor(u.element); ctx.beginPath(); ctx.arc(0,0,13,0,7); ctx.fill(); ctx.globalAlpha=1; }
  ctx.fillStyle=pal.fur||'#3a2c48'; ctx.beginPath(); ctx.ellipse(0,0,7,8,0,0,7); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-4,-6); ctx.lineTo(-6,-13); ctx.lineTo(-1,-7); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(4,-6); ctx.lineTo(6,-13); ctx.lineTo(1,-7); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#ff5a5a'; ctx.beginPath(); ctx.arc(-2.5,-1,1.3,0,7); ctx.arc(2.5,-1,1.3,0,7); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.moveTo(-2,4);ctx.lineTo(-1,7);ctx.lineTo(0,4); ctx.moveTo(2,4);ctx.lineTo(1,7);ctx.lineTo(0,4); ctx.fill();
  if(u.hitFlash>0){ ctx.globalAlpha=u.hitFlash*3; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(0,0,9,10,0,0,7); ctx.fill(); ctx.globalAlpha=1; }
  ctx.restore();
  drawUnitBar(u, baseY+hover-18);
}
/* ---- catapult (siege): ground-only ranged machine ---- */
function drawCatapult(u, baseY){
  const f=u.facing, s=(u.sizeMul||1), swing=u.swing;
  ctx.save(); ctx.translate(u.x, baseY);
  const shg=ctx.createRadialGradient(0,1,1,0,1,22); shg.addColorStop(0,'rgba(0,0,0,.3)'); shg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=shg; ctx.beginPath(); ctx.ellipse(0,1,22,6,0,0,7); ctx.fill();
  if(u.dead){ ctx.globalAlpha=Math.max(0,1-u.deathT/0.7); ctx.rotate(u.deathT*0.5); }
  ctx.scale(f*s,s);
  if(u.boss) drawBossAura(u);
  const wood='#7a4a24', woodD='#5a3418', metal='#9aa0a6';
  const stroke=(w=2)=>{ ctx.lineWidth=w; ctx.strokeStyle='rgba(30,18,8,.8)'; ctx.stroke(); };
  ctx.fillStyle=woodD; ctx.beginPath(); ctx.arc(-8,-6,7,0,7); ctx.fill(); stroke(2); ctx.beginPath(); ctx.arc(8,-6,7,0,7); ctx.fill(); stroke(2);
  ctx.fillStyle=metal; ctx.beginPath(); ctx.arc(-8,-6,2,0,7); ctx.arc(8,-6,2,0,7); ctx.fill();
  ctx.fillStyle=wood; roundRect(-13,-20,26,10,3); ctx.fill(); stroke(2);
  ctx.save(); ctx.translate(-7,-19); ctx.rotate(-2.3 + Math.min(1,swing)*2.0);
  ctx.strokeStyle=woodD; ctx.lineWidth=4; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(24,0); ctx.stroke(); ctx.lineCap='butt';
  ctx.fillStyle=metal; ctx.beginPath(); ctx.arc(24,0,4,0,7); ctx.fill();
  if(swing>0.45){ ctx.fillStyle='#6b5a48'; ctx.beginPath(); ctx.arc(24,-3,4.5,0,7); ctx.fill(); stroke(1.4); }
  ctx.restore();
  if(u.element&&u.element!=='Normal'){ ctx.globalAlpha=.4; ctx.fillStyle=elemColor(u.element); ctx.beginPath(); ctx.ellipse(0,-8,20,9,0,0,7); ctx.fill(); ctx.globalAlpha=1; }
  if(u.hitFlash>0){ ctx.globalAlpha=u.hitFlash*3; ctx.fillStyle='#fff'; roundRect(-14,-22,28,20,4); ctx.fill(); ctx.globalAlpha=1; }
  ctx.restore();
  drawUnitBar(u, baseY-40);
}
function drawLeg(x, sw, pal, stroke){
  const y=-14, dx=sw*0.4;
  // trouser
  ctx.fillStyle=shade(pal.cloth,-26);
  ctx.beginPath(); ctx.moveTo(x-3,y-2); ctx.lineTo(x+3,y-2); ctx.lineTo(x+3+dx,y+9); ctx.lineTo(x-3+dx,y+9); ctx.closePath(); ctx.fill(); stroke(1.8);
  // boot (darker, rounded toe)
  ctx.fillStyle=shade(pal.cloth,-52);
  ctx.beginPath(); roundRect(x-4+dx, y+7.5, 9.5, 7, 2.6); ctx.fill(); stroke(1.6);
  // boot shine
  ctx.fillStyle='rgba(255,255,255,.18)'; ctx.fillRect(x-3+dx, y+8.5, 6, 1.4);
}
function drawEars(def,pal,stroke){
  const fur = pal.fur||pal.skin, inner = shade(fur,-40);
  if(def.ears==='cat'){
    // pointy triangle ears
    ctx.fillStyle=fur;
    ctx.beginPath(); ctx.moveTo(-9,-6); ctx.lineTo(-13,-17); ctx.lineTo(-3,-9); ctx.closePath(); ctx.fill(); stroke(1.8);
    ctx.beginPath(); ctx.moveTo(9,-6); ctx.lineTo(13,-17); ctx.lineTo(3,-9); ctx.closePath(); ctx.fill(); stroke(1.8);
    ctx.fillStyle=inner;
    ctx.beginPath(); ctx.moveTo(-8,-8); ctx.lineTo(-10.5,-14); ctx.lineTo(-5,-9); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(8,-8); ctx.lineTo(10.5,-14); ctx.lineTo(5,-9); ctx.closePath(); ctx.fill();
  } else if(def.ears==='mouse'){
    // big round ears
    ctx.fillStyle=fur;
    ctx.beginPath(); ctx.arc(-9,-9,6.5,0,7); ctx.fill(); stroke(1.8);
    ctx.beginPath(); ctx.arc(9,-9,6.5,0,7); ctx.fill(); stroke(1.8);
    ctx.fillStyle=inner;
    ctx.beginPath(); ctx.arc(-9,-9,3.4,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(9,-9,3.4,0,7); ctx.fill();
  }
}
function drawHead(def,pal,stroke){
  switch(def.head){
    case 'helm':
      ctx.fillStyle=pal.metal; ctx.beginPath(); ctx.arc(0,-3,10,Math.PI,0); ctx.lineTo(9,-1); ctx.lineTo(-9,-1); ctx.closePath(); ctx.fill(); stroke(2);
      ctx.fillStyle=shade(pal.metal,-18); ctx.fillRect(-2,-12,4,10); break;
    case 'greathelm':
      ctx.fillStyle=pal.metal; roundRect(-9,-11,20,16,5); ctx.fill(); stroke(2);
      ctx.fillStyle='#20140b'; ctx.fillRect(-6,-3,12,2); ctx.fillRect(-1,-9,2,7);
      if(def.plume){ ctx.fillStyle=def.plume; ctx.beginPath(); ctx.moveTo(0,-12); ctx.quadraticCurveTo(10,-24,2,-30); ctx.quadraticCurveTo(6,-20,-2,-12); ctx.fill(); }
      break;
    case 'horns':
      ctx.fillStyle=shade(pal.metal,-6); ctx.beginPath(); ctx.arc(0,-2,10,Math.PI,0); ctx.fill(); stroke(2);
      ctx.fillStyle='#f2ead2'; ctx.beginPath(); ctx.moveTo(-8,-6); ctx.quadraticCurveTo(-18,-14,-12,-20); ctx.quadraticCurveTo(-10,-12,-4,-8); ctx.fill();
      ctx.beginPath(); ctx.moveTo(8,-6); ctx.quadraticCurveTo(18,-14,12,-20); ctx.quadraticCurveTo(10,-12,4,-8); ctx.fill(); stroke(1.6);
      break;
    case 'hood':
      ctx.fillStyle=pal.cloth; ctx.beginPath(); ctx.arc(-1,-3,11,Math.PI*0.8,Math.PI*2.1); ctx.lineTo(-6,4); ctx.closePath(); ctx.fill(); stroke(2);
      break;
    case 'wizhat':
      ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.arc(0,2,10,Math.PI,0); ctx.fill();
      ctx.fillStyle=pal.cloth; ctx.beginPath(); ctx.moveTo(-11,-4); ctx.lineTo(11,-4); ctx.lineTo(3,-30); ctx.closePath(); ctx.fill(); stroke(2);
      ctx.fillStyle=pal.cloth2; ctx.fillRect(-11,-6,22,4);
      ctx.fillStyle=pal.metal; ctx.beginPath(); ctx.arc(3,-30,2.5,0,7); ctx.fill();
      break;
    case 'halo':
      ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.arc(0,-2,10,Math.PI,0); ctx.fill(); stroke(1.8);
      ctx.strokeStyle=pal.metal; ctx.lineWidth=2.4; ctx.beginPath(); ctx.ellipse(0,-14,9,3,0,0,7); ctx.stroke();
      ctx.globalAlpha=0.5; ctx.strokeStyle='#fff'; ctx.beginPath(); ctx.ellipse(0,-14,9,3,0,0,7); ctx.stroke(); ctx.globalAlpha=1;
      break;
    default: // hair only
      ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.arc(0,-3,10,Math.PI,0); ctx.fill();
      ctx.beginPath(); ctx.arc(-8,-2,3,0,7); ctx.arc(8,-2,3,0,7); ctx.fill();
  }
}
function drawWeapon(u,def,pal,swing,stroke){
  ctx.save(); ctx.translate(7,-34);
  const s = swing; // attack progress
  switch(def.weapon){
    case 'sword':{
      const ang = -0.4 - s*1.6;
      ctx.rotate(ang);
      ctx.fillStyle=pal.skin; roundRect(-3,-2,7,12,3); ctx.fill(); stroke(1.8); // hand/arm
      ctx.fillStyle='#3a2a18'; ctx.fillRect(-2,-8,4,8); // grip
      ctx.fillStyle=shade(pal.metal,-14); ctx.beginPath(); ctx.arc(0,1,2.4,0,7); ctx.fill(); stroke(1); // pommel
      ctx.fillStyle=pal.metal; roundRect(-4,-11,8,4,1.5); ctx.fill(); stroke(1.2); // guard
      ctx.fillStyle='#ff5a5a'; ctx.beginPath(); ctx.arc(0,-9,1.3,0,7); ctx.fill(); // guard gem
      const bg=ctx.createLinearGradient(-2,-40,3,-11); bg.addColorStop(0,'#fff'); bg.addColorStop(.5,shade(pal.metal,14)); bg.addColorStop(1,shade(pal.metal,-10));
      ctx.fillStyle=bg; ctx.beginPath(); ctx.moveTo(-2.5,-11); ctx.lineTo(2.5,-11); ctx.lineTo(1.6,-40); ctx.lineTo(0,-44); ctx.lineTo(-1.6,-40); ctx.closePath(); ctx.fill(); stroke(1.4);
      ctx.strokeStyle='rgba(255,255,255,.55)'; ctx.lineWidth=0.9; ctx.beginPath(); ctx.moveTo(0,-14); ctx.lineTo(0,-39); ctx.stroke(); // fuller shine
      break; }
    case 'axe':{
      const ang = -0.2 - s*1.8; ctx.rotate(ang);
      ctx.fillStyle=pal.skin; roundRect(-3,-2,7,12,3); ctx.fill(); stroke(1.8);
      ctx.strokeStyle='#5a3a1c'; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(0,-2); ctx.lineTo(0,-40); ctx.stroke();
      ctx.strokeStyle='#3f2814'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(-2,-6); ctx.lineTo(2,-6); ctx.moveTo(-2,-11); ctx.lineTo(2,-11); ctx.stroke(); // haft binding
      ctx.fillStyle=pal.metal; ctx.beginPath(); ctx.moveTo(0,-40); ctx.quadraticCurveTo(20,-44,16,-26); ctx.quadraticCurveTo(6,-30,0,-30); ctx.closePath(); ctx.fill(); stroke(1.6);
      ctx.fillStyle=shade(pal.metal,22); ctx.beginPath(); ctx.moveTo(0,-40); ctx.quadraticCurveTo(12,-42,12,-33); ctx.lineTo(0,-34); ctx.fill();
      ctx.fillStyle=shade(pal.metal,-6); ctx.fillRect(-1.5,-40,3,3); // haft cap
      break; }
    case 'club':{
      const ang=-0.3-s*1.5; ctx.rotate(ang);
      ctx.fillStyle=pal.skin; roundRect(-3,-2,7,12,3); ctx.fill(); stroke(1.8);
      ctx.strokeStyle='#6b4a24'; ctx.lineWidth=5; ctx.beginPath(); ctx.moveTo(0,-2); ctx.lineTo(0,-30); ctx.stroke();
      ctx.fillStyle='#8a6a3a'; ctx.beginPath(); ctx.arc(0,-34,9,0,7); ctx.fill(); stroke(1.6);
      ctx.fillStyle='#c9c0a0'; ctx.beginPath(); ctx.arc(-4,-37,2,0,7); ctx.arc(5,-33,2,0,7); ctx.arc(0,-40,2,0,7); ctx.fill();
      break; }
    case 'bow':{
      ctx.rotate(-0.15);
      const draw = s>0? 0.5:0;
      ctx.strokeStyle='#7a5a2a'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(0,-18,20,-1.1,1.1); ctx.stroke();
      ctx.strokeStyle='#efe6c8'; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.moveTo(9,-35); ctx.lineTo(-4-draw*6,-18); ctx.lineTo(9,-1); ctx.stroke();
      ctx.fillStyle=pal.skin; ctx.beginPath(); ctx.arc(2,-18,3.4,0,7); ctx.fill();
      break; }
    case 'staff':{
      ctx.rotate(-0.1 - s*0.3);
      ctx.fillStyle=pal.skin; roundRect(-3,-2,7,12,3); ctx.fill(); stroke(1.8);
      ctx.strokeStyle='#6b4a24'; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(0,4); ctx.lineTo(0,-40); ctx.stroke();
      const glow = def.head==='halo'? '#8dffab' : (pal.cloth2||'#c9a2ff');
      const pulse = 4 + Math.sin(now()*6)*1.5 + s*3;
      const rg=ctx.createRadialGradient(0,-44,1,0,-44,10+pulse);
      rg.addColorStop(0,'#fff'); rg.addColorStop(0.4,glow); rg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(0,-44,10+pulse,0,7); ctx.fill();
      ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(0,-44,4,0,7); ctx.fill();
      break; }
  }
  ctx.restore();
}

function drawProjectiles(){
  for(const p of state.projectiles){
    if(p.kind==='arrow'){
      ctx.save(); ctx.translate(p.x,p.y);
      ctx.rotate(p.facing>0?0:Math.PI);
      ctx.strokeStyle='#5a3a1c'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-10,0); ctx.lineTo(6,0); ctx.stroke();
      ctx.fillStyle='#c9c0a0'; ctx.beginPath(); ctx.moveTo(6,0); ctx.lineTo(0,-3); ctx.lineTo(0,3); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#efe6c8'; ctx.beginPath(); ctx.moveTo(-10,0);ctx.lineTo(-13,-3);ctx.moveTo(-10,0);ctx.lineTo(-13,3); ctx.strokeStyle='#efe6c8'; ctx.stroke();
      ctx.restore();
    } else if(p.kind==='heal'){
      if(!drawMagicFx('water_proj', p.x, p.y, { loop:true, t:p.t, fps:10, h:36, facing:p.facing||1 })){
        ctx.save(); ctx.translate(p.x,p.y);
        const g=ctx.createRadialGradient(0,0,1,0,0,10); g.addColorStop(0,'#fff'); g.addColorStop(0.5,'#8dffab'); g.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,10,0,7); ctx.fill();
        ctx.fillStyle='#eafff0'; ctx.fillRect(-1,-4,2,8); ctx.fillRect(-4,-1,8,2);
        ctx.restore();
      }
    } else if(p.kind==='boulder'){
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.spin*0.5);
      if(p.element&&p.element!=='Normal'){ ctx.globalAlpha=.5; ctx.fillStyle=elemColor(p.element); ctx.beginPath(); ctx.arc(0,0,10,0,7); ctx.fill(); ctx.globalAlpha=1; }
      ctx.fillStyle='#6b5a48'; ctx.beginPath(); ctx.arc(0,0,7,0,7); ctx.fill(); ctx.strokeStyle='rgba(20,12,8,.7)'; ctx.lineWidth=1.4; ctx.stroke();
      ctx.fillStyle='#8a7660'; ctx.beginPath(); ctx.arc(-2,-2,2.4,0,7); ctx.fill();
      ctx.restore();
    } else if(p.kind==='bolt'){
      if(!drawMagicFx('magic_proj', p.x, p.y, { loop:true, t:p.t, fps:14, h:32, facing:p.facing||1, rot:p.spin*0.2 })){
        ctx.save(); ctx.translate(p.x,p.y);
        const c = p.side==='player'?'#8fd0ff':'#ff9a9a';
        const g=ctx.createRadialGradient(0,0,1,0,0,8); g.addColorStop(0,'#fff'); g.addColorStop(.5,c); g.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,8,0,7); ctx.fill();
        ctx.strokeStyle=c; ctx.lineWidth=2.4; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(-p.facing*11,0); ctx.lineTo(0,0); ctx.stroke(); ctx.lineCap='butt';
        ctx.restore();
      }
    } else { // magic — CraftPix fire / poison / water proj
      const mid = magicProjIdFor(p.element, p.kind);
      if(!drawMagicFx(mid, p.x, p.y, { loop:true, t:p.t, fps:12, h:40, facing:p.facing||1, rot:p.spin*0.15 })){
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.spin);
        const ec=(p.element&&p.element!=='Normal')?elemColor(p.element):'#c9a2ff';
        const g=ctx.createRadialGradient(0,0,1,0,0,11); g.addColorStop(0,'#fff'); g.addColorStop(0.4,ec); g.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,11,0,7); ctx.fill();
        ctx.fillStyle='#fff'; for(let i=0;i<4;i++){ ctx.beginPath(); ctx.arc(Math.cos(i*1.57+p.spin)*5,Math.sin(i*1.57+p.spin)*5,1.6,0,7); ctx.fill(); }
        ctx.restore();
      }
    }
  }
}
function drawParticles(){
  for(const p of state.particles){ const a=1-p.t/p.life; ctx.globalAlpha=a; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill(); }
  ctx.globalAlpha=1;
}
function drawFloats(screen){
  ctx.textAlign='center'; ctx.textBaseline='alphabetic'; ctx.lineJoin='round'; ctx.lineCap='round';
  for(const f of state.floats){ if(!!f.screen!==!!screen) continue;
    const tt=f.t/f.life, a = tt<0.8 ? 1 : Math.max(0,1-(tt-0.8)/0.2);
    const pop = f.t<0.10 ? 0.45+0.9*(f.t/0.10) : (f.t<0.22 ? 1.28-0.28*((f.t-0.10)/0.12) : 1);
    const sz = f.size*pop;
    ctx.save(); ctx.globalAlpha=a; ctx.translate(f.x, f.y);
    if(f.crit) ctx.rotate(Math.sin(f.t*28)*0.025);
    // Pixelify is thicker/more readable for big numbers than Press Start
    const thick = f.thick || f.crit;
    ctx.font=(thick?'800 ':'700 ')+sz.toFixed(1)+'px Pixelify, PressStart, monospace';
    const outline = thick ? Math.max(6, sz*0.34) : Math.max(3.5, sz*0.26);
    // Outer black outline (double pass for thicker look)
    ctx.shadowColor='rgba(0,0,0,.55)'; ctx.shadowBlur=thick?6:4; ctx.shadowOffsetY=2;
    ctx.strokeStyle='rgba(12,6,2,.98)'; ctx.lineWidth=outline;
    ctx.strokeText(f.txt,0,0);
    ctx.shadowColor='transparent';
    if(thick){ ctx.lineWidth=outline*0.55; ctx.strokeStyle='rgba(0,0,0,.9)'; ctx.strokeText(f.txt,0,0); }
    // Bright fill
    const g=ctx.createLinearGradient(0,-sz*0.9,0,sz*0.35);
    if(f.crit){ g.addColorStop(0,'#ffffff'); g.addColorStop(0.4,f.color); g.addColorStop(1,shade(f.color,-30)); }
    else { g.addColorStop(0,'#ffffff'); g.addColorStop(0.55,f.color); g.addColorStop(1,shade(f.color,-18)); }
    ctx.fillStyle=g; ctx.fillText(f.txt,0,0);
    // Extra white core for damage numbers
    if(thick){
      ctx.globalAlpha=a*0.55;
      ctx.fillStyle='#ffffff';
      ctx.font='800 '+(sz*0.92).toFixed(1)+'px Pixelify, monospace';
      ctx.fillText(f.txt,0,-sz*0.04);
    }
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

/* --------------------------- Small helpers ----------------------------- */
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function shade(hex,amt){
  const c=hex.replace('#',''); let r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);
  r=clamp(r+amt,0,255);g=clamp(g+amt,0,255);b=clamp(b+amt,0,255);
  return '#'+[r,g,b].map(v=>('0'+(v|0).toString(16)).slice(-2)).join('');
}
function mix(h1,h2,t){ // blend two hex colors
  const a=h1.replace('#',''), b=h2.replace('#','');
  const ar=parseInt(a.substr(0,2),16),ag=parseInt(a.substr(2,2),16),ab=parseInt(a.substr(4,2),16);
  const br=parseInt(b.substr(0,2),16),bg=parseInt(b.substr(2,2),16),bb=parseInt(b.substr(4,2),16);
  const r=ar+(br-ar)*t, g=ag+(bg-ag)*t, bl=ab+(bb-ab)*t;
  return '#'+[r,g,bl].map(v=>('0'+(Math.round(v)).toString(16)).slice(-2)).join('');
}
// element-tinted palette: pulls a unit's colours toward its element hue so the
// whole body reads as Fire/Water/etc. at a glance (not just the badge)
function elemTintPal(pal, element){
  if(!element || element==='Normal') return pal;
  const ec=elemColor(element);
  return {
    skin:  mix(pal.skin||'#e8b183', ec, 0.14),
    fur:   mix(pal.fur||pal.skin||'#d9a26a', ec, 0.30),
    cloth: mix(pal.cloth||'#a5512a', ec, 0.44),
    cloth2:mix(pal.cloth2||'#f2d38a', ec, 0.52),
    metal: mix(pal.metal||'#c9d0d8', ec, 0.36),
    hair:  mix(pal.hair||'#3a2414', ec, 0.24),
  };
}

/* =============================== HUD SYNC =============================== */
const el = id=>document.getElementById(id);
function syncHUD(){
  el('gold').textContent = Math.floor(state.gold);
  el('lvl').textContent = state.level;
  const pFrac=(state.pHp/state.pHpMax*100), eFrac=(state.eHp/state.eHpMax*100);
  const pShown=((state.pHpShown!=null?state.pHpShown:state.pHp)/state.pHpMax*100);
  const eShown=((state.eHpShown!=null?state.eHpShown:state.eHp)/state.eHpMax*100);

  el('pHpTxt').textContent = Math.max(0,Math.ceil(state.pHp));
  el('eHpTxt').textContent = Math.max(0,Math.ceil(state.eHp));
  for(const key of SHOP_ORDER){
    const card = document.querySelector('.card[data-k="'+key+'"]'); if(!card) continue;
    const def=UNITS[key];

  }

}

function buildShop(){
  const shop=el('shop'); shop.innerHTML='';
  SHOP_ORDER.forEach((key,i)=>{
    const base=UNITS[key], def=shopDef(key);
    const card=document.createElement('div'); card.className='card'; card.dataset.k=key;
    const c=document.createElement('canvas'); c.width=80; c.height=80;

    const keyEl=document.createElement('div'); keyEl.className='key'; keyEl.textContent=String(i+1); card.appendChild(keyEl);
    card.appendChild(c);

    const nm=document.createElement('div'); nm.className='nm';
    nm.textContent = base.name || key;
    card.appendChild(nm);
    if(b.deepName && b.deepName!==base.name){

      path.textContent = (b.evo===2?'🌟 ':b.evo===1?'⭐ ':'')+b.deepName;

function drawPortrait(c, def){
  const g=c.getContext('2d'); g.clearRect(0,0,80,80);
  // Prefer CraftPix pixel idle; never the old vector portrait when a sprite is assigned
  if(def.sprite){
    const pack=SPRITE_PACKS[def.sprite]||loadSpritePack(def.sprite);
    const frames=(pack.anims.idle||[]).filter(Boolean);
    if(frames.length){
      const img=frames[0], sc=def.spriteScale||1.1;
      const h=56*sc, w=(img.width/img.height)*h;
      g.imageSmoothingEnabled=false;
      g.drawImage(img, 40-w/2, 68-h, w, h);
      return;
    }
    // pack still loading — colored oval placeholder
    const col=(def.pal&&def.pal.cloth)||'#c9a2ff';
    g.fillStyle=col; g.beginPath(); g.ellipse(40,48,16,22,0,0,7); g.fill();
    g.fillStyle='#20140b'; g.beginPath(); g.arc(46,42,3,0,7); g.fill();
    return;
  }
  // siege / no-sprite only
  if(def.siege){
    const prevCtx = ctxRef.c; ctxRef.c=g;
    const u={def,pal:def.pal,facing:1,x:40,y:64,lane:0,state:'fight',walkPhase:0,swing:0.5,hitFlash:0,dead:false,hp:1,hpMax:1};
    gWrap(g,()=>{ portraitFighter(g,u,def); });
    ctxRef.c=prevCtx;
    return;
  }
  const col=(def.pal&&def.pal.cloth)||'#caa15a';
  g.fillStyle=col; g.beginPath(); g.ellipse(40,48,16,22,0,0,7); g.fill();
}

function rr(g,x,y,w,h,r){ g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r); g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }
function drawCatapultMini(g,stroke){

function weaponPortrait(g,def,pal,stroke){

/* ============================== GAME LOOP ============================== */
let rafId=null, lastT=0;
function loop(ts){
  const t=ts/1000; let dt = lastT? Math.min(0.05, t-lastT):0; lastT=t;
  if(hitStop>0){ hitStop=Math.max(0,hitStop-dt); } // freeze the sim, keep rendering (juice)
  else update(dt);
  render();
  rafId=requestAnimationFrame(loop);
}

/* ============================== FLOW / UI =============================== */
function startLevel(level, gold){
  // gold arg ignored for carry-over — always use stage startGold (explicit 0 ok if passed as stage value)
  state = newLevel(level, gold===undefined ? undefined : gold);
  // Force clean economy each stage unless explicitly testing with a number
  if(gold===undefined || gold===null){
    const st = stageFor(level);
    state.gold = st.startGold!=null ? st.startGold : 0;
  }
  state.eTowerX = WORLD_W - 46; state.running=true; camX=0;
  initBackground(); buildShop();
  ['startScreen','endScreen','barracksScreen','settingsScreen','pauseScreen'].forEach(id=>el(id).classList.add('hide'));
  const sb=el('spellBtn');
  el('spellLbl').textContent=t('spellName');
  // Meteor: hidden until Stage 4 — free unlock on first Stage 4+ run
  const justGotMeteor = ensureMeteorUnlock(level, false);
  if(hasMeteor()){ sb.classList.add('show'); } else { sb.classList.remove('show'); }
  Sound.unlock(); Sound.startMusic();
  syncHUD();
  toast('Lv '+state.level+' · '+state.stage.name);
  setTimeout(()=>{
    if(!state||!state.stage) return;
    if(justGotMeteor) toast(t('meteorUnlocked'));
    else toast(stageStory(state.stage));
  }, 900);
  if(!rafId){ lastT=0; rafId=requestAnimationFrame(loop); }
}
function computeScore(){
  const par = state.stage.parTime||40, tt=state.t;
  const timeBonus = Math.max(0, Math.round(par - tt)*25) + 200;
  const hpBonus = Math.round(state.pHp*2);
  const goldBonus = Math.round(state.goldAcquired*0.6);
  let army=0; for(const u of state.units) if(!u.dead) army += (u.def.cost||0);
  const armyBonus = Math.round(army*1.5);
  return { score:Math.max(0,timeBonus+hpBonus+goldBonus+armyBonus), army, clearTime:tt };
}
function pickQuip(L){ const q=(I18N[LANG]&&I18N[LANG].quips)||I18N.en.quips; return q[(L-1)%q.length]; }
function stageStory(st){
  if(!st) return '';
  if(LANG==='ko' && st.storyKo) return st.storyKo;
  if(st.storyEn) return st.storyEn;
  if(st.story) return st.story;
  return pickQuip(st.level||1);
}

function endGame(win){
  if(state.over) return;
  state.over=true; state.running=false;
  Sound.stopMusic(); win?Sound.win():Sound.lose();
  el('spellBtn').classList.remove('show');
  el('endScreen').classList.remove('hide');
  el('endTitle').textContent = win? t('clearedTitle') : t('defeatTitle');
  el('endTitle').style.backgroundImage = '';
  el('endTitle').classList.toggle('defeat', !win);
  const box=el('scoreBox');
  if(win){
    const L=state.level, sc=computeScore(), prev=SAVE.scores[L]||0, isBest=sc.score>prev;
    state._lastScore = sc.score;
    if(isBest) SAVE.scores[L]=sc.score;
    const gems=(state.stage.reward||5)+(isBest?5:0);
    SAVE.gems+=gems; SAVE.maxLevel=Math.max(SAVE.maxLevel, L+1); saveGame();
    updateHiScore(); updateContinue();
    el('endMsg').textContent = t('clearedMsg')(L);
    el('endSub').textContent = stageStory(state.stage) || pickQuip(L);
    box.innerHTML = scoreRows(sc, isBest, gems);
    el('againBtn').textContent = t('nextLevel');
    state._nextLevel = L+1;
    // Gold does NOT carry between stages — each level uses its own startGold
    state._carryGold = null;
  } else {
    el('endMsg').textContent = t('defeatMsg');
    el('endSub').textContent = t('reached')(state.level);
    box.innerHTML='';
    el('againBtn').textContent = t('retry');
    state._nextLevel = state.level; state._carryGold = null;
  }
}
